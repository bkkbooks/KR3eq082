body:
  text: 病症卷三中國古醫籍大多數以一人著述遍論各症獨出心裁言之成理醫案羅列無病不備學者讀其書信其說奉為圭臬以臨各症乃有時或驗或不驗甚則誤人性命即在頃刻在當時著書之人高談闊論只顧自圓其說殊不知貽誤後人為害至大此種著述實有一部分最妙之思想與其真正之實驗若以其實驗坦白公諸社會則集腋成裘最有價值只以其人自命太高遂不惜放言無忌欲以其理想貫徹其全部主張因而不實不盡普遍泛論遂將其真正之特長亦掩沒於此種浮煙漲墨之中學者於此要有極鋭之眼光抉其精華棄其虛僞斯為得矣其尤甚者故為玄之又玄之說造作荒謬難解之詞此類醫書根本並非醫人著述概係巫覡騙詐之徒借一二種有效藥品為人治病故意造出種種荒謬醫書巧立名詞託名古聖先賢神仙帝王不一而足意在使病家聽其言淪如聞梵語天玄地玄驚為神術以售其蒙惑其術至工其心最狡然其用藥立方則極簡單有效但著書立說則又故意造出奇特不經之藥方以眩世惑人所著之書又故意顛倒錯亂造為艱澀難解之詞以文其僞後世墜其術中者奉為金科玉律又復解釋訓詁訛之又訛而中醫醫學遂成為一種不可思議之物近入目之曰哲理此猶皮毛之論實則中醫之精華乃最高之科學中醫之虛僞亦不足稱哲理也此種僞說流傳至今為中醫學術之一大障礙真可浩歎吾人學醫第一要著即須看破此種來源勿為所愚庶不致以畢生精力消耗於此等虛僞醫書之中無裨實際如墜五里霧中也自欺欺人為世詬病流傳至今牢不可破此真中醫學之蟊賊言之實堪痛恨看也古來醫藥思想多偏於神話中西皆然不足為怪余所最恨者即為僞託高深玄渺之詞以欺人之僞造醫書不得不大聲疾呼以告學者此種意見並非武斷實已反覆試驗而後真知其僞也余嗜此道齠齡時已感興趣發蒙伊始即已困於此種玄虛醫理之中邇時尚無西醫無從對照中年而後常受西醫指導始則為姜子全先生繼則為丁福保先生得有新知自此以後長年纍月樂此不疲積而久之遂於中西醫藥各有心得舉凡一症之標準治法反覆試驗垂四十年始知某病中醫有特長某病西醫有特長一病之中某時期現何象必用中藥某時期現何象必用西藥或則同一病症同一有效之藥品或中或西究竟孰優均能切實認識故敢定為標準治法以告學者一藥之確實效驗中西藥品之效驗載入本草及藥物學者種類繁多未經試驗者固居多數但有數種藥品對某種病非常靈驗實已經過多次之實驗始能確知其優點且知中西藥品絶不可只信書籍之所載即認為毫無可疑尤以中醫之本草及近世之醫學刊物讀者必持懷疑態度而後可余對中西藥試驗比較已經多年實已發現數種中藥對某病確有特效且能超過西藥而為本草所未載者坦白報告不敢有一字虛僞也逐漸認識百無一誤然余固不願自詡廣博凡百病症均有特驗大言不慚筆之於書以誤後人中醫書實多此弊學者注意故本編所列各病均係確切試驗毫無疑義者始敢以告同奸故所載各症實為一般人常有之疾患而且多為危險最易致命之病症治療稍有錯誤最易殺人故余對於此數種疾病格外注意本編所載各症不知耗費余若干之精神始克有此獨得之真實成績坦白報告希望來者繼續試驗及研究以推進醫學並非教人學醫指導學醫自居先覺性質人之患在好為人師吾人之大病也故所列各症及醫驗均係反覆試驗毫無可疑而後擇其最重要及最近之醫驗揭舉一二以概其餘所舉醫驗多係最近治療及現仍健在之人皆詳注住址以便研究訪問也至余臨症時之治療方法持論觀念或中或西知不免於專家之笑嗤不牛不馬之醫術或竟為高明所反對亦未可知然余實非冒然談中西醫理之匯通者亦非淺嘗輒止大言不慚自命中西兼通者且余實已確知中西醫有一部分完全不同絶然不能匯通者余實已試驗若干年若於人且已實作有系統之記載之經驗余固深信余之醫術已臻此境此種醫術或竟為中西醫學混合溝通之媒介新舊醫理遞嬗中之引導者亦未可知中醫醫理耶西醫醫理耶余已能於臨床之頃了然知其何者為適用而採取之中藥耶西藥耶余已能分別信手應用而得其輔助此種用藥法係由經過數十年之實驗而來絶非膽大妄為濫用西藥兒戲人命之比不可誤解確能認識於一病之中之某時機而以某藥治之絶有效且能真知某方法某理論對於某病絶對錯誤中醫說耶西醫說耶余已有一部分真能判斷其真正之是或非不但不為中醫過於玄虛學說所迷惑不知經過若干年始能跳出此迷陳且亦絶然不為西醫科學二字所拘泥此非冒然反對科學實亦由於多年經驗中發現西醫對治療上亦有一部分之缺點此缺點即科學之缺點也余之此篇則中西醫絶不作無謂之反駁尤其對於中醫之說駁不勝駁閲者須知本篇不采之學說強半皆由反覆試驗實不可取之學說也一傳染病類傳染病有多種茲所録者僅余經驗多年確實有效之治法其未經確實認定或試驗未久各病症一概從略不敢虛僞欺人致蹈前人著書鋪張揚厲之覆轍閲者宜注意此點深信余言也傷寒傷寒與溫病根本不同西醫腸窒扶斯症則包括傷寒溫病而言殊嫌含混論詳前原因本病為體外嚴寒所侵而致尤以身居暖室驟遇外間大寒遂致皮膚所感冷熱懸殊周身毛孔驟然緊縮閉塞體內熱氣不得透達於外蓄積體內遂成傷寒之症然此症多見於嚴冬天氣若春夏秋間則極少也西醫則謂由於腸窒扶斯桿菌之傳染自是確論然考西醫書所謂腸窒扶斯實不僅指傷寒一症而言溫病瘟疫均包括在內故余對本病主張仍宜分別立名不敢從同蓋傷寒與溫病確係兩病若以中醫同一治法治之必左西醫既以腸窒扶斯名此二症故其治法亦無分別蓋傷寒一症系外表先傷於寒初病治法必先解表寒唯治不得法乃傳經入裏成為內熱結果必至腸熱溫病一症係肺內先有實熱初病治法必先解肺熱唯治不得法亦必至腸熱二症結果雖似相同然在初病之時中醫之治法及藥品絶不相同且有奇效唯西醫對此二症則治無分別故治療成績遠遜於中醫也除預防注射對症療法待期療法外若患者既已病倒實無他法可以使該病從速痊愈血清療法效力亦不盡準確結果必視腸之病變若何而待其自然之轉歸此實不得不謂為西醫之缺點然此種缺點或由於中西醫藥隔閡太甚此隔閡二字並非西醫不通中藥中醫不通西藥之謂蓋現今中西藥物已漸有混合之勢近閲中醫刊物多有論及西藥者西藥之中亦有從事化製中藥者表面上視之似已減少隔閡中西匯通殊不知中西醫藥之隔閡不但仍在且恐又因此不徹底之貫通而失去中醫治法及藥品之特長不但無益而反害之舉例說明於下西藥中近已適用麻黃素其功用則有定喘及利尿諸作用然以此種麻黃素代中醫之麻黃湯以治傷寒之太陽證未有不大左者中醫刊物上曾有列麻黃等發散藥於解熱劑中者曰服之有發汗作用名之曰發汗解熱劑與西藥之安基比林等退熱藥相提並論曰安基比林服之每每發汗亦名之曰發汗解熱劑此種著述看似中西貫通毫無隔閡然試將此二藥分別治療同一之病症則絶對不能一律有效且既稱麻黃等為發汗退熱劑若概以麻黃治熱病其殺人之速必易如反掌若以安基比林等退熱劑而冠以發汗二字尤覺可笑蓋安基比林之發汗係其副作用絶非麻黃之發汗解表專能透徹表裏之比也傷寒表證或較重之感冒症一試便知何可只憑理想強加攏合以誤後人余深恐因此不徹底之匯通失去中西醫之特長與夫本來之面目故不憚反覆言之非好辨也或由於中醫之故步自封西醫之囿之科學科學無止境以現在之科學為神聖而卑視一切亦故步自封之類也根本限於一偏並無二者之真識以故不能舍短取長裨益實際此研究醫學者之大恥願吾輩醫者個個努力也症候此症可分三期說明之第一期頭項強痛身痛骨節痛腰痛惡寒此二字最重要或惡風無汗有汗者少嘔逆或身熱遲早必有身熱此或字作如是解鼻塞聲重或咳喘脈緊或浮緊此緊脈最為傷寒之初步必然現象溫症絶少此脈應注意所謂表證是也此即古醫書所謂太陽證也然余不欲談此等字第二期此約在得病四五日後脈漸大身體潮熱已漸入內胃已熱矣不惡寒或微汗出身重頭或眩或痛嘔不能食或厥逆口乾咽燥而渴心煩腹滿或心下硬痞或發黃便燥或下血或鼻衄舌苔黃譫語亦多於此期見之與潮熱均是最主要之證候應特別注意脅痛舌苔黃裂小便赤短耳聾往來寒熱嘔吐痞滿結胸腹痛或數日不大便或瀉利神昏譫語脈多弦數此期熱度極高且不易下降第三期熱不退或四肢厥逆厥逆太甚有通體皆涼者脈細微或停止便溏或自利清穀或瀉膿血熱或驟退愈危息高呼氣長吸氣短聲微神衰身倦此時亦有惡寒絶不可認為表症自汗盜汗此汗與第二期大異尋衣摸床此四字係形容病者精神將散之朦朧狀態較譫語尤重已成危候治法此症治法中西醫絶不能相合實以中西藥品不同理論亦異故不能強為攏合當第一期中醫所謂太陽經證初得之始注意初得二字惡寒極甚頭痛身痛亦劇此時唯一有效治法即為發汗解表若在嚴冬之候注意嚴冬二字則麻黃羌活獨活防風生薑甘草蘇葉等均為必需之品可視病之輕重人之強弱此最宜注意以免過汗酌量選用如有咳喘可以酌加杏仁服藥後多飲熱水覆被取汗為第一要著如有乾嘔不必顧及只用發散藥可也此治法及早用之對於傷寒初起往往一藥而愈絶不致演成重症此時若用西藥安基比林等不但無效且恐耽誤病機釀成重症此余實在經驗特以告知學者傷寒與溫病治法不同之處即在此開手第一著西藥中絶無治傷寒初起之藥品故對於此症雖亦有發汗治法並無特效因而曰此症只有期待療法而已深願西醫於此種中藥方法虛心采擇共濟災癘此症當初得之時較重者無論如何熱浴或蒸氣多不能出汗惟服中藥之發散藥後始能發汗尤以麻黃一藥為最效若改用麻黃素則不出汗一汗之後諸症根本皆除直接了當並無若何神祕傷寒表證發汗有一種鄙俚之病理人人易懂就是病人皮子外面的毛孔被寒氣一侵全閉煞啦內裏的熱氣透不出來了所以攻的渾身不好受冶此傷寒表證的中藥全是溫性而且多帶辛辣氣味的所以有用生薑的吃下去能叫內裏頭熱氣格外的膨脹得很一下子就把外皮的毛孔完全的拿汗給衝開了這病就立時好了這有什麼神奇呢可是溫病初得的發散不是這樣所以中醫治此二症格外的靈所最忌者於以上諸藥之中妄加其他藥品例如死守古方視力神聖而又誤於玄虛之說自入迷途是也以致藥力不純不能發汗反而貽誤病機良可浩歎此段余有反對古書之意思知我罪我所不薛也此症用發汗藥有應注意者大凡太弱之人及老年人用藥分量均宜格外謹慎囑其覆被發汗亦應諄囑看護者格外注意以防發汗過量心臟停止所謂汗脫麻黃更不可用大量成年人一至二錢為準且須用蜜炙以免危險寧使一劑汗不透再服一劑萬不可猛浪從事致出危險而桂枝一藥尤易令人鼻衄用時亦宜小量或以不用力是此傷寒病第一期之治法也此症初得之始發散得法一汗而解病者或認為感冒風寒殊不重視故中醫藥功用之妙亦半掩沒於此感冒風寒四字之中矣失此不治或用藥雜亂致內外閉塞略久而後體內蓄熱太多侵及腸胃各臟於是種種熱候不易消散腸窒扶斯熱型遂有西醫待期療法無可奈何之名詞然余於此症每相機處理屢經試驗認定第一期之根本治法中藥實有不可思議之妙寧不可拘拘於西醫之說自棄其固有之良法更望有志世界醫學者采余此說保守中藥之特長而應用之以佐治療之成績則幸甚矣余所主張腸窒扶斯病名不能概括傷寒與溫病兩病而言其實驗之理由即基於此蓋溫病初起亦有惡寒惡風頭痛骨節痛等表證腰痛者少惟其脈則與傷寒大異溫病脈多浮洪右寸脈尤顯或大而濡絶少傷寒初起之緊弦等脈此為最應注意之點再則為氣候關係傷寒多在天氣極寒之冬季而春夏秋三季獨少溫病則四時皆有且一有溫病流行較傷寒更多普遍較傷寒之傳染為速尤易分辨然溫病初起症狀雖與傷寒略同此時若以治傷寒表證之辛溫發散藥治之例如用麻黃桂枝古書治溫病有主用桂枝者大謬羌活細辛獨活等藥發汗過當必致危險此時用西藥中之安基比林等更無效故余謂腸窒扶斯病名實不宜概括傷寒與溫病兩病籠統言之也第二期中醫所謂陽明少陽各證治法此是汗不得法邪已漸漸入裏內臟已漸乾燥一切發汗之藥不能再用此時治法之有效者首推大黃芒硝其次則柴胡前胡黃芩竹葉石膏青皮厚朴枳實再次則瓜蔞半夏此藥略燥用時注意梔子豆豉茵陳蒿赤小豆發黃者用之杏仁黃柏等藥可以相機擇用此時總以甘寒苦降疏通腸胃為要凡見痞悶結胸症宜以小陷胸湯加減為治若見潮熱譫語腹滿或痛此時或有頭痛不可誤認疑為仍有表證也均宜用大黃若癥結不實或病人太弱宜用熟大黃枳實厚朴等藥微卜之此時不必用芒硝若脈症均實舌黃唇裂口渴腹痛譫語潮熱小便赤短急以生大黃加芒硝枳實厚朴等亦可用下之此時必有皮膚之熱并宜以阿斯比林安基比林等西藥作退熱用但與中藥須隔開六點鐘用之此時亦可用硫苦等此第二期之治法也此期治之得法亦不致病勢加重演成腸出血及腸穿孔之危險惟此期間有借重西藥之時參看醫驗與第一期之治法純用中藥者有別第一期西藥必無效不可不知柴胡為此期有寒熱往來之專藥與頭痛加以川芎白芷皆有效此期亦有黃疸症狀西藥硫苦治黃疸有效可用之應參照茵陳湯等治法再佐以對症各藥可也此期治法於疏通腸胃等法之外用承氣湯等勝於用硫苦及甘汞等必須用西藥退熱撤曹安基比林阿斯比林硫規等均可選用亦可兼用清涼劑例如稀鹽酸等惟心臟衰弱者脈微細或有自汗盜汗者於用退熱劑時宜特別謹慎勿用太大之量較之純用中藥特別有效失此不治則入於第三期勢愈危險矣古方中非無靈驗之方但大多數為其他成方所混淆故必經多年實驗方有真確認識抉擇而出即本編所采之古方是也第三期治法此期中醫所謂太陰少陰厥陰各症西醫所謂腸出血及腸穿孔等合併症更覺棘手若第一二期治之得法汗下絶不致演成三期此種病變純由於過信中醫古書含混迷離之說雜成胸際一遇此病無從下手以致認症則迷惘猶疑因聲說貌似精妙玄深實則紛亂雜揉導入迷陳學者愈究心精神愈紊亂矣用藥則拘板牽強視古方為神聖殺人即在於此一誤再誤病勢演進不已乃至不可救藥醫者猶自稱曰此某經症用某經方也哀哉症已至此絶非病之當然現象西醫治傷寒以藥品不能如中醫之適應此症故多演成重症遂認待期療法為確乎不拔之說實則西醫非不精所苦者無此藥也設使此症初起當純粹表症之時一汗而愈腸何由熱何由出血何由穿孔耶逮演至第二期中醫承氣湯等確實較西藥為優然又苦於退熱藥不如西藥之適應此症又再惑於種種古書之說一誤再誤亦可演成第三期之危險余經過此症多矣確知中西治法合之適當病機則十之八九可以速愈離之則各有所短也此時不可不有心靈手敏之主張挽救垂死之病者運用醫藥隨機應變處處得法十或救其二三以余之經驗病至此種階段十之八九已成險症腸出血期所便多膿血或黑油樣之物此時尚能希望治愈至腸穿孔期則絶少挽救之法矣此時恆有四肢厥逆若其體溫仍高則仍可下之或大劑滋陰此時要有十二分認識病症不可濫用瀉藥若完全表現虛脫症狀例如脈微身涼自汗盜汗喘息失眠虛煩下利清穀種種皆現極虛之症者此時只有大補陰陽之一法此法尚較西藥之強心止血等劑為愈然以上二法一瀉一補若非認症確實用藥稍有錯誤殺人即在頃刻此則視醫者之學術經驗與運用方法之何如為定所謂可以意會不可以言傳也中醫對於傷寒溫病二症由於古書之根本混淆早已糾纏不清幸經後人逐漸試驗漸漸分晰始知傷寒治法與溫病治法絶然不同四十年前余純粹偏信西醫曾根據腸窒扶斯病菌之理主張傷寒溫病實係一症並無分別中醫治法不過藥品上之區別與本病毫無關係此種見解今已知其大錯矣歷考溫症諸書雖仍不免牽扯玄虛之習然實已知治溫病之正軌惟傷寒一症仍有人拘泥古書經學家對於今文古語文之爭辨檢詳因而抉出真僞以示來者厥功甚偉中國古醫書之文筆句法多非秦漢間文字稍讀古書者極易辨別一望而知為假託乃後之醫者不乏通儒初來見有根本糾正者惜哉貽誤害人者古書治傷寒非全部不靈驗但有一部分實不可從者故本編論病開首先將傷寒一症詳細言之此皆本諸實驗立論非臆斷也醫驗薛殿賓五十歲住山東德縣大寺街患傷寒症已經過五醫率皆謹守古醫書治法認症並無錯誤經余接診時係於前醫認為不治辭謝之後病已一月餘其當時症狀為潮熱不解神識不清脈微細口燥唇裂不寐自汗舌苔黑病者自訴恆覺腸內若有黏貼之物一片以前曾服瀉藥數次矣痛苦之狀不知所可以病日久周身皆痛現無欲狀態衰弱殊甚而熱度至下午尤高譫語倦臥唇裂有血痕惡寒厥逆症甚危殆而自訴腸內自覺黏著一物則反覆叮嚀以相告語余查以前論症諸醫案均無錯誤時在十一月認定為正傷寒自初病至病危所用之方不出麻黃桂枝湯症漸進行則小柴胡湯大青龍湯調胃承氣湯大承氣湯四逆湯等應有盡有均依古方為治觀其脈症審其方藥無一不合學醫者已受古人之誤殺人之機即在無一不合四字可勝歎哉病已至此群醫束手無策諉為飲食不慎自招病危推辭不治凡病至服藥無效毫無把握之時醫者總宜及早告知病家再延他醫診治以免貽誤病機致令後醫為難萬不可存自滿及嫉妒之心尤應於此症治愈之後再向病者細問經過籍資經驗余本庸醫然於讀書而外自覺受益最多者惟此一著四十餘年不敢自信竊願能知自愛之中西醫共勉之余檢其以前所用之藥例如芍藥甘草人參當歸五味子附子乾薑大棗白朮茯苓桂枝等藥尤以芍藥為最多幾於每方必有此品無一不具此等藥品雖為古方然根本誤人即在於此故此症大誤亦即在於此當其初得之時寒邪在表此時一經發汗本可自愈況此君素本強壯有何顧慮乃於發汗藥中遵照古方芍藥甘草均行列入汗既不透邪漸入內又復於內熱當下之時誤解厥逆便溏此均熱象遵照古方又復加入種種收斂辛燥溫補之品瀉又不透致使腸胃之中愈積愈熱漸至腸出血期幾於無法挽回蓋此症初得之時本當發汗而誤於成方發汗不徹底其後病熱演進當攻下而又誤於成方攻下不徹底由淺入深遂成重症病名極清楚病象極顯明治法極簡單本可順理成章一藥而愈所可歎者即古人誤今人今人誤病人一誤再誤其唯一害人之方藥即在於桂枝芍藥附子人參五味子白朮等等與此君病變大相反悖之各藥品此症死於此藥者不知凡幾可勝歎哉中醫至此實必束手無策矣余適於是時自鄂回籍接診此症病狀如上述認為腸熱已甚此時病者已衰弱不堪唯有哭泣津液將枯乃為立下方第一方午前八點鐘服生大黃三錢枳實二錢芒硝一錢五分煎妥沖入芒硝一次服服藥後一點鐘囑病者多飲白水服一劑大下如黑油狀物之糞便病勢大見輕減當日服阿斯比林西藥方體溫亦下降因而能進稀粥一杯第二方午前八點服一次午後八點服一次生大黃一錢枳實一錢芒硝一錢生地四錢寸冬二錢元參二錢丹皮三錢煎妥分二次早晚分服服下後退熱最為顯著病熱更減輕西藥方此方服中藥時每日服之約三日阿斯比林克一包於發高熱時服下約在午後三點鐘此藥分量太輕以病者已衰弱恐其副作用發汗太大致心臟有險故用此小量此時若用硫規則多無效此經驗若干年始知之謹以告知讀者硫規雖無發汗之副作用而不適用於此等熱服前中西藥方均大效病約五六日即漸向愈此後所服藥品不過西藥中之稀鹽酸橙皮酊等之清涼藥及中藥內之生地露銀花露等輕清之品而阿斯比林亦於熱度微高時給豫克一包服下約三四日或間日服之如此調理約二十餘日病已痊愈此症初起中藥有大效西藥絶無效阿斯比林等至第二三期純恃中藥無特效例如大黃芒硝生地元參丹皮等純用西藥例如甘汞硫苦阿比安比撒曹硫規等亦無特效余不知經過若干人之實驗而確知此症用藥之時機及適用中或西之藥品有時絶對無效例如傷寒初得之用阿比等有時中西藥相得益彰例如二三期早晚服中藥之瀉下藥中間與以一包或二包之阿比並能確知中西藥雖係同一作用而各有所宜例如西藥之甘汞硫苦對於傷寒絶不如中藥之大黃芒硝此症中西醫之治法分之均易釀成重症西醫開首既無治法對二三期應用之瀉下藥又缺乏滋養津液之品以佐之故西醫對於此症亦只有聽其演變中醫治此症本有良方惟古書立論似深奧而實朦朧而又雜以不適用之各藥減其良藥之效用誤人太甚中藥對二三期之傷寒又缺乏退熱之靈驗是以不可盡信古書也所以中醫對此症有各種不治之症矣例如所謂壞病及種種定為不治之死證西醫對本病之預後亦有種種不良之規定例如合併腸出血腦膜炎肺炎腸穿孔及熱度過高脈搏反軟少之類則中西醫對於此症之治療均有缺點可想而知余雖不敢謂中西醫藥相機參用必能使此症百治百愈然確實知此症發生後所以演變至於極重之時期者強半由於中藥古方中之一部分太支離西藥中之一部分根本對此症無大效因而延誤而成中西醫藥各有短長則敢斷言以此症每逢冬季最易流行兵營中更易感染余任第五鎮軍醫長八年之久成績考試輒冠全鎮軍醫官長即以此症成績為多曩者伴侶仍有存者當能證余言也余治療此症何止千百歷將中西醫藥反覆比較試驗確知此症中醫之傳經說西醫之待期說強半由於初起及經過中治療醫藥之不適合因而釀成較重之症象絶非本病之漫無治法必須聽其自然之謂用特鄭重記載學者不可不注重實際自囿於一偏之見也余豈敢自作聰明反對古人反對科學然心所謂危不忍不大聲疾呼以告學者一得之愚或有補於未來之醫術望知我者諒此苦衷也西藥中之預防注射最有特效不可不知傷寒預防漿苗等又甘汞一藥西醫對此症甚推重之比較有效特並識之附録最近反證醫驗一則張紹周前綏靖公署副官處書記官年五十六歲清苑縣東關人於民國二十六年七月患溫病頭痛身熱身痛嘔逆舌苔白不惡寒此不惡寒三字係溫病徵象須注意余接診時先經該署西醫官診治服藥四日未見效熱度甚高醫官認為腸熱重症窒扶斯症囑其迷住醫院以免傳染此症並未認錯隔離更屬當然閲者不可誤解但西醫謂傷寒溫病均為腸熱症不無可議此則希望西醫之有改進思想者加之意也嗣延余診治經診斷為溫症除上列症均有外右脈洪數左脈亦大肺胃初熱僅與以甘汞錠二片每片含量克第一日囑其即服嗣即大解一次隔八小時再服中藥桑葉丹皮連翹銀花菊花豆豉薄荷等藥連進二劑第二日煎服一劑分三次服第三日豁然起床病已痊愈此症若純以西藥治之必成腸窒扶斯重症並無可疑但在此季節七月病象脈象極易認定即中醫所稱之溫症然若投以中藥治傷寒之麻黃桂枝等湯不但不能治病且必加重若投以西藥之安基比林等則暫時解熱而嘔逆更加漸入內矣投以甘汞以內撤其熱實可有效但其表熱不退病變仍可演進以漸至於腸出血等等之危篤重症此所以不得不有待期療法之說矣且甘汞亦不可屢服故中醫遇此症若誤用一部分之傷寒藥桂枝亦在內不可不注意必致貽誤病機此症若不在冬月似不致誤認西醫認症極確實然其缺點在西藥之不能完全適用設使此症用安比退熱用甘汞瀉下理想中似甚得法然絶無大效一試便知勿庸辭費中藥治此症特別有效不必需用甘汞余以張君嘔逆太甚用中藥疏通恐其嘔吐湯劑缺點故以甘汞錠以代中藥所慮者中醫謬於虛僞之古說自作玄深沉晦之談以誤人命耳此症與傷寒究其極必皆腸熱西醫以其病原菌相同故將傷寒溫病認定為一病確實不誤不可不信然中醫對此症之治法絶然不同且均特效則西醫不知也以上所列張君醫驗以余視之原無列入本編之價值然借此一症與前列薛君之傷寒病對照則頗有趣以綏署醫官等皆老資格之西醫其認症斷無錯誤治療用藥更屬精當然對此症治療所得結果何以與余不同乎正以見彼此認症同治法同惟藥物一項中西各異有適有不適耳此余詳列此條之本旨可見中西醫藥實有互相救濟之場合有合併研究之必要中西醫者如欲增長學問切不可分道揚鑣自居於登峰造極之列也溫病中醫論溫病與傷寒分辨最清中藥治溫病更屬奇效可稱百試百驗所慮者誤將此症認為傷寒則大左矣西醫根本即將傷寒溫病認為一病故其治法遠不逮中醫也除預防注射法原因西醫謂腸窒扶斯病菌為本症之原因信然但中醫氣候之說風寒暑濕燥火亦此症誘因之最可信者蓋此症根本致病之由即體內及腸內先有不清潔之微生物或氣體潛伏日久因而致全身血液受其影響肺之功用在呼吸空氣變更血液是以此臟直接先見病狀參照肺循環及皮膚呼吸各條蔓延而至胃腸發現病變中醫所謂某種熱例如暑濕等內伏與西醫病原菌之說吻合又云溫邪由口鼻而入則是本病誘因亦與西醫空氣傳染之義同茲分一般誘因與個人誘因說明之一般誘因誘因者人體內早有此病隱伏因遇某種機會致病象得以形成是也例如肺結核患者早有結核菌潛伏肺臟然其人體格尚強壯足以抵抗病菌因而該病菌不能發展不見症狀一旦過勞或偶因感冒咳嗽失治日久漸漸釀成肺癆因而病重此感冒即為誘因溫病之一般誘因不外氣候之劇烈變動例如天氣忽寒忽暖餘可類推及不潔空氣之吸入所謂穢濁之氣自口鼻而入之類最為的確均可使吾人感受不適設使感受者體內清潔氣血順調則一時雖覺不適不久即復健康或竟完全不受外界影響毫無病狀反之則立時可以感覺疾患多數感染十之八九不能避免病狀大略相同再多則成瘟疫之類此一般共同之誘因也個人誘因此則由於一個人之環境或不慎而誘起本症之謂例如冬口室內溫度過高或常在不潔空氣中工作或飲食不潔或身體過弱之類此種誘因只限於某種人始有釀成溫症之可能大多數人絶不感染中醫所謂冬不藏精春必病溫云云即指此類而言並無何種奧妙之處不可混入玄說此個人之誘因也此症在冬季最易與傷寒誤認非冬季傷寒症絶少然冬季溫病亦有之醫者必注意此時是否氣候有大變動是否有溫症流行再證之病象脈象與經驗細心體認當能分辨嚴冬之季最宜注意初起倘有誤認服藥必見病加例如溫病初起認為傷寒與以麻黃桂枝表證不但不解反而內外大熱口鼻出血之類或傷寒初起認為溫病與以清涼解肌之品惡寒更甚表證加重脈更緊細之類必須及早反轉治法萬不可偏執己見誤人性命初學醫者戒之戒之症候溫病症候亦可分為三期說明之注意三期字樣係以病之輕重言不以深淺言也第一期中醫所謂上焦症頭痛或暈有微惡風寒者亦有否者身熱午後更甚此與傷寒初起最易分辨之點縱或發熱輕重不同但多少總有發熱證象傷寒初起則否口渴初起或有或無自汗或有或無咳嗽多有脈洪大右手尤顯明但初起亦有脈象微大者然絶無傷寒之緊弦等脈也胸悶不食嘔多劇烈此症大多數頭痛極甚而不惡寒此與傷寒不同之點且絶無鼻塞聲重者亦與傷寒不問若在傷寒症頭痛極甚則未有不惡寒者惟嘔噁症傷寒為甚初起之時若以種種症象辨之此嘔症亦不致與傷寒誤認也鼻乾舌苔多薄白或無身痛或酸此為必有之症既不惡寒而身痛或酸更易知其為溫症矣此溫病初起之症候也溫病惡寒頭痛身痛甚者亦必酌量於清解藥中稍加解表之藥例如防風荊芥等但不得與傷寒症相混而誤用麻桂羌活細辛等藥也第二期約在五六日之後所謂中焦症也身熱更甚因第一期即身熱神昏譫語嘔乾嘔噦或厥逆舌蹇若短面赤目朦或頭面腫舌苔厚膩而黃或乾裂或有黑芒刺咽痛口渴欲冷飲腮腫或關節腫各症不必皆具但有一二者多耳聾此症溫病最多第二期多實邪第三期則虛邪不可相混也鼻衄腹痛腹硬滿大便閉或下利小便短赤或有沉澱白粉樣或小便閉脈多沉數有力亦有沉弦而緊小者或洪大而數身痛有腿足腫者或咳喘心煩或發黃或發斑疹凡或字即不一定之詞不可認為各症一併皆發也發疹即西醫所稱發疹窒扶斯甚則厥逆更甚通體皆涼神昏氣喘痞悶煩躁斑疹併發症應列於溫病內則治法自無錯誤西醫既合傷寒溫病為一症統名曰腸窒扶斯故有發疹窒扶斯之名余既認定傷寒與溫病確係兩病故將斑疹列入此類也陷於危篤矣此期以不大便或大小便有異狀腹堅硬而痛為斷第三期約在八九日或十餘日之後所謂逆傳膻中此時脈多不實可為明徵故只宜開宣不宜攻下若脈見實則邪在腸所謂邪入下焦實證當瀉下矣此期之初強半由於積熱太甚治療失當延誤日久而成其現象率成逆症約分三項應下不下溫病一見腸熱徵兆例如腹痛小便短赤或白而濁如米泔水樣大便乾燥或大便少而不爽或瀉極臭之稀屎或腸鳴或輾轉矢氣俗稱之屁再證以潮熱口乾或臭舌苔黃脈實數等症不必皆具總宜視其病情此四字最宜細思此時必有其他兼症例如頭痛醫者必細察之而後加瀉藥於其他藥中與之或緩下或峻下均宜斟酌盡善以赴病機也及早用瀉藥下之溫症最忌濫用瀉藥認定宜下方用之不可輕試凡逆傳內閉多由於此慎之慎之失此不下腸內腐敗物菌已被吸收全身血液受其影響腸熱愈甚漸漸發現第三期之危症例如下利膿血四肢厥逆其則全體皆涼煩躁神昏痙厥舌短目合尋衣摸床狀其危也或嘔逆不止滴水皆吐或脈症相反例如症雖大熱而脈反細小甚則脈閉或乾熱不息稽留脈現結代心臟有停止之虞或喘促自汗或戰汗不出參看前論戰汗皆危症也以上諸症雖危多屬有餘實證應注意誤下此時期病者體力因不勝藥力屢屢攻伐腸胃長期消耗精神氣血均已餡於衰弱毫無滋養及恢復健康之能力本病毒害此時早已轉變絶無毒熱暴烈之實質的作用所餘者不過只有殘頽不振之餘氣與夫稀薄低溫之弱血實邪已退虛象完成故此時患者之脈多現細微或虛數面色蒼白不腹痛便溏或下利清穀或稀水甚或一日數次泄瀉完穀不化小便清白神衰此與上節不同欲眠不思飲食口氣寒涼四肢寒涼此與上節厥逆不同心中怔忡此是煩躁之反面或暮熱晨涼自汗盜汗時時欲脫或皮膚甲錯而乾熱此二字宜特別注意此虛熱也或口燥咽乾津液短也頭重頭暈皆虛象或冷汗出眠時目不能盡合咳嗽痰喘有因而誘起肺結核者神氣淹淹衰弱已極以上諸症皆屬不足但陽虛陰虛參看專條須分清楚不可慨以虛字含混治之誤治此由於病勢前進中或誤信偏方或誤於醫藥當解肌取微汗而不解肌或病重藥輕或不當下而妄下或苦降太早或偏信某醫延誤病機參看醫驗以致表裏氣血均為邪擾醫者見其頭痛寒熱嘔逆譫語狂躁厥逆等症紛紜雜陳再誤用發散升散之藥例如柴胡或溫邪尚在氣分過用苦降及消導之藥或過用瀉藥誤下攻伐無過致令溫邪羈滯日久津液劫爍邪熱膠滯膻中此二字應注意漸漸釀成內閉外脫之險象所謂內閉者溫熱之邪日久不解彌漫胸際無形無質清竅蒙蔽故脈不實應注意神昏煩躁瘓疚不寐甚則發狂痙厥目吊胸挺角弓反張舌短脈閉此種症象危險已極此症因溫邪由氣分入血分膠滯綿延不在腸胃是以發散瀉下均非所宜溫病死於此階段者極多應格外注意也治法溫病治法與傷寒治法迥異而在第一期之治法更與傷寒絶對不同理論亦異若以傷寒第一期所謂太陽表證發汗之藥例如麻黃桂枝羌活細辛等類施之於溫病之表證不但無效必致病勢加劇蓋溫病第一期初得雖亦多有多有二字應注意蓋此症不必盡有此病象也惡寒頭痛身痛等類似傷寒之表證然其內熱先伏此種表證不過外為氣候誘因氣候變動異常所謂風寒暑濕燥火之類六氣之說只作如是解不可太黏滯人當過勞之時尤易感染時邪亦為誘因之一此義與冬不藏精春必病溫之說亦隱隱相通醫者讀書須心領意會不可拘泥文字以致發動內蘊之熱其表證直可謂之副症以溫症先有內熱則宜以內熱為本病萬不可視同傷寒之表證病理寒傷於外治不得法體溫不能放散調節因而鬱為內熱參看傷寒條故溫病唯一治法初得之時入手即須注重內熱二字此第一期之內熱指肺熱言指氣分言稍久至第二期三期則指心包絡膻中及血分胃與腸言之中醫分辨頗精詳可以參考但不可信其太玄虛者然初得之時若兼有表證例如惡寒身痛只治內熱絶難收效若稍有類似之表證不論何季總宜於清輕芳香解熱藥中例如連翹金銀花桑葉菊花竹葉夏枯草佩藍葉鮮茅根之類加入清涼發散藥品例如葛根芥穗防風薄荷白芷藿香之類使其外來之邪即誘因例如偶感風寒穢氣先自解散取微汗內蘊之熱此時但肺熱腸胃尚未大熱應注意同時亦漸因清揚宣透而隨之漸漸蒸發以去此時內熱可作熱氣二字解自知穢濁氣感之理自然表裏雙清約二三劑即愈絶不致演成第三期之腸熱及內閉之重症中醫芳香去穢之說最為可倍中醫謂肺之呼吸感受穢濁及各種不正之氣因而病溫是以上焦氣分先病參閲肺循環條論極精當但此穢濁二字亦不可太拘泥例如南中深山桂花落後鬱黴蒸發氣味芬芳香聞十裏閩粵山中尤多此氣土人渭之桂花瘴凡感受此氣立時頭疼發熱其症與溫病無異所謂山嵐瘴氣即指此類故余以為此症所稱穢濁之氣不可作臭氣解凡不正之氣六氣皆包括也故芳香輕散清涼藥品均極有效西藥中之芳香調味藥絶無效不可誤解芳香二字蓋此種藥品不僅利用藥之芳香且必兼有輕揚一煮即沸清涼兩功用者方為妙用若只知芳香二字則誤人矣又中醫書內有用桂枝湯治初起惡寒之溫症者此藥決不可用茲特表而出之以免貽害病人也此從歷試而知絶非臆斷古書中對第一期溫病有用人參之說所謂勞倦內傷復感溫邪亦斷不可以其當歸阿膠海參等藥亦不可用蓋時邪泛指風寒暑濕而言雖係因勞倦感受例如苦役遠行勞力工作或長途旅行饑渴過甚之類醫者若見其脈現虛象即於治溫病方中加入人參一味全身毛孔必致立時關閉可使溫邪逆傳內閉危症致人死命雖有良醫恐亦無法倪救英服人參未久如見險象可令病人恣食白蘿蔔湯約一晝夜可解此治藥誤非治病也余曾親見因長途跋涉感受溫邪誤服人參而致不救者不知凡幾固不在第一第二期也余戚某十八歲由城內赴其外家騎自行車於烈日下約行四十里因而得病大汗大渴大熱其舅某因知醫者團與白虎加人參湯一劑汗止而神昏譫語身熱更甚某醫又謂係表證與以發汗藥病更危又延某西醫謂當下而嘔吐不能服藥乃以灌腸法通其大便凡十日而死余親見其一誤再誤不能救也然推其致命原因實由於一劑人參遂今外感之時邪無法解其束縛內蘊之實熱無法宣透疏通遂致釀成種種逆症不可救藥矣古方之不可盡信如此學醫者須知也今舉例證明可見人參為絶對禁用品矣第二期之治法本症所稱第二期係指病情演變當然順序之現象而言並非一定經過二期方至三朗例如肺癆病之謂例如本病第一期誤治日期稍久約六七日即可變為痙厥逆症此症即中醫所謂足厥陰症邪入下焦應入第三期即應照第三期治法治之蓋本症之分三期說明者係按病之輕重言與中醫分三焦之說絶無關係例如危篤之肺炎溫病中常有之併發症豈可只云上焦腸出血及穿孔亦為溫病恆有之危症豈可只云中焦至中醫所謂少陰厥陽等下焦症則又強半牽及於肋之症狀更不可以肝臟云云屬之下焦故余對此症只以輕重而分其階段不以三焦論症反致眩惑其中參以西醫生理病理而又採取中醫對本病之精當論斷及方法合而為一似較適合實際而又不失中醫對此症之特長只以節省文字之故對每一一症狀及治法不能一一詳細說明中西醫之所以然及以經驗所得比較中西醫之短長俾讀者根本瞭解奉病之真締是則殊為遺憾者也例如溫病神經系統之特有現象西醫書因為神識朦朧強度重聽病勢漸進患者對外界之反應愈鈍且發譫妄或則狂躁不安敏捷性神經熱或則靜臥無欲遲鈍性神經熱然中醫則分別此二種之神經病狀為一虛一實故其說曰神倦換疚西醫謂之腱跳動亦為本症之一神倦欲眠邪羈少陰但欲寐鄭聲等皆屬溫病中之虛症治宜急救津液以防目閉痙厥由少陰延及厥陰又曰譫語發狂脈不實屬心包絡不瘓瘋但神昏下利譫語脈實屬腸胃實皆屬溫病中之實證治宜分別開竅及攻下以逐實邪而虛證之中又分陰虛陽虛實證之中又分肺與心包及胃腸並氣分血分不能含混論治尋衣摸床等現象屬絶症此中西醫對本病之腦症狀甚則併發腦膜炎立論之大概也考西說對於本症之腦症狀列為必有現象而治法則殊缺乏特效藥品故一遇是症併發腦膜炎則已無用武之餘地矣況不分虛實只以神經熱目之究竟對於遲鈍性與敏捷性之神經熱有無對症良藥至今仍未之聞此時若聽其病勢進行必致愈演愈進不陷於危篤而不止此非西醫醫理之不精實由於藥物缺乏不能以對此症有效之良藥佐醫者之治療不能不有此缺點是以此症之神經症狀西醫講解雖極精當治療上則尚無相當藥品可斷言也此段文字專研中西醫對溫症中之神經症狀及治法簡單說明已覺太冗是以本編論症不能一一比較中西醫之對某病之所以然亦著者之遺憾也可視熱之深淺酌定用藥之標準蓋此時溫邪已半入胃腸所謂中焦不可專用輕清之品例如第一期藥在正規之第二期溫症若腸熱症熱結旁流或大便閉小便短赤腹痛潮熱譫語舌苔黃厚脈沉實而數尚未十分顯露但見大熱口渴此時頭或痛或暈或身痛或肢腫不可認為表證略與緩下或清血熱有特效痰涎壅盛嘔惡神昏煩躁或自汗等症只宜酌與芳香辛開或苦寒甘寒之藥參看醫驗均有奇效此時立方大宜注重輕清芳香之品例如連翹雙花石菖蒲鬱金橘紅桑葉緑豆皮等希望熱從外減內毒亦輕若嘔逆過甚黃連黃芩亦必用之但不可盡用苦寒下降之藥耳均可酌量用之此時期亦間有患關節腫頭面腫者可於上列藥品中加入瀉下藥例如大黃瓜蔞等表熱太高時亦可酌用西藥阿斯比林及撒曹等退熱劑無不大效但此時期中固不賴於西藥若遇中藥退熱太緩時可以用之第三期之治法約分三種三項下應與症候條下對照茲不重敘以省文字此應斟酌其內熱此時外感亦係內熱所致不可誤為表證程度與以芳香辛開苦降之品以為本期之主藥然此時病已漸危於主藥中又必視其現症及脈象脈現虛象亦不可加入補藥加入各種輔佐之藥例如咳嗽痰喘加杏仁橘紅有謂此藥不宜用者不必信也貝母白茅根必重用之下利膿血太甚加芒硝川軍慎用黃芩黃柏白頭翁以及枳實木香檳榔丸等均可酌加小便短赤加通草腸胃積滯太甚而體弱者加木香檳榔丸較大黃芒硝為和平宜注意嘔逆太甚加黃連竹茹黃芩蔻仁大渴口乾唇裂加天花粉生地麥冬皮熱甚加丹皮緑豆皮煩躁神昏發狂加犀角紫雪丹牛黃清心丸均為對症有效之品此時亦有頭痛只宜用菊花薄荷清上焦之藥不可發汗惟戰汗將作參看前論戰汗不可亂與服藥此期固宜以補養為主然病者為係誤服瀉藥太過致成陰虛或陽虛則不可不分辨清楚投以藥餌例如陰虛必有夜熱晨涼熱退無汗頭眩口乾耳聾咽燥二目呆直無神舌無苔或盜汗喘促皮膚甲錯時欲痙脫面目枯槁黧黑脈細數虛弱等症治宜滋陰用白芍生地麥冬天冬沙參元參等或多汗則用介類潛陽法用牡蠣鱉甲龍骨龜板等藥品酌量病情再佐以丹皮青蒿地骨皮知母貝母菖蒲遠志竹瀝花粉麻仁梨汁甘蔗汁等均為有效治法此時有一緊要祕訣無論患者有若何虛象只要時時熱度高升必須注意病者之大便倘有三五日不大便必須酌與以緩下之品中醫用麻仁郁李仁等或稍稍與以西藥之緩下劑以清腸之餘熱不可一味滋陰反致膩生他變而大便之外尤宜注意胃氣必須設法培其胃氣使之復活滋潤鼓動則病勢減退必速用稀鹽酸橙皮酊苦丁等最有速效此治溫病陰虛之大法也若陽虛者必有自汗神倦欲眠二目虛朦睡時目不盡合口氣短寒肢體微涼舌無苔不思飲食不欲言不腹痛大便或溏或瀉清水或完穀不化此完穀不化係久病虛象若熱盛之時亦有完穀不化不可誤認小便清白皮膚蒼白暮熱蒸蒸然或冷汗出或畏寒欲暖或喘促聲微腹脹足腫脈細微等此時必用培補元氣之藥以冀挽救故人參黃耆白朮山藥茯苓等均為對症良藥甚則附子肉桂乾薑皆所必需然於此又應格外注意者溫病至於第三期既現虛證自宜補養但溫病末路患陰虛者十之八九患陽虛者十之一二且陰虛之證雖已出現治療時仍宜時時顧慮到餘熱復燃又成實熱不可一味滋陰致病又反覆若遇陽虛之症更須慎之又慎仔細診斷確知其屬陽虛無疑方可稍稍試與補氣及溫補參耆桂附等之品無與補元氣之藥自然有效至於桂附必不得已時用之可也然於補陽之中仍須顧及陰分所以白芍熟地等滋陰之藥有時仍宜兼用且必須重用為佐蓋溫熱之症津液耗盡乃成此危象若只補陽而忽略陰精恐又演成陽亢陰竭驟然招致陰陽晚鈕不相維繫之險象結果亦必斷送人命醫者烏可不慎耶中醫書有以霍亂痢疾瘧疾均入溫病類中目為濕溫者荒唐不經不值科學醫之一哂然霍亂痢疾之後演成虛證者極多故余此段文字不能不詳細論列讀者須知中醫所謂溫病後之陽虛強半係指溫病以外之雜病而言根本不得稱為溫病與本編上段論溫病陽虛之說為截然兩事此不得不加以糾正免誤後人又以溫病患陽虛者亦非絶對無有故附録於此而加以申明也況溫症誤服補陰藥其禍猶小若一誤服補陽藥真如火上加油禍不旋踵即或誤服人參一味亦足以誤人性命願醫者三復斯言蓋溫病之後不論陰虛陽虛皆在本病纏綿多日之後絶無新得溫病進行中即有虛證者此層須格外注意也此時病象中醫書所謂溫邪逆傳心包絡實為溫邪黏滯膻中氣血交阻蒙蔽清竅為溫病中最多見最危險之症象此時治法專解表邪專清肺氣專攻腸胃均非所宜尤其攻伐腸胃太過不但無效而反害之愈演愈重所以病者此症多在八九日之後於各種熱象參看症候條外現出種種昏迷狂妄甚則痙厥嘔吐頭痛內外皆閉氣湧沸騰湧吐至滴水不受煩悶欲死此時唯一治法必用大劑芳香苦降辛開之品分量自四五錢至八錢例如鮮菖蒲連翹鮮佩蘭葉鬱金此味不可太多金銀花鮮竹葉心鮮蘆根等加以犀角紫雪丹二藥為必用之品但此藥價太昂貴二藥分量亦宜略重一錢左右及安宮牛黃丸至寶丹等酌量何者為宜與服一日三次或沖入煎藥中亦可均為此症極效之品亦為醫者極應採用之法也傷寒與溫病不同之點即在於此傷寒絶無此症只有結胸一症以陷胸湯治之即可然絶非此症余近見有一病婦住劉海胡同二號患此症某醫照録小陷胸湯原方與之烏有濟耶其餘橘紅蔻仁等亦可酌用但非必需品也參看醫驗按此即西醫書所稱腸窒扶斯併發腦膜炎之症考西醫書載凡此症併發肺炎腦膜炎腸出血等症者預後多不良幾併發腸穿孔者殆必死或因心臟麻痹而死此皆基於西醫報告之確實統計當無錯誤余希望再基於中醫報告統計之則有確實之比較矣余在實驗上亦深知西醫此種記載確實不誤然在中醫之高明者心靈手敏一眼覘定邪在膻中及時決定治法如本論十之八九尚能挽回實較西藥之效力偉大理論明通但遇昏庸之中醫則此亦為必死之症也余既深知中醫對此症有此妙法是以坦白録出並舉醫驗以資證明竊願中西對此病症群策群力共同研究除去治療上之缺點及障礙使藝藝衆生每遇此種危險疾患早早脫離其病厄漸漸減少其死亡率實為我醫者之唯一責任明達醫賢當表同情又何必各執門戶之見妄分中西新舊又何必自欺欺人謬稱國粹又何必自諱其短盡諉其過於科學倘能拋除成見實事求是集思廣益取彼所長益我所短使醫療上多一有效之方法豈不甚善余以為中西王益殊途同歸造福千病人者必非淺顯故敢大聲疾呼願有志於世界醫學者共同努力也再論小兒溫病合併症之腦膜炎小兒腦膜炎亦同但單純之腦膜炎發作甚速易於確認及早注射腦膜炎血清或預防流行時腦膜炎伐克辛均能有效然遇失於注射時機或遇窮鄉僻壤無處延請西醫或缺乏血清及伐克辛時則西醫此時即失其特長至若瀉下及消炎等法率多無效參看醫驗此時寧以中醫治之尚有些微希望也蓋此症即中醫所稱之內閉注意此二字症候當其尚未盡失知覺以前必有嘔吐發熱各症頭痛功有但在小兒則不能自訴漸次即神昏或角弓反張二目天吊人事不省而死俗傳以此為小兒失魂巫覡雜進針灸並施無益有損戒之戒之此症西醫除及早遲則無效施行注射血清療法外無他善法中西醫之瀉下法雖屬合理然據余之經驗百無一效且有於初得尚未甚重之時與以瀉劑得下後腦之症狀反而立時加劇者此例亦不少若以中醫學說衡之則為熱邪盤據上焦擾及心包絡徒以瀉下之藥攻伐腸胃對於高據膻中之邪毫不相干且恐幼稚兒童一受時邪灼爍津液已有乾燥膠滯內風眩動傾向此時若再加以瀉藥劫奪傷其真陰遂致陰陽脫鈕孤陽上越故腸胃雖通而病勢反加余基於此種經驗與理想故每遇此症必先注意小兒之二便倘非確實大便閉止絶不濫用瀉藥必須灼見腸熱始與潤腸藥或小量之緩下藥例如中藥之麻仁郁李仁瓜蔞仁或小量之熟大黃西藥之中小量甘汞等然猶必須佐以養陰清熱及芳香開竅之品例如中藥內之金銀花連翹佩蘭葉香豆豉鮮蘆根石菖蒲等且藥量均須加重惟用甘汞時則不可雜以中藥耳而犀角羚羊角牛黃紫雪丹至寶丹安宮牛黃丸等藥尤為必需之品擇一用之或以芳香藥煎劑合入服之完全與治成年人之溫症內閉同一方法施治若早得病二三日以前必慶更生中藥此時比較有效但若遲誤稍久至六七日之後昏迷太重則此種方法亦多無濟矣於此有應注意者小兒體質脆弱一得此症傳變甚速不若成年人之溫症先在肺表以次加重醫者要以精鋭之眼光敏速之手段當機立斷以資挽救病家尤不可偏信西醫除早期之注射迷信西醫坐誤病機以自殺其幼童也中醫須知急驚風即此症別名亦傳染病也醫驗余治此溫病之醫案殆不勝枚舉以此症流行最多四時皆有除冬季須與傷寒症嚴格鑑別外餘時殆不難確認茲僅舉危險症候極有研究價值之醫驗數則藉供參考所列各案或為初期誤治遲延日久八九日後勢將逆傳之症或為邪少虛多第三期之腸出血期危症或為逆傳後之險症或為西醫認為不治之症舉一反三願讀者深思焉魏鳳瑞四十九歲住石虎胡同二號於民國二十六年十月得病第一日惡寒身熱頭奇痛身酸痛嘔惡某醫第三日與以蘇葉羌活白茯苓等藥餘藥記不清楚二劑病加重據云未出汗又請西醫診治服液劑未見其方三日未效又延某中醫診治第一方為佩蘭藿香焦楂枳殼砂仁神曲陳皮絲瓜絡服後頭痛更甚餘症仍然第二方為橘絡槁本砂仁枳實菊花澤瀉陳皮桑葉木通神曲竹葉患者曾自服阿斯比林三次藥片頭痛暫止仍發諸症更甚又加口渴小便短赤大便稀而呈紫黑色舌苔邊白膩中赤又照前方加薄荷大黃三錢枳實三錢服後病更甚已不能起床此既往治療之經過情形也十一月五日延余診治認為濕溫診得肺胃鬱熱內熾灼爍陰液原因感受時令流行不正之氣天氣忽冷外束日久十日未解以致現在頭痛體痛惡寒壯熱嘔逆特甚胸悶口苦咽乾舌苔燥白濁厚小便赤少腰腿痛脈沉濡勢將逆傳法宜宣解兼清肺胃服藥後忌口避風取微汗解第一方荊芥穗錢半牛蒡子錢半淡豆豉一錢金銀花三錢防風二錢炒梔子二錢連翹三錢菊花三錢杏仁泥錢半白芷二錢薄荷錢半旋復花二錢包煎竹葉一錢鮮蘆根引煎服服前藥一劑得微汗病勢稍減頭痛大減仍有壯熱作燒心煩口渴咽乾泄瀉舌苔仍白厚此肺胃濕熱未淨法宜再清肺胃化除濕溫分解之十一月六日第二方小生地三錢薄荷一錢金銀花三錢生梔子二錢滑石塊二錢薑黃連八分連翹二錢薑厚朴一錢旋復花二錢包煎赤茯苓二錢黃芩三錢甘草一錢腹皮絨二錢薑引煎服服前藥一劑病均輕減惟肺胃蓄熱太久上焦火盛灼陰依前法再清肺胃抑止上焦火熱兼以養陰之品十一月七日第三方鮮石斛二錢元參二餞川連八分金銀花二錢生石膏四錢川軍二錢用此藥汆非常慎重薄荷一錢連翹三錢生地三錢枳實二錢旋復花三錢梔子二錢菊花三錢燈心五分引煎服服前藥一劑大效嘔止熱退頭痛身痛等症均退以後即以竹葉等品小劑調理又三劑而愈始終未與西藥此症患者體質極壯是以遲延十日尚未逆傳然頭痛極甚嘔惡亦烈勢將內閉轉成險病余方第一劑所以有效者即能毅然斷定其仍有外感也此與占書治濕溫症之說不合其脈象舌苔時令秋末濕熱顯然然此症至此程度若不急解其表使外寒久束內熱久羈必成逆傳內外皆閉之險症余敢決然排除成說溫症忌汗十餘日後更忌發汗既能決定其表有實邪內熱已無出路大膽即於清熱藥中一部分加入發散之藥以驅逐其外束日久之寒邪而開其外透之門戶第二方為之稍一千旋胃氣即便決然與以第三方之攻下蓋此時已無在表之寒邪牽制不慮其內陷矣不使內蓄日久之濕熱再作停留故加瀉藥使內熱一擁而下表裏均透而病愈矣此症在餘接診之始煞費斟酌最今餘迷惑者即其沉濡不揚之脈此是濕溫實與表證不符乃經多方診察一眼覘定其十餘日後外邪仍在內熱固滯遂將一切拘板之禁忌毅然排除三劑中藥而能令病者脫離危境非敢云膽大心細也設使此症誤汗即不當汗必一劑精神昏迷而發譫語促成其腦症狀內閉設使此症不先汗即攻下必一劑津亡陽升四肢驟厥甚則全體皆涼亦必促成內外皆閉設使此症只與清熱去濕則必愈治愈熱漸漸轉戍內閉再攻下已無及矣醫壇師友以為然否郭校長三十二歲住祖家街北京美術專科學校於二十七年三月三日患春溫症病象為惡寒身痛發熱腿痛尤甚頭痛脈浮洪右手脈尤洪大延余診治認為春溫症當與連翹銀花桑葉竹葉薄荷荊芥穗防風等藥令取微汗第二月病勢均退已復平溫惟足痛尚未痊愈患者自覺已愈遂停止服藥然腿足尚痛約二十餘日方能勉強出門此本病已往治療之經過情形也四月八日忽又病如前狀而各症加甚腿足均腫舌苔白頭痛餘症與三月三日病狀無異而惡寒特甚經診斷認為上次溫邪並未全清醞釀多日因天氣忽涼復感外寒因而誘起內蘊之熱仍宜先以輕劑解表兼清上焦使邪有出路再議清其內熱第一方連翹三錢竹葉二錢銀花三錢芥穗錢半香豆豉錢半緑豆皮四錢薑引服此方後並未見效雖得微汗而惡寒仍然第二日脈洪數餘症同前乃照前方加菊花天花粉梔子與服服後約三點鐘全吐第三日病勢更加已三日未大便頭痛如蒙精神昏迷舌苔厚漸黃口渴嘔逆腿足痛腫更加脈數仍惡寒病勢頗重乃議於辛涼解表諸藥之中加入滋陰苦降之品四月十日第三方連翹四錢竹葉二錢花粉三錢銀花三錢芥穗二錢鮮生地三錢桔梗一錢熟軍一錢寸冬二錢薄荷錢半藿香三錢黃芩二錢鮮葦根三錢引煎服不必取汗服前方得大便一次諸症均大減惡寒已去並未取汗最見奇效者為病者之頭痛如蒙及精神昏迷之症狀皆退左腿尚腫痛餘症均輕減病勢遂有順利希望然尚不能起床十一日照前方去熟軍加滑石二錢梔子二錢服後不如第三方之效十二日加澤瀉一錢亦不如第三方之效十三日乃仍以第三方與服立見大效遂照原方連服三劑腿腫亦消治療約十餘日諸症完全告愈此症雖為單純之春溫然治不得法必致逆傳頗有研究之興味故録之第一即在初病之時本非重症患者因余不受診費不肯再延復診是以勉強告愈以後遂未服藥逮至二十餘日之後餘熱醞釀又發則其內熱已久雖云事隔月餘著眼在此實已不得渭之新病蓋蘊熱月餘其體內血液早巳不清是以腿及足骨節皆腫甚然證以惡寒則又不可忽略其表邪第一次方服之未效餘頗疑不宜用解表之藥然餘實確知此症逆傳緊要關鍵多由於當解肌而不解肌必致外閉輕則肢厥重則通身皆涼當降不降或誤降亦必致內閉輕則譫語發狂重則痙厥竅閉然只與解嘰只與降下流弊亦大解肌之中仍宜佐以清涼芳香宣揚之品以宣肺氣苦降之中更宜佐以養陰滋潤之品以護陰液而後在裏之蘊熱不致因解肌而化燥在表之實邪不致因苦降而內陷此本病第三方表裏雙解之所以大有奇效稍有加減便不妥貼也余當第一二兩方用解表藥不效第三方診斷時頗猶疑餘思此症惡寒顯然何以解表而病勢不減是必由於一月前之伏熱膠滯既久其內熱之實邪已十倍於外感之表證此時法取苦降稍稍照顧表邪自必內熱一退而表邪亦解況內熱之極亦有惡寒醫者須知此病理不可固執凡有惡寒皆表證也又此君習慣服熟大黃一錢必便通故只用一錢微通其便此症有效主要之藥即大黃黃芩生地麥冬而大黃黃芩尤為重要之品其餘雖係輔佐之藥亦均有妙用蓋既佐以芥穗連翹薄荷等辛涼解嘰之品微解其表以防在外之邪因其惡寒太甚因用大黃等苫降而內陷又佐以銀花竹葉清輕芳香去穢之品以防固苦降太甚反與彌漫上焦氣分之邪以入心包絡之引誘佐以生地寸冬等清熱滋陰之品以防因用苦降與解肌反致潛伏血分之邪得以化燥而逞其膠滯頑固之實熱此立方之精義也幸而立著大效一如所期故敢坦白報告以告學者此症此際可輕可重一一藥關係極其微妙願學者於此等分際思過半矣第三方稍為更動立即效驗大減學者應特別注意此症無淪若何惡寒絶對禁用麻黃桂枝柴胡即羌活獨活等亦絶對禁用倘犯此禁一劑神昏漸即逆傳古書謂溫症忌汗應作如是解殺人如反掌也戒之戒之丁君五十三歲住阜城門內東廓下四號人力車夫於二十六年十二月三日來診舁入診室喘促支離已至危險據其弟云病已月餘初病係由南苑拉車至城內大汗又飲涼水遂病倒經數醫診治未愈現在醫者皆辭不治余見病者目呆口開喘促昏沉唇裂若有血痕面目枯槁黧黑問其所苦不能自答診脈右寸關細數已極兩尺脈及左手脈均停而肌膚枯燥猶乾熱不退幸有此耳若現厥逆必死據其弟稱以前病狀發燒身痛大渴現在大便盡瀉血水小便極少亦如血水發燒仍然夜內盜汗不寐心神恍惚口渴詢以前醫治療情形及服何藥已不能記憶此本症已往之經過也余認此症為溫症第三期腸出血之甚者中醫所謂勞倦內傷復感溫病指初得病而言熱邪深入卜焦中醫所謂少陰厥陰症即西醫所謂腦症狀及腸出血也陽亢陰竭病雖月餘陰血雖虧而實邪仍在著眼在此四字學者注意但病已垂危用藥頗覺棘手補瀉兩難不忍不救爰為處方如下先與甘汞錠三個每個含量克囑其先服一個隔三點鐘再服一個視其大便所下何樣如仍瀉血水隔三點鐘再服一個約自午前八點於午後五點服完如服第二個所瀉之物已非血水則停止第三個不必再服並囑多飲白水甘汞藥量極小因病者衰弱已極故也又與中藥方一個囑其夜內十二點鐘煎妥服一次第二日早晨再服一次中藥不可與甘汞同時眼用必須隔開八九點鐘方好第二日午前十二點鐘再來診治第一方鮮生地四錢杭白芍三錢天花粉三錢菊花二錢寸冬二錢元參三餞竹茹二錢鮮茅根二錢引煎服又配與竹葉露鮮生地露銀花露一瓶囑其隨時兌水飲之渴則飲此不拘次數第二日來診據云服甘汞錠至第三個後約午後八點鐘時大便瀉下黏滯如黑豆油狀之物甚多小便由深赤色變黃色仍短口渴身熱稍減仍自汗喘促據病者自稱諸症覺減輕診脈如前仍細微精神略清醒乃以急救陰液論治與下方第二方乾地黃四錢生白芍三錢元參三錢麥冬三錢花粉二錢沙參三錢生牡蠣二錢黃芩二錢丹皮三錢鮮竹葉二錢鮮茅根三錢引煎妥分二次眼仍配與鮮竹葉露鮮生地露鮮銀花露一瓶囑其照前法飲用十二月十日來診已能起立前方共服五劑諸症大堿熱亦漸退自覺腿痛極甚此係得病之先長途拉車勞傷至此始顯每日能進稀粥小便漸多舌苔黃但稍見潤澤精神已清醒診脈左右手均見但仍沉細微數仍以滋陰養血立議與下方第三方乾地黃叫錢大沙參三錢生牛膝三錢生白芍五錢當歸身二錢玉竹二錢天花粉二餞白茅根二錢引煎妥分二次服此藥共服六劑二十二日來診已能步履諸症巳痊愈腿微痛脈漸和平一息六至但有時一止此心臟仍未健康之現象飲食亦加但有虛汗稍活動則喘汗且有發熱之傾向乃以滋陰大意制膏劑囑令常服約一月餘完全恢復健康矣第四方膏利乾地黃二兩知母一兩丹皮一兩生鱉甲一兩生牡蠣二兩青蒿五錢寸冬一兩白芍一兩加蜜煉膏每服一小茶匙一日三次開水化服此膏一料約服月此一例在溫熱病中為較重之症其前半治療經過無從查考然此病者家甚貧想其得病之初未必及時延醫診治迫至病勢加重延醫治療亦恐不能按時服藥以致汗下清涼均失病機溫熱鬱久津液大耗而在內之實邪仍未盡去是以餘接治之初一經緩下病勢力減但此症現象若僅拘泥於脈象萬無再下之理然實邪仍在腸之穿孔已有可疑若只與以滋陰之品勢必助其膠滯無濟於事若只與緩下則實邪雖減真陰愈虧不但虛熱可慮且恐因此消耗驟然發生心臟停止之險以其脈太危險故餘不敢用大黃以此藥刺激腸胃且瀉後又有收縮性也亦不敢用萆麻子油以病者湯水已難下此藥殊不適口且以餘之經驗屢見有虛熱已極服此藥驟然心臟停止者此例亦不少考藥物學此藥極和平此蓋因其滑瀉太甚對於心臟衰弱者大有不良影響歟餘惟恐略知西藥梗概者妄用西藥發生危險故不厭詳細說明此種脈象若用阿斯比林等退熱禍不旋踵此又不可不注意者也此種分際以用中藥麻仁蔞仁等為緩下潤腸劑比較穩妥然蔞仁過用亦能重瀉麻仁效較緩故加減復脈湯中採用之然不如用甘汞之效確實而速故以此緩緩消息之而又以大劑滋陰中藥以救濟之是以得獲痊愈此人幸是貧苦若在寬裕之家初感溫邪及時延醫診治遇有謹守古法之醫者必以勞後感溫四字為鐵板注腳必用人參一劑之後周身毛孔皆閉殺人之禍即基於此雖有智者無以善其後矣用中藥必講中醫之醫理用西藥必講西醫之醫理不可渭中藥之瀉藥即西藥之瀉藥此症中醫滋陰之說精妙絶倫其藥亦確實有效當此千鈞一發之際實不能不推中醫藥為獨步設使此症用甘汞得效後再以西藥繼續治療餘不知以用何法為有特效強心劑耶退熱劑耶清涼劑耶強壯劑耶余於四十年前恆用之至今日余敢斷言均不及中藥之滋陰和平有效也餘希望中西兩醫互濟為用各保其獨立之特長而漸進於世界完善之醫學以造福於人類當有諒餘言者此症完全施診施藥病愈後贈餘茶葉一盒酒兩瓶古道猶存於此證之願我醫者常存此心也何春元六十二歲德州紀莊盧文肅公家農戶民國元年八月余適至盧府患者與余素相識是日餘正進早餐忽聞侍者告余曰何浪堂將死矣蓋患者乳名浪堂人皆習慣呼之余聞之極驚訝乃馳往其家診視至則患者六脈俱閉目瞑舌縮兩手撮空喘息急促已易簣矣無法診察無從施水僅問其家族據云患者初病之時頭痛身痛鄉間醫藥不便僅用紅糖薑水發汗以後即發燒嘔吐大渴耳聾嗣即漸浙譫語發狂頭痛嘔吐更甚延醫診治瀉下數次藥方已無不知所用何藥以意度之蓋瀉藥也以後即狂躁更甚不省人事藥入即吐自得病至此已二十餘日醫者均辭不治此本病已往之經過也余認此症為溫病第三期極危之候中醫所謂溫邪逆傳心包絡竅閉昏痙之內閉外聣是也腦膜炎併發症乃本中醫學說與以芳香逐穢開竅之品以冀化其久滯膻中之熱邪又以病者距城二十餘裏恐購藥需時先以隨帶之紫雪丹一錢用鮮竹葉以院內適有叢竹水化灌眼又用平安散納入鼻內取嚏並未得噴嚏並令速將殮衣除去鄉俗瀕死必服棉衣此時室內既熱病者表亦發熱故令去之約三時餘病者目漸轉動嗣服中藥一劑用小茶匙灌一晝夜方完如下第一方鮮薄荷三錢石菖蒲四錢金銀花二兩黃芩二錢連翹一兩川連二錢吳萸炒鬱金三錢佩蘭三錢犀角二錢橘紅一錢鮮竹葉一兩煎妥後化入牛黃清心丸二粒用井白涼水鄉中無冰將藥隔杯鎮涼以小茶匙頻頻灌入病者口中並將病床上頭略墊高令病者仰臥上半身令稍高時時撫摩病者頸喉部使藥水容易下咽至第二日下午漸漸能自咽藥而口眼亦能自動夜間能語呼渴屢次飲水一夜極多餘藥亦一次飲下第三日晨精神漸清又延余診處方如下第二方佩蘭三錢犀角一錢石菖蒲五錢川連一錢吳萸炒連翹四錢丹皮三錢菊花三錢金銀花三錢黃芩二錢枳殼一錢鮮竹葉三錢橘紅二錢陳皮一錢鬱金一錢化服至寶丹五分作二次分服此藥服後大效已能進飲食啜藕粉一碗診左右手均有脈且右手現洪大脈病者自覺諸症全去唯身體酸軟仍不能動頭暈耳聾以餘急於回城囑令照原方服三劑以後病者又自主張每日服牛黃清心丸一粒又服五日痊愈按此病以前治療經過頗不能詳以意度之不外汗下二法均已用之其病因汗下均不得法遲延至二十餘日是以無形無質之熱氣即溫邪逆傳入心包絡彌漫於空洞高巔之膻中既無形質又不在肺胃血脈徒以苦寒攻奪車溫發表均屬無的放矢與病毫不相干故余宗芳香逐穢開竅之說大劑救援幸能挽回余所治內閉之症多矣未有如此症之重篤者故特識之此症藥費值太昂貧農之家不易措辦幸余表叔盧平甫先生擔任之使此重症得慶更生殊令人感佩此人乳名何浪堂餘小時即與之識病愈後極健壯每進城恆以棗果餉餘後至八十餘而卒至今餘表兄弟等相見扳談均猶以此症為資料也張夫人住濟南西鄉辛莊年六十九歲患暑溫症伊家係洋行職員信仰西醫歷來患病亦均經西醫治愈病者初患寒熱下利嘔吐住城內某醫院治療凡十餘日病勢沉重無法治療該醫院斷為必死之症通知伊家病重迫不得已舁回家中延余及王芝事先生第五鎮炮五標一營軍醫長合診伊家本不信中醫此於無可奈何時始延中醫診治競獲痊愈可見天下事不可執一定之見也病狀脈案詳列於後此為溫病已經逆傳極重之內閉症故歷三十餘年餘猶保存此醫案也第一方脈案暑滯積熱濁垢壅阻不宣頭痛而暈肌燒如灼皖愎鬱悶攻痛泛逆嘔吐滴水不下大解泄稀舌苔膩脈弦滑而緊症係表裏兼重暑熱兼濕法宜苦降辛通芳香化濁以圖挽回占希之年病邪纏綿失治多日內閉可慮合議立方待高明裁定脈案文字有鄙俚句怯以係他人執筆不便干涉今仍其舊鮮薄荷一錢五川連二錢以吳萸八分合水另煎鬱金一錢飛滑石四錢鮮石菖蒲三錢鮮藿香二錢枯芩一錢竹茹一錢枳殼錢五紫蔻仁錢五鮮荷葉四錢鮮佩蘭二錢廣陳皮錢五金銀花四錢法半夏一錢另用灶心土一兩鮮枇把葉一錢通草一錢先煎水八杯再用此水煎以上各藥煎妥二小杯沖入真紫雪丹一錢一杯五分俟藥已冷先將病人鼻孔攝緊不會聞知藥味一氣飲下一小杯日服三次此症唯一難關即係劇烈之嘔吐滴水不存連日在醫院均係注射不能服藥故用此法七月六日第二方脈案服前藥幸得未吐伊家大喜據云十餘日見水即吐嘔逆不止此為第一次受藥也肌熱較退暑滯積熱羈困不宣胸腹痞悶嘔吐稍平煩擾不安神志時時昏迷大解泄溏黏稠便數忽多忽少舌苔膩脈弦滑嘔熱略減此內閉各竅略見開通然仍屬險期再以芳香苦辛宣清通化肅降升達中焦論治鮮石菖蒲四錢川連一錢另以吳萸四分合煎鮮葦根一兩鮮藿香二錢枯芩一錢竹茹三錢銀花四錢益元散四錢麩炒枳殼一錢五連翹二錢鬱金一錢五廣陳皮一錢五檳榔片一錢五扁豆皮四錢高梁米五錢鮮荷梗四錢炒萊蔔子一錢余以此藥味太劣嘔症不欲用之此乇君主張加入並識之紫雪丹八分分二次沖入杏仁一錢通草一錢仍以灶心土一兩照前法煎服七月七日第三方脈案服藥後嘔逆已平此是大效起死回生在此一著痰沫仍多神志不清手心燒灼煩渴痞悶不安大解泄利黃稠而黏重墜腹疼舌苔膩脈弦滑暑滯濕熱與氣互結難期立化再以原方略加宣開之品以冀解除暑滯宣通清竅鮮薄荷一錢五金銀花四錢益元散四錢鮮藿香二錢連翹二錢鬱金一錢五鮮佩蘭一錢五川連一錢五另以吳萸五分煎水麩炒枳殼一錢五扁豆花三錢枯芩一錢廣木香一餞五鮮石菖蒲四錢青陳皮一錢五橘紅二錢通草一錢萊蔔子一錢木香檳榔丸三錢高梁米五錢鮮荷葉四錢紫雪丹八分分二次沖入此藥煎妥分二杯早晚各服一杯不需用手術矣七月八日第四方脈案嘔吐已平肌熱時甚時輕大解熱泄腹疼重墜次數頻多煩滿痞悶口渴思涼神志轉清此是佳兆舌苔薄膩脈弦滑而緊暑滯濁熱留連腸胃症勢雖堿濕熱仍未全除再以原方加減治之鮮薄荷一錢川連一錢五另以吳萸五分煎水炒益元散四錢鮮藿香一錢枯芩一錢通草一錢鮮石菖蒲四錢杭芍四錢麩炒枳殼一錢萊蔔子一錢金銀花四錢廣木香一錢五梔子皮一錢香豆鼓二錢連翹一錢扁豆皮二錢鮮荷葉四錢香附米一錢鮮佩蘭一錢鬱金一錢五紫雪丹七分分二次沖入水煎分二次服七月九日第五方脈案暑滯積熱黏滯腸胃肌熱未盡大解次數雖減所下黏滯未淨腹仍墜痛煩渴痞悶舌苔膩脈弦滑所幸漸能飲食精神已清不致發生他變再以宣通清化肅降為主病去八九可望痊愈矣金銀花四錢炒白芍四錢木香檳榔丸三錢布包香附米二錢鮮佩蘭二錢益元散四錢炒黃芩一錢萊蔔子一錢薏仁四錢廣木香一錢五枳殼一錢五麩炒扁豆皮四錢鮮荷葉四錢川連一錢五鬱金一錢五通草一錢鮮石菖蒲二錢此方約服五六劑痊愈此溫病逆傳最危險之一例最有研究之趣味此症西醫亦斷定為腸窒扶斯並無錯誤何以有用盡種種方法竟不能治愈且愈止吐而吐更甚愈退熱而熱愈甚邪於此可以證明中西醫必各有所長各有所短中西藥必各有所宜絶不能強為攏合余既主張用西藥即講西醫醫理用中藥即講中醫醫理方能徹底認識治法最大目的在使病者不死又何可固執一途耶余主張只學西醫不能完全適用於現代之病症不學正當精純之中醫亦不能適用於一般之病症所可慮者中醫只學淺近西醫之皮毛即自命為通西醫有志之西醫研究中醫又苦於不得良師只於五里霧中自古中醫市儈故意捏造玄虛使入迷惑反將靈驗精純之醫藥隴以煙霧壞根即在於此學得腐敗不靈之中醫即自命為通中醫牽強拉扯直欲將中西醫混為一談危哉危哉殺人之機會更多矣此暑溫與其他溫病大同小異溫病之可以致人死命內閉一症即此症最為難治此方最靈試驗多矣此症在庸中醫必用小陷胸湯再下一等之庸中醫必用承氣湯再下一等之庸中醫見有表熱便解表發汗而用桂枝湯但用小陷胸湯必無效用承氣湯桂枝湯一劑而精神昏迷狂躁必致上竭下厥立成不治之絶症矣此餘閲歷四十年之實驗談並非武斷親見此症誤於中藥者不知凡幾筆難盡述凡遇此逆傳重症嘔逆昏迷頭痛煩躁身熱七八日之後務宜仿照此方法百試百驗也王芝亭君為山東安邱縣老醫經驗宏富邇時年已六旬為全鎮治溫病之聖手余在當時方中年論症多與此君合故此症為余最得意之一例以後遇有此症無不應手奏效也以上所列醫驗多係危篤之溫病不論春夏秋冬各種溫病除略加一二味因時令所用之藥外例如暑溫則加藿香益元散等其最有效之藥則為連翹金銀花桑葉菊花鮮石菖蒲鮮佩蘭鮮薄荷鮮藿香黃連黃芩鬱金牛黃犀角紫雪丹等蓋此症一見內閉徵兆例如劇烈之嘔逆頑固之肌熱精神昏迷或發狂四肢或厥逆即速以以上各藥大劑加減與服百試百驗活人多矣對此症常用之中藥例如生地元參半夏花粉或瓜蔞等用之得當亦有效但大黃芒硝峻下之品用之必格外謹慎雖有必不得已用之者然用不得當則流弊大也蓋此內閉危症純是穢濁上壅其邪不純在腸胃故芳香辛開苦降皆為不二法門其治法遠勝西醫何啻倍蓰此症最難治者為嘔逆及昏迷發狂應注意余治溫病何止千百幸無大誤差堪自信選録各案多係危乎其危並非普通小恙所擬之方均係百試百驗所揭示禁用之藥亦係治此症最易誤犯者竭誠相告願讀餘書者實地試驗也溫病必不得已時脈沉實腸胃大熱方可試用瀉藥總以先用木香檳榔丸或小量之熟大黃或西藥中之甘汞錠分量宜小且不可與中藥同時並用等緩緩下之得便即止萬不可驟用大量戒之戒之認症不確寧以緩用為是溫病當正規之發熱身痛頭痛等症以清解而愈腸熱甚者瀉利潮熱下之而愈人皆能治不必細述所最可畏者即為逆傳心包絡一症致死之由皆在於此醫者認症及病家稍有錯誤必致斷送性命願讀餘書者對於本病逆傳之理論及各醫案三致意焉痧疹痧子疹子瘟疹瘤子丹痧斑疹風疹癮疹騷疹均中醫書此症之別名西醫則分麻疹與猩紅熱二種發疹窒扶斯及藥物發疹從略傳染極速且小兒患者尤多不可忽也原因中醫書謂疹乃溫毒內蘊外感時癘不正之氣而發雖有肺疹胃疹之分風寒暑濕燥火之別實則此症原因極易明瞭所謂疹本六氣客邪風寒暑濕必從火化此火字即足以概之不必畫蛇添足反致滋人迷惑西醫謂本病之原因由於空氣及物體例如患者所用衣物介入者由人傳人之傳染等說亦與中醫說相通惟有創傷之時尤易傳染此理則中醫不講也症候中醫論病無潛伏期前驅期之名稱故此症初起只得先以倦怠為始繼則發熱頭痛喘急咳嗽嘔惡此時鼻涕眼淚加多眼含水痕尤為顯明西醫所謂加答兒性症候是也發熱愈甚顏面皮膚腫脹約三四日或一二日始見疹形發出發熱一二日即出者輕四五日始出者重若至六七日千熱而疹子隱伏不透者最危險一現即隱者更險疹分二種胃疹則如云密布肺疹由點點分明西醫書謂麻疹先必有二度發熱發於皮膚黏膜及結膜例如門內眼內等皮故有流淚咳嗽等現象始則顏面以次至於頸千四肢均現界限分明大如亞麻仁之赤斑其中央有小丘疹甚多發疹朗此時期內熱最高約再過一二日熱漸退第三四日疹乃消第五六日落屑第八至十日為恢復期猩紅熱發熱惡寒咽疼甚劇頭痛疲勞或痙攣或呈腦膜炎症狀閲一二日即有大如帽針頭或亞麻仁之鮮紅色密叢之疹發於頸部及胸部遍及全身蔓延而成紅斑甚則頗似草紅紙色疹中實含漿液膿汁惟口唇及頤部發疹者甚少舌苔初現白色第四五日則為赤色覆盆子舌即中醫所謂深絳色舌苔也中醫肺疹但有顆粒無片狀者之說近似西醫之麻疹胃疹之說如雲密布漫無根盤近似西醫之猩紅熱所謂濕蒸熱盛口舌咽喉疳軟齦腐咽閉穿腮破喉喘促等險象皆係猩紅熱併發白喉及肺炎之症然中醫治此二種疹病之法大同小異雖有肺胃之分實則皆係注重肺胃兼籌並顧原無各別治法似無庸過事區分茲為預防本病之蔓延傳染不得不將麻疹與猩紅熱二症鑑別之點根據西醫醫理分述大略如下麻疹此症特異之點在前驅期第二日終軟口蓋俗稱內上膛之處即黏膜發內疹此時加答兒之症狀極顯明例如結膜加答兒則二目羞明流淚鼻加答兒則噴嚏流涕咽頭氣管加答兒則咽痛咳嗽等再則為麻疹各斑之間必有健康之皮膚中醫所渭界限分明為之界限絶不融合猩紅熱則否往往愈出愈多如一片草紅紙樣其次則麻疹先發於顏面而後及於全身其發熱症狀則在前驅期惡寒發熱一二月即覺熱退輕減此時往往認為偶爾感冒巳告愈乃再隔一二月忽然又發熱遂即漸漸發疹此即所謂麻疹之二度注意此一二字發熱此皆麻疹之特異狀態也猩紅熱此症中醫俗名爛喉痧即此名稱循名責實已可認定此症之性質蓋此症最多併發實扶的斯即白喉重者一二日即腫爛致命口腔齶下腺及頸部淋巴腺皆腫張胙腮等類更有特具之覆盆子舌絳赤色其疹與疹之間愈紅愈重漸漸腫帳潮紅融成一片界限不分且其疹之發生先自鎖骨下與頸部為始而後及於全身但無論如何潮紅面部發疹甚少尤其口之周圍多現蒼白色而無一疹此猩紅熱特異之狀態也此症併發之白喉最為危險不呵不知第三星期以後續發之腎臟灸顏面浮腫尿量短濁有大量沉澱物肺炎等症亦危險故疹後更宜謹慎治法余所以略述西醫關於麻疹及猩紅熱之病狀及鑑別者並非希望醫者盡以西法治療此二症實以此二症尤其猩紅熱一症在大流行時害人最速必兼白喉小兒尤危往往不及治療已瀕危險此時唯一特效方法即為預防注射萬不可偏信中醫致罹傳染此二症在真正之西醫固不難診斷明確施一切防疫方法及治療方法若在窮鄉僻壤缺乏高明醫者或唯讀中醫書缺乏西醫常識之中醫一遇此症治療上縱有最效之方法此症既病之後中醫治法奇妙靈活較之西醫之血清療法或有過之病家亦不可偏信西醫也然村十一一切之預防上實無絲毫設備危險眯甚故余希望中醫具此新識深信預防注射可以根本減少災癘之流行遇此時機中西醫務須合力喚醒人民施行預防注射不幸發現此症務宜實行患者隔離各盡各心拯救病者並非強中醫以注射強西醫用湯劑也然中藥治此症之奇效則不得不詳細說明願高明西醫一研究之至於注射疫苗及血清等係屬西醫專門學問本不正在此書內敘述茲為補充中醫新識起見謹將血清及疫苗注射大意略述千下血清血清者即血液中之水樣成分也有免疫血清健康動物血清健康入血清自家血清等通常販賣之血清皆為免疫血清係用各種毒素注入於健康之馬或牛等大動物之體內使此大動物之體內發生抗毒素注入某種毒素即得某種抗毒素血清再採取之血清即以此採取之血清注入某種病人體內則發生抗毒之力量例如以大量猩紅熱血清注射於患此症之人體內則此人之抵抗病毒之力加強是謂治療血清蓋以此種大量血清注入病人體內則其體內游離之毒素即為此種血清所中和而制止其毒性也若以小量血清注入病人體內以增高其抵抗力而預防疾病之發生者名曰預防血清此不過僅為中醫介紹血清原理故約略述之至於應用血清之各要點例如血清病及過敏性等屬於專門注射之西醫無庸多贅疫苗或稱漿苗或稱疫苗譯名伐克辛或譯為萬克醒等名詞係以各種之病原菌或毒素揀選培養育質完善後再醉死之而製成之品其療法在免疫學上與血清相反蓋血清療法係被免疫而菌苗療法係自免疫也詳言之即血清療法係先將動物免疫而後采其血清再注射於病人體內是用已經成立之免疫體若菌苗療法則以已經培養成之病原菌或毒素醉死之直接注入患者之體內以督促細胞使其自己發生免疫體以防止各種傳染病菌之侵入而成此敵毒體其已病之人亦能制止病毒之增加而收治療之效果此菌苗之原理也菌苗分類有混合菌苗及單獨菌苗之分與血清亦不同茲從略疫苗內精係為細菌之取出物既非細菌亦非其生長之培養基故較其他抗體原少含蛋白質而又無毒素之製品也此種係先由培養基內取出活菌再用生理食鹽水混合而事先提取之液體腓啦克金係含有無數微菌之排瀉物之流質此種液質並不含有菌之本體與伐克辛及血清均不同乃用滅生流動物質之含有微菌廢物由人工微菌育質之培養法所産出者也以上四種皆供應注射用者但除預防注射外治療上之地位亦非百發百中病勢危篤血清治療有時反不及中醫中藥之靈效此余所歷驗而得之認識病家不可不知醫者不可不知也治法名醫治疹大法以清涼宣透四字為祕訣此四字加以解釋則清涼藥味多用清輕芳香解毒之類例如連翹金銀花緑豆皮竹葉等藥是也宣字之義最含妙諦蓋疹之發生肺此肺字不可僅作呼吸器解須參照肺主皮毛等義必先病內外上下之經絡完全為瘟毒蘊釀一種毒穢熱濁之氣體含育混合於營衛血脈三焦經絡之間積不能容因氣侯之誘因所渭四時不正之氣及自己體內之排除力而欲使其向體外全身皮膚及黏膜外口內眼內鼻內以及腹腔內臟腸內均有黏膜即俗所謂嫩皮是也此黏膜外三字係余杜撰排除之在餘之理想可謂瘟毒在體內全部頗似欲酵之物質若治療得宜因勢利導宣透使其發酵完成絶不致有危險先醫創此宣透二字實為治疹唯一妙法蓋此症第一治法初起即須使室內溫暖不可透風更必須令患者絶對避風寒侵襲避忌涼飲冷食在發熱一二日後皮膚紅脹疹將發現之時尤應避忌此即與治溫症不同之點疹一見紅點絶對禁止見風及生冷飲食一犯此禁疹點立即回隱熱毒內陷危險立至常見有發麵蒸饅頭者酵母水分配合停妥溫度合宜勢將發起矣此時忽被冷氣一吹則此麵食立時收縮酵母失其作用此後無論如何加熱蒸氣絶難宣發醫者能明此理即可明廠治疹要訣亦可見避風寒三字之關係重大餘此說雖甚鄙俚然能罕譬而喻也初起所用之藥既有類似之表證頭痛惡寒身熱身痛故宜於清輕芳香解毒藥中略參加一二味清涼解肌之品不可發汗發汗過當則體溫下降血管收縮疹不易出反成逆症蓋體溫不高疹不能出透徹也使患者之皮膚毛孔僅僅鬆動津津然若有汗意蒸潤但並非出汗此際最宜避風例如薄荷葛根芥穗均為適用但亦不用大量自三分至一錢視年令為定以僅僅達到宣透目的為標準但宣透二宇不可僅作解肌講內外宣透上下宣透醫者思想要極靈活是以解肌之外其次即應注意患者之大便如有一二日不大便或大便不爽惡臭或乾燥即是上下不宣透即應稍稍與以緩下之藥於清瘟解毒藥中加入少許之熟大黃或於服中藥之後再隔八九點鐘視其年齡大小與以一至二支甘汞錠此指大人用量一錠含量克或於中藥內加以瓜蔞仁若大便顯然有腸炎之症象時尤須參照腸熱治法格外注意但疹初發時不可任意與以大量之瀉藥以免毒反內陷也蓋宣透二字之義不但外表宣透使疹毒易於發出即內腑亦宜通透不使疹熱在血管內留有餘毒內外上下均有出路血液得以乾淨毒質排淨即是治疹成功所以解肌之藥緩下之藥清瘟解毒之藥必須相輔而行也惟疹出齊後約在六七日至八九日熱甫減退患者往往驟覺輕快任意飲食或出戶外遊戲一經勞動熱又復起體溫上升此時更為危險急以葛根一味加入連殼桑葉丹皮等酌量以前病情藥中速服一二劑葛根一味三歲兒可服五分至一錢餘類推退熱有奇效若有他項續發症應以類加藥例如腎炎加木通等但疹正初發時注意初字萬不可服西藥之退熱劑例如安基比林撒曹藥類及中藥之發汗例如麻黃桂枝等升提例如柴胡等滋補例如生地元參山藥百合等等藥如犯此禁必致危險也常見有普通人發熱往往白服阿斯比林等退熱藥片或瀉藥等最為害事疹病初起尤為大患不可不知疹毒內陷或疹隱太早此際皮膚毛孔早已閉鎖內毒無路可出勢必倒轉入內逼迫逆流危險萬狀最為棘手患者神昏氣喘毒炎熏灼津液將枯有腸潰胃腐肺炎腎炎之危此時挽回生命非清淡藥品所能奏功第一犀角為必需之品次則黃芩黃柏黃連山梔大苦大寒之藥及石膏生地此二藥在初病最忌用一切大涼之藥均可選用或可挽救生命於萬一服涼藥之後若得鼻衄尚有希望於此有一要訣即無論如何處方中始終必須佐以連翹金銀花等敗毒之品且須重量方為周密此症始終治法與溫病相似而實不同看護上更不同茲一列舉如下溫病不忌涼此則格外避忌寒冷切不可飲冷水及恣啖水果等溫病室內宜涼爽此症室內則宜略溫暖且室內宜暗空氣宜濕潤溫病愈後即可戶外運動不致再發此症則自疹退後在四星期內必須室內靜養以肺炎腎炎等危症多發於不知不覺之二四星期後也若一大意小兒尤甚往往續發他症十之八九因而致命而時常注意患者之大便尤為要著此症看護最關重要不可不知也疹子初起不論有無咽疼及白喉嫌疑均應每日用鹽剝水方列後含漱使口內清潔以預防白喉之併發即巳發白喉亦極有效但含漱藥不可下咽小孩在六歲以下不易使用此法必須設法用鹽剝水試其口內先以鹽剝水吸入於皮球內洗滌用令小孩面向下抱之令其啼哭即利用其哭時口開再以筷子一根裹以消毒白布置撐小孩口內而後以注有鹽剝水之皮球嘴對準小孩之口激射之剛小孩不能閉口有筷子撐住可以洗滌口內較之以布或筆蘸藥水塗布拂試之法為良可試用之再鹽剝水漱口治療白喉大效一日一夜可漱十餘次連漱三五日亦無妨此法輔中藥之內服藥不及最有奇效也總以設法用之為宜以疹兼白喉之症頗多內服中藥例如連翹銀花牛蒡子等六神丸有大效恐力緩凡口內一切炎症例如痄腮等亦疹病中常有之症皆奇效故余治此症恆外用漱口西藥而內用中藥百不失一也醫驗余治此症何止千百此種醫案甚多録不牲録茲舉最近較重之麻疹及猩紅熱各一例於下以資參考李滌廠年草四歲住北京崇文門外雷家胡同九號於民國二十七年三月初八日患疹初覺身體倦怠一二日後惡寒戰栗身痛遂不能起床繼則嘔吐咽痛甚劇體溫上升脈實數頭痛口渴一日之間並發白喉極劇舌苔絳赤發熱約三日密叢之疹即發現自頭部以下遍及全身彌漫而為紅斑疹內含有漿液濃汁中間曾延西醫臨診認為猩紅熱病囑其速住傳染病院並未與藥此症自初延余診治即認為猩紅熱併發白喉處方如下第一次方第一日硫苦一重曹一頓服此時倦怠尚未發熱詢其在外飲食油膩太重故先與此方又方鹽剝一蒸餾水四含漱不拘次數此方自初病共用六利約七八日未斷第二次方第二日緑豆皮六錢連翹八錢桑葉四錢竹葉四錢薄荷一錢菊花二錢金銀花四錢花粉四錢丹皮四錢牛蒡子二錢鮮葦根三錢引煎服此方在疹太發之前尚有惡寒頭痛各症眼藥後得病第三日疹即發現遍身奇癢如痱含膿喉頭義膜白色甚大且蔓延極速囑令頻頻以鹽剝水漱口延清西醫臨診即在此時期然並未開方第三次方緑豆皮八錢連翹八錢竹葉二錢桑葉四錢薄荷一錢金銀花八錢花粉四錢丹皮四錢牛蒡子二錢熟軍二錢鮮葦根三錢引煎服此第四日方疹已出齊喉症稍減唯已四日未大便故於原方加熟軍微利之以防未然第四次方照前方減去薄荷一錢熟軍二錢餘同前方服第三方得大便一次一切症狀都輕減只以清瘟解毒為治此方連服五劑病已痊愈囑其慎防疹後續發各症不可早出戶外約在室內靜養四星期完全恢復健康矣此症初起用硫苦重曹輕瀉係因患者連日在外酬應困於酒食為此症誘因故起首施以緩下俾腸胃清楚易於施治奉為對此君特殊療法若在普通疹病患者未見大便燥實萬不可先與瀉劑以免流弊蓋此症雖以瀉下為宜然亦不可冒然從事若在小兒更不可輕率也又此症中間因喉症甚險除用鹽剝水含漱外於服湯劑後曾令兼服六神丸四次一日二次合併志之女孫惟靜未周歲七個月乙亥夏北京麻疹大流行殤幼孩極多率因合併症腸炎腎炎及肺炎致命餘之兩女孫一男孫均罹此症而惟靜年最幼病且最重均得治愈茲録惟靜一例於下初病倦怠不樂吐乳發熱旋復平溫越二日又發熱此是疹前一定熱型所謂第二次熱也嘔吐噴嚏咳嗽流淚所謂加答兒症狀是也哭泣與下方第一方連翹二錢花粉五分丹皮五分葛根五分竹葉一錢薄荷三分緑豆皮二錢杏仁五分貝母五分鮮茅根一錢引煎妥分服一日三次此第二次發熱後之方服後疹漸出仍服此方又二劑全出四日熱仍不退且喘咳胸高神昏不乳又加腹瀉日十餘次稀水至下午熱更高四肢厥逆角弓反張二目天吊幾至氣絶似無生望曾經注射沃母納丁一次無效不得已已移置地上乃與第二方第二方雲茯苓一錢生白芍一錢杏仁一錢連翹二錢浙貝一錢桑皮一錢水煎服仍分三次與服乃服藥後竟有奇效咳喘減輕且能穩睡是好現象乃就原方加山藥五分去桑皮服後病又加急又恢復原方與服立效分量均加一半神即清醒咳喘亦大減收效竟出意料之外於是仍照原方再服二劑瀉亦漸止又眼兩劑原方未改動競慶更生此症第二方應與咳嗽肺炎門醫驗參看此疹病併發肺炎腸炎之重症也凡疹病不論何種均以大便通利為順故中西醫書均以瀉為無妨此症因年令太幼氣血未足一經疹熱繼又併發肺炎因而腸及腎臟均已涉及發生炎症其腦症狀驚風更甚實為萬分危險然服第一方三劑而熱不退幸而疹已全出注射沃母納丁而熱不退病勢進行若按正規之腸炎肺炎腎炎腦膜炎等之治法除與瀉劑外將別無他法可循矣然餘再三尋思此孩未滿周歲熱毒纏繞已六七日初病之先家人曾令服瀉劑餘不知也害即在此其瀉也必其腸胃將失生活力其神經痙攣必其腦脊髓將失生活力使然以幼稚之臟腑元氣因早服瀉藥已經大損故不勝熱毒久燃而又病係熱性投藥又不能不顧及病性故餘冒險而用白芍與茯苓此二味在疹病可謂禁用品以白芍之收斂茯苓之滲利對於熱邪爍津炎症紛起之病孩實覺萬分不宜然一思此病之反面則此孩生活力實已漸漸缺乏邪旺正虛若再加以瀉藥瀉之餘恐不但不能消炎且恐速其死亡蓋殘餘之生氣已屬有限於此時再與降下勢必津液立枯斷送生命矣余不得已乃於連翹二錢重用貝母杏仁桑皮各一錢之方中大膽加入茯苓一錢以扶脾利濕白芍一錢以斂陰補肺孤注一擲初不料其果茯奇效如此也余本此理想於第二劑中去桑皮加山藥病熱又重急恢復原方仍用茯苓白芍以至疹愈可見原方第一劑中輔佐之藥亦甚得宜而山藥補性過於茯苓故不適用於熱性病也余治疹疾何止千百惟此症可云反治實有研究之價值故特録之無一字虛僞也余族孫壽齡前年來京寓病疹餘為處方中藥意欲為其試用血清療法因見報廣告中有某醫專用血清者延之來入門後接談此君自命精通中醫余乃出示所服方此君見有薄荷一錢乃竟當面大加駁斥詢知係余之方謂一錢薄荷足以致命余向不欲多辨只得唯唯受教及請其治療則僅開一枸櫞酸等之普通清涼藥方而去余知此方無能為也乃仍令服余方嗣即痊愈余任醫官長經歷有年所實驗中西藥已四十餘年雖係才淺學疏然已薄有經驗近雖衰老仍在求知時期中絶不敢稍存自滿之念此君年僅三十餘歲乃竟當面駁斥余方可謂直入然中醫治此症唯一妙訣即在宣透內外斡旋清濁常使肌膚鬆動務令蘊蓄之疹毒時有出路未發之前不致固閉既發之後不致倒隱其重要關健全在活動肌表疏導腠理此種妙用證之實驗詢稱高人一籌是以一味解毒或過用苦寒而不知時時注意於宣達肌膚因勢利導者皆下工也薄荷菊花對此義可謂吻合較之葛根芥穗等對疹熱尤覺清涼可喜四十年來診治疹疾所以未曾失敗者幸有此耳余對醫術上甚願受人指教即如此君亦所心感但此症並未服此君之藥仍由餘個人治愈之足以證明薄荷對疹疾用量不大實有確效而無流弊佐使得宜餘更可因此君之言論而作此段之真實的報告也凡對某一種學術未經深研及實驗多年確有見地萬不可冒然批評中醫稍知一二西藥西醫稍知一二中藥再閲幾年中西醫書即自命為中西兼通自欺欺人為害甚大願高明有志之醫者不可入此歧途也痢痢古名滯下俗名紅白痢疾又名疫痢指大傳染時而言西醫名之赤痢則為急性傳染病之一種中醫又有噤口痢休息痢等名則與慢性腸加答兒相混不足為訓原因中醫大概以濕熱積滯四字為本病原因西醫則以病菌之傳染為據症候本病以數次之下利先瀉稀水及全身倦怠或嘔惡而起排便時覺腹痛裏急後重繼則排瀉黏液膿液血液甚則為爛肉樣一日之間約數十次發熱或惡寒此為正規之赤痢最重者熱度愈高腹極痛脹純瀉血水極臭之物所瀉之物如西瓜湯樣脈沉數者居多危險愈甚則脈愈細小此時將有穿孔性腹膜炎之嫌疑凡老人及吸食鴉片者俗名煙後痢患此症尤危險若在本病大流行時更應特別注意也此症除預防注射外治療愈早愈妙凡在此症大流行時一覺腹痛大便不爽或數次水瀉即應速服瀉劑治療中食物禁忌生冷及不易消化之物凡堅硬食物及肉類均忌只宜用稀薄米粥及藕粉緑豆粉等流動食品牛羊乳絶不可用此點余由經驗得來非故與西醫說法反對也初期腹痛所服瀉藥以西藥甘汞為適宜此藥有殺菌性故較其他下劑為宜考西醫書稱植物性下劑無益於本病此說不確試於極重之赤痢加入大黃不但消炎且能退熱一試便知參看醫驗不可盲從也用中藥初期則宜於消導積滯之處方中神曲麥芽山楂之類加入枳實木香厚朴檳榔之類順氣之品腹痛後重甚者多加之自然收效審其內熱太盛小便赤短紅痢漸久口渴身熱腹痛更甚再加苦寒清熱之品黃芩黃連梔於之類嘔吐必重用之病勢再進則腸熱將生他變皮膚潮熱注意此二字痢毒菌侵襲大腸後則皮熱更高腹痛更甚瀉痢無數日數十行精神昏蒙所瀉之物或成爛肉樣或成西瓜湯樣脈反小數嘔惡不進飲食危期至矣此時必用大劑重量之苦寒黃芩黃柏白頭翁之類滲利茯苓澤瀉之類瀉下之品大黃此時並非重要只用熟大黃一二錢領導之自有神效連服二三劑必能挽回險症若在大流行時疫痢尤須參照溫症治法不可一味治痢運用中藥靈活圓通方能見中醫醫術之精奇痢疾至此人始知此症之可以致命也死於此際者多矣但中醫對痢疾稍久慣用之白芍烏梅甘草生薑當歸半夏等藥不及西藥收斂劑之善凡遇有熱腹痛之痢疾日期未久者萬不可早用戒之戒之治新得之疫痢自始至終各方中稍加清熱利濕銀花黃芩澤瀉之品為有效治法不可不知但應用西藥時不可妄行加入中藥也重症痢疾將退消炎之時往往服中藥後不必瀉藥即清涼藥亦然反瀉甚停止眼藥則稍安此為病不勝藥可以小劑分利消息之或與小量西藥之收斂劑等自然痊愈庸工見其尚有膿滯後重於此際數數仍與以降下苦寒之藥以為前已見效以為熱仍未清則必漸生他變所謂噤口痢約十餘日至二十餘日休息痢等即由此階段演成之又赤痢經過下劑屢用瀉藥病勢已全減為日已久仍瀉痢或有腹痛不止者可用西藥單那爾並阿片末等收斂之自愈但此法不可用之太早以防弊慎之慎之中醫治久瀉有痢疾轉來者往往參用補養參耆朮附收斂白芍吳萸烏梅等等藥謂其日久正氣已虛亦自有效但必須泄過數月後毫無實證時方可用之此症不得仍以痢疾名之可參閲瀉症篇後重俗稱下墜甚者內服中藥外用西藥洗肛法為最效洗滌液以用藥皂水或硼酸水為宜器械尤須注意消毒中醫治此症尤其對於極危之赤痢可謂特效參看醫驗願高明西醫取此法以補西藥之缺點也久瀉亦有白油樣之物亦有下墜之感亦有腹痛不可誤認為腹痛屬實積滯未盡此時應用中藥之補劑或西藥之收斂劑方效此理於久瀉症下詳述之可參看中醫於慢性腸炎及慢性腸加答兒往往與久痢混為一談不能分別故有休息痢噤口痢久痢等等名目現之新久不同治法亦異不必仍以痢名徒亂人意故餘另列久瀉一症於後蓋實證失治日久變為虛證由急性轉為慢性不可牽連以前病名反令初學醫者枉費腦力也醫驗張太夫人年七十餘歲住德縣南門東街於民國四年夏患赤痢前數日即倦怠酸軟漸即水瀉以後成紅白下痢腹痛裏急後重俗稱下墜繼則排泄黏液血液膿汁樣糞便一日夜約數十次漸發高熱小便短赤舌苔黃左腸骨窩壓痛尤甚脈小數氣喘神昏以體溫太高嘔惡口不渴經過二日所瀉之物完全血汁如西瓜湯樣腹奇痛肛門因瀉被刺激發炎而疼痛高年之人煙癮又重頗為危險索閲以前所服之藥茯苓澤瀉車前子白芍甘草陳皮神曲木香麥芽山楂消導滲利只治普通輕痢未能中病余既認定此症為赤痢且已侵及大腸當本病未犯大腸時體溫不高及侵至回腸之下部則呈所謂窒扶斯樣症狀之熱型即發高熱引起腦症狀故神昏也有誘起腹膜炎之嫌疑特與下方第一次方茯苓一兩鹽川柏四錢白頭翁四錢黃芩四錢熟軍二錢丹皮二錢砂仁五分枳實一錢水煎服分三次一日服完服此藥二次之後不及半日所瀉便數已減少腹痛亦減熱亦減精神略清醒啜百合粉粥半碗已二日未進飲食肛痛亦減外用硼酸水洗肛三次服完第二日再診精神清醒熱亦減退諸症竟去其大半可謂奇效一日夜間只瀉六次乃與下方第二次方茯苓一兩黃芩四錢鹽黃柏四錢白頭翁六錢熟軍一錢木香煨一錢炒銀花三錢枳殼一錢水煎服仍作三次一日服完此劑服完第二日再診熱已退只瀉三次已思飲食能吸煙矣囑令以果汁鹽一小茶匙對檸檬露及開水當茶飲以活動胃氣仍照原方減去熟軍其餘藥品分量仍舊又連服四劑而愈此症中醫注重濕熱及食滯確有至理普通治痢之方消導順氣滲利在輕症之痢疾自然有效若係重篤之赤痢專用上法不但無效且恐貽誤病機此一例為張太夫人余友張松泉君之母也當其得病之初所服之藥即普通治痢之方前醫某君與松泉亦係至友其人醫學平妥而極虛心令人飲佩此症服藥數劑無效亟勸松泉延余診治余見此症甚險惡非用大劑苦降之品不足挽救立方之始若非松泉有極深信仰亦絶不敢用余之方以庸工論調多以年老之人及有煙癮者對此症絶不可用下劑且不明皮層發熱為腸將潰爛之病理往往於普通治痢方中加入收斂或解表等品自命穩健實則誤人故吾鄉視煙後痢俗名為必死之症若在老年更無治法矣猶憶民國七年夏曾治一張虎臣將軍之赤痢行營在武昌近年治一馬仲孚住德縣馬家溜口街皆煙後痢之重者當時醫案與張太夫人之症治皆同均獲奇效余創此痢治法屢試屢驗其藥味藥量均不可增減特記之以告學者王夫人年三十餘歲住縣南門東此王質齊君之夫人光緒二十六年秋間患瘟疫併發瀉痢延余診治病者受孕已六個月身體素弱這日所瀉皆血水腹奇痛小便不通近已唇青絶食目閉肢厥日夜瀉痢數十次次前醫皆用利濕扶脾法未效腹痛更甚診脈浮洪沉之則虛斷為暑濕久受而為熱肺金失其清虛之令而小腸化理之源絶矣脾為濕土久瀉愈弱病已二十餘日正氣愈虛脾胃益敗前醫不清肺而利小便是謂舍本求末不顧正氣以培脾胃是謂無米為炊所以愈分利愈耗氣正氣愈虛邪氣愈盛以致唇青目閉絶食肢厥皆虛脫現象倘再墜胎大事去矣為今之計亟宜補元氣以壯太陰清肺金以理化源庶有濟耳舌苔純黑乃經氣散溢未可指為實熱再議苦降也第二次方赤芍二錢白芍二錢赤茯苓四錢白茯苓四錢白朮四錢半酒條芩四錢寸冬五錢生山梔二錢澤瀉三錢豬苓二錢陳皮二錢當歸二錢蓮子心三錢苦參一錢鹽川柏三錢砂仁三分鮮梨汁沖入煎服此第二次方也以此方為最效服後每日瀉只三四次諸症大減小便亦通第一方中有高麗參五錢白朮一兩服後精神漸蘇泄瀉略變稠黏此病共服藥二十六劑痊愈立方大意均如此遂慶更生第一次原方及前醫原方均詳載於余著之恫瘰集中以此書未在手下無從抄録此胎前疫痢為余四十年前得意之醫案原理論牽及五運六氣及批評前醫此為吾鄉前輩名醫之處理解缺缺均為余近來所不取此症危甚當時自信太深大反前案檢點曩昔處方不寒而栗然此症確實由余治愈故至今不忘因録於此俾學者與前張案對照庶知中醫對赤痢當時尚無赤痢名詞治法之活動圓通真有研究之價值而余少年行醫之膽大心粗亦可為前車之鑑也余治赤痢之醫案極多録不勝録以上二則皆赤痢重症對於治療上又有特別障礙者一有煙癮之老人一有墜眙之危險頗有研究之趣味故選録之咳嗽咳嗽中醫咳嗽病名太籠統本編所列之咳嗽近似西醫急性傳染病之肺炎及氣管支炎一類之病症凡輕微之咳嗽及慢性傳染病之肺癆小兒之百日咳均不在此例中醫對病人初起之咳嗽往往不甚注意在感冒風寒或輕微之咳嗽一經治療或即自愈然若患者罹真正急性傳染之肺炎再遇毫無西醫知識之中醫往往誤於醫藥致傷人命此非余輕視中醫在西醫診斷治療此症絶不致誤然中藥更有奇效惜中醫書太冗雜耳蓋以中醫書論咳嗽謂五臟六腑三焦皆能令人咳嗽說太支離向無急性傳染病之名故中醫對此危險之大傳染病竟以咳嗽二字概之貽誤病家不知凡幾小兒患此症尤多且更危險故余特為說明願中醫注意也徐玉泉者余友也伊充吾鄉慶祥茂商號之經理一日患病余聞之急趨視玉泉正苦咳嗽胸痛不能臥下診斷結果認為格魯布性肺炎余即親赴西藥房力其調劑送回令其速眼至晚間又往視之則見其正煎中藥且玉泉見余有慚色再視案上則西藥仍在並未開瓶坐間且有中醫某君親為煎藥蓋亦玉泉之至友也余處此場合頗覺為難乃辭出七八日後聞玉泉已病重因往伊家作友誼之探視至則五泉已病危自始至終吐鏽色痰不能臥下腎囊及腿均腫甚然某君仍晝夜盡心調治不離左右其真摯友愛之情令人感愧所可惜者中醫書初無肺炎二字之病名不得不謂為一大缺點而醫者為人治療疾病有時格於情勢不得盡其所長亦余醫話中之重要經驗也原因本病約分兩種所謂氣管支肺炎格魯布性肺炎是也中醫往往將此等病症概括為咳嗽一門且多認為小病不甚重視以致冶不得法釀成危險大症者數見不鮮實則中藥治此症確實奇驗不可泯沒只要中醫參照西醫病理認識此症謹慎治療絶不致誤人性命故余謹將此症根據西醫病理說明於下以補中醫之缺點也氣管支肺炎此症係由氣管支傳達於肺之急性或亞急性炎症多局限於肺之一小部並生無數病灶該部之氣泡內則有滲出物痰充滿其間所謂加答兒性肺炎是也本病直接原因係由細菌先侵小氣管支而後波及於肺故多續發於麻疹痙咳百日咳流行性感冒窒扶斯其次則因吸入刺激之瓦斯及蒸汽或因異物侵入氣管支均可誘起本病老人及小兒均易侵犯尤以小兒為最多而小兒於麻疹後尤易傳染且多危險格魯布性肺炎其原菌為雙球菌感冒及外傷為本病之誘因嗜酒家尤易感染症候氣管支肺炎於診斷上最為緊要者即為熱之狀態本病之熱型極為不整有強度之馳張不分利而徐徐渙散脈搏非常增加數脈咳嗽頻發呼吸亦增加微喘咯痰為黏液樣稀痰若肺臟大部分被侵害因分泌物痰阻於氣管則呼吸更覺困難小兒不能吐出痰液愈危險死亡數亦愈多熱度增高神識不清凡衰弱小兒由於疹後傳染者更危險本症體溫恆持續二十四及四十八小時以上又在三十九度以上若單純之氣管支炎則無高熱咳嗽時有胸痛注意並皮膚蒼白均與單純之氣管支炎不同此症小兒患者胸挺目吊已至危險期格魯布性稠痰極黏肺炎本病與氣管支肺炎相反多數以忽然寒戰或嘔吐而起嗣即發熱達四十度以上胸內刺痛尤以咳嗽及呼吸時為甚脈強實初起乾咳第二日後則吐血痰再經二三日則為鏽色痰微藍色諸症持續高熱亦不通稽留約七八日而胸痛為奉病最重要之症狀尤應注意熱多分利下降痰之稠黏及鏽色亦為診斷上主要之點其餘則有不眠譫妄頭痛小便赤短舌苔黃厚大便祕結等亦可供參考老年人及小兒患者尤危險此症分充血期變肝期肺腫似肝樣融解期盡成膿汁皆屬於解剖病理茲從略本病體溫率稽留數日則分利下降然分利過早假性分利則溫度恐仍然上升後再經一二日乃呈真一分利而退熱以上二種咳嗽多不能臥治法西醫對於以上肺炎之療法多用下熱劑水治法溫浴冷浴祛痰劑麻醉劑強心劑等均有確效其預防注射於本病大流行時尤為必要不可忽略惟冷浴治法不但不合於中國人之習慣且實際上亦無多大之效力反有增加病勢之流弊此余由經驗所下之斷語不可以其治法來自西洋即冒然認為金科玉律也中醫有治此症極效之藥惜中醫多半謬於種種古說用藥濫雜反致誤病蓋此症初起多有寒戰繼則發熱乃一定病程中醫往往認為感冒傷寒而忽略其本症於是發散辛溫之品紛進而病勢愈加逮至病重又按其發現類似之病症成方成藥遵古雜投例如肺咳心痛喉仲介介如梗狀則用麻黃湯肝咳脅痛不可轉轉則脅下滿用小柴胡湯腎咳則腰背痛用麻黃附於細卒湯等之謬說不一而足設使肺炎既重若覺心痛則疑為肺咳用麻黃湯若覺脅痛則疑為肝咳用小柴胡湯若覺腰背痛則疑為腎咳用麻黃附子細辛湯等試問此種藥物用之於正在進行之肺炎是否殺人真令人不寒而栗矣然臨症之中醫用此方仍振振有詞曰根據古書脈症用藥相符而病者死矣嗚呼孰殺之創造無稽謬說之古書與夫篤信古書之醫者殺之也余臨診此種危症檢查過去所用藥方十之八九不出此範圍尤以此症治不得法久咳不止謬加收斂藥品更覺荒謬絶倫此雖不必盡用成方然剪裁成方湊合而成以至釀成大患者不知凡幾病者哀求家屬環泣病已至此余亦只有憐憫耳猶記一十四歲之幼子抱其一息僅存之病父微微呼曰羅先生來矣這就好了其聲幽咽令人聞之酸鼻此景如在目前此即死於肺炎之一例也心所謂危故不覺言之過激願中醫猛省也而小病釀成大病以致誤人性命良可慨矣此症在西醫預後雖不無多少危險然以奇效之中藥治之余敢斷言百不失一茲謹將余經驗治法說明於下凡咳嗽初起甚重第一日熱度甚高惡寒時間太長又兼頭痛身痛脈緊又在冬季注意此二字當然按照表證於治咳嗽藥中杏仁貝母蘇子桑皮橘紅藥量適宜加入表散之品蘇葉防風甚則加麻黃藥量宜輕微微取汗薑三片梨一枚為引經過一二日若無效惡寒必去咳嗽發熱更甚即有肺炎嫌疑注意不可發散萬不可再用表藥發汗此際必以大劑相當之品例如霜桑葉緑豆皮竹葉杏仁粉丹皮金銀花川貝母鮮生地鮮蘆根每味四五錢或五六錢至一兩痰多可稍加橘紅等以冀消炎若係疹後自初即不可用表藥更宜重加連翹藥量加至七八錢可也更須注意患者之大便此是要訣不論如何均宜酌加瓜蔞一二錢若有高熱而大便又三四日不通或瀉極臭之便即宜於原方酌加熟大黃若小兒胸挺氣促神昏不可驟用大黃若大便閉亦可用宜於前藥加犀角羚羊角三五分但前藥之量宜減此症初起雖以惡寒戰栗而起但其惡寒時間若甚小且非冬月寒涼而脈又洪數者右手更顯明總以不用表藥防風蘇葉麻黃等為是而表藥中之桂枝一味尤為大忌臨症時應格外注意也高熱有時參用西藥之撤曹及安其比林等不可忽視此症唯一奇效之中藥已如上述此外中藥治嗽之品不可濫用此實余經驗之談願醫者相信也此症本非必死之病而吾鄉則死於此者木知凡幾均余所親見十之八九皆藥誤人惜哉醫驗嚴宅幼科一歲住東四牌樓汪家胡同十五號於二十五年九月二十六日來診咳嗽喘促神昏身有高熱目閉胸挺詢知以前曾眼藥發汗現在病已數日不能食乳小便短少兼有白粉樣沉澱斷為肺炎波及腦膜及腎臟均發炎症屬危殆因以經驗之方清肺之劑與之並介紹西醫囑其速行血清注射療法其方列下余曾主張中醫不可濫用炎字本編說明病症用此字係希望醫理易於明顯並非醫案也第一方丹皮一錢緑豆皮二錢竹葉一錢桑葉一錢杏仁一錢貝母一錢瓜蔞五分鮮茅根一錢梨一枚引煎服囑其煎妥分六次一日夜灌下乃第二日來診竟諸症皆減大有轉機亦未請西醫注射惟大便未通痰多而精神則略清醒乃照前方大意加減與之其方列下第二方丹皮一錢緑豆皮二錢竹葉一錢桑葉一錢橘紅三分杏仁一錢貝母一錢天花粉一錢熟軍五分通草一錢鮮茅根一錢梨一枚引煎服囑其仍照前法服之第三日來診已退熱咳嗽亦漸止小便沉澱漸少大便瀉一次極臭諸症均減精神清醒乃與第三方仍本第一方大意其方列下第三方丹皮五分緑豆皮二錢竹葉一錢桑葉一錢杏仁五分貝母五分金銀花二錢瓜蔞仁三分寸冬五分鮮生地五分橘紅三分鮮茅根一錢梨一枚引煎服囑其仍照前法服下此方連服三劑完全告愈始終未用西藥本書正在付印時此孩又患此症喘熱甚重仍以此方加重藥量治愈兼用撒曹六次並識之此等方治愈肺炎重症不知凡幾藥雖平常效實奇人其藥量計成年人可用至七八錢亦無妨惟藥量太輕則無效雜以他藥亦無效此方幾成標準方矣以上醫驗係一歲量餘可類推前於疹疾門列有女孫惟靜併發肺炎極重一方可與此參看中醫治病最活其長處即在此宜細參之咳嗽症關於肺臟之西醫病名極多凡有熱性之新得咳嗽除肺癆外此方統治故不列舉肺癆肺癆此症包括於中醫書所稱癆瘵虛勞咳嗽肺痿肺疸失音吐血等病名之中殊嫌含混茲揭肺癆病名似較扼要此症已於前病理學中陰虛發熱條下略說明之可參看此症雖多以咳嗽及吐血為病徵然其根本來源即在虛弱二字所以此症自始至終亦有不咳嗽吐血而死亡者若將虛弱根本治愈使之強壯則咳嗽吐血發熱自汗等現象亦隨之而去可見咳嗽等症狀猶本症之標病也近世震於西醫肺結核為慢性傳染病並無特效根本治法之說遂以為既得此症必無生理新識愈高惶恐愈甚其實此種心理皆一偏之見倒果為因不能不有多少之錯誤蓋皮毛醫者論此症根本對中西醫學並不能作精密之研究其言固不足以信即或學理研究已有相當程度而又缺乏長時間臨床之實驗驟下斷語亦必不能中肯西醫說非不可信但彼只根據西醫之學理與解剖而立論學術雖至精當然只囿於一方中醫古書散漫龐雜不合邏輯而又參以各種荒唐不經之玄談操以不學無術之庸醫致使靈驗奇效遠勝舶來品之中藥埋沒弗彰此輩罪不容誅矣余凡百學問事業皆不如人然對於中西醫理尤其對於肺癆病一症實已消耗四十餘年之心血乃至現在學理方面實驗方面根據本明瞭此症之所以然而能有極和平極有效之治療法確能超過西醫之拘板治法更能洗清中醫之雜濫流弊而得其真諦茲謹說細陳述句句是斷語字字是經驗願信餘者信餘言也立論不合中醫古書則人謂為非聖無法不合西醫書則人謂為反科學餘不敏對此症理論及藥物均不能與中西醫吻合余只知治病有效不敢從同故此章反駁中西醫處赤裸露骨不留餘地願識者諒之原因肺癆病之病源為結核桿菌漸次發生因炎性産出物而起之化膿性分解為長久持續之肺組織崩潰同時其他臟器亦呈同一之病症本症於結核菌外更有他種細菌所謂混合傳染也該菌侵入人體之徑路大約不外吸氣血管淋巴管細分之為與空氣同吸入由口腔傳染例如對痰唾液食物傳染例如含桿菌之牛乳器物傳染例如病人用具損傷傳染例如皮膚破損桿菌由破處侵入淋巴管而深入生殖器傳染有結核之男子精液及婦人生殖器因交媾而互相傳染或傳染初生兒凡有以上傳染機會均易感受然該菌發育極緩且該菌侵入體內並不常久固著體內排除體外故亦有傳染之後幸有不罹本病者例如兄弟姊妹均有血族上之傳染因而死亡其中一二人終身竟不感染者有之亦有一種特異質之人對結核菌感染後最易發育且以極迅速之病程而致命俗名百日癆關於此症之誘因亦有數種體格體質虛弱及長身孱贏胸狹頸細者癆瘵質最易發生此症年齡尤以十八歲至三十歲為最多環境空氣污濁日光缺乏生活滋養不足運動缺缺憂愁妊娠産後及過勞惡嗜暨大病之後等外傷肺及肋膜之疾患肺炎肋膜炎等以上各項均易輾轉誘起肺癆病年齡一項不得為誘因但在此時期最易罹此症也尤以身體衰弱一時的過勞亦包括在內之時為甚症候此病大約分三期第一期本期初起多徐緩往往易於忽略此期大率肺尖部稍有結核病者或有乾咳或無常年羸瘦脫力酸軟不思飲食失眠精神過敏或抑鬱善怒女子多有月經不調貧血等症普通人往往以為虛弱漫不經意第二期病灶日益擴大怯弱證象一律皆現患部呈結核性浸潤於是咳嗽吐痰咯血多量則為肺出血自汗盜汗怔仲喘促失音咽乾寒熱兩頰微紅等症相繼而來此時期已決無與他病誤認之虞矣確定期第三期以上諸症加重體溫亦高衰弱愈甚則浸潤部分崩潰而成空洞患部糜爛已甚生活力全失尪瘠衰弱已近鬼趣更甚則手足浮腫泄瀉頻頻不能行動遂致畢命然此症不侵害腦神經故至臨死而精神清醒余對此症有特別之見解認為因虛弱而肺癆非因肺癆而虛弱因虛弱而發熱非因發熱而虛弱故西醫消耗熱之名詞余不取之以上概述本病之過程約分三期茲再分述其各症之現象於下熱本病第一關鍵全在此熱病加則熱高病退則熱減故醫者可以熱之消長而視病之進退但初起之肺癆患者氣血尚未大損陰陽尚能含合故其熱脫出於氣血之外者尚少熱度不甚高攝氏表三十八度左右病者只微覺酸懶無力若此等微熱常年纍月浮游虛冒無所歸著一如將失軀殼之靈魂不能煦育含和溫潤氣血反致焦灼枯燥乾耗津液則熱之功用既失養人之物反成害人之物矣中醫診察此時絶難知其有熱以用檢溫器為宜以此時兩手脈尚多不能現虛數象故也病者恆自覺手足心發熱每有勞動熱即上升故常覺疲倦喘促頭暈眼花此時期即中醫所謂虛弱或腎虛陰虛等症是也虛弱病勢前進正當之體溫與氣血之吸著力更薄弱則此熱更無所附麗脫出愈多故熱度亦漸高以手們之可以察知表皮之熱度愈高氣血內之溫愈少每日午後由三十八度漸漸高升至三十九度以上有時但覺胸內有灼熱之感且其熱綿綿不斷西醫謂之消耗熱一若日暮途窮之人徘徊哀求希望救援頑固纏綿至可憂慮之熱型也本病脈多虛細而數發熱時或覺寒凜本病經過中之合併症例如肋膜炎腹膜炎及續發症例如腸結核喉頭結核均由熱可以推定故熱之觀察於測料肺癆患者之輕重為最確實之標準大率疾病全停止或變為慢性症時則不發熱若有微熱存在病勢雖為一時的徐緩然陰陽維繫暫合仍離必為將來進行之征若係綿綿不斷之熱則為病勢不良之征此段應與前論陰虛發熱陽虛發熱參看一言以蔽之愈虛弱愈發熱也津液漸枯陽氣無所附麗之現象也咳嗽咯痰為本病之要征然亦有時咳嗽甚少或全無亦或有劇烈咳嗽概以喉頭及氣管被侵害時為甚痰量視病狀而異初起率多乾咳日愈久痰愈多至肺浸潤期多為稀痰或白沫至肺生空洞時痰則更多為膿性或黏液膿性內乏空氣之痰吐於充滿清水之唾壺中多沉降水底而為貨錢狀然病至極重時往往反不發熱不咳嗽不吐痰血此時蓋去死期不遠矣吐血本症初起痰中常混有血液血點或血絲在輕微之咯血雖不足慮然有時多為大出血之先驅不可不防咯血分二種初期咯血空洞咯血初期咯血則發於肺癆之初期空洞咯血則因存在空洞內之肺動脈枝上之細小脈破裂而發故肺癆初期不過痰中混有血絲或血點亦有始終不吐血而死者逮後或至狂吐鮮紅之大量血液常見有若干年潛伏之肺癆初起吐血往往每晨略於痰中夾雜血絲血點或日常如此或至大吐血立時致命凡吐血復發恆覺口內有腥臭之味然亦有肺癆極重始終並不咯血者故咯血並非肺癆之主要徵象也汗肺癆病因熱而致自汗盜汗此種虛汗以夜間為甚西醫亦名盜汗但虛汗甚者不分晝夜往往自出自汗盜汗且有因此失眠者衰弱原因多在於此失音肺癆病人之失音有二種一為喉頭結核即聲門癆瘡一為崩潰期肺之空洞太大致肺氣衰弱不能發音風寒咳嗽偶爾失音不在此例為肺癆已深之徵象然治療得法病勢漸煩躁肺癆患者精神抑鬱最易忿怒此症狀與環境最有關係宜設法改變之往往以不相干之事認為重大而起激怒中醫謂之肝氣病益進行此症狀亦益顯著病減此現象亦減不必專治此症喘息肺癆患者因身體衰弱稍有勞動輒好喘急若日久病深覺胸際氣悶氣短皆肺癆已生空洞之征但輕微之喘息則無關緊要也肺癆感覺胸內有疼痛或癢者亦有之乃肋膜被侵害之征並非宅征以肺之本體並無痛感故也貧血肺病癆菌在體內破壞一切血液受此影響因而全身呈中毒西醫血液中毒解釋為血液內混合菌之毒質不可作中醫中毒解現象故病者面黃肌瘦特別現枯槁蒼白之色此一般肺癆患者共同之現象女子多有月經閉止者皆由虛弱來也怔忡此為中醫病名心臟衰弱之徵象肺癆病於大失血後多有此症患者常覺心內忐忑不寧為一危險之症狀此症多不注意然實危險泄瀉此亦中醫病名肺癆病最後之危險現象也俗名瀉肚此時腸之結核已形成衰弱已極食物不能吸收滋養之來源斷絶為一般肺癆病患者之收場浮腫現象亦多於末期見之尤以下利瀉患者為顯著至可慮也西醫對肺癆之認症可為確實明瞭較之中醫勞傷虛損癆瘵肺痿等說踏實可取惟論此症之脈不如中醫明顯蓋此症至二期脈必虛細而數或只虛細或現結代失血後絶無可疑若在第一期氣血尚未大衰或有弦細弦數及稍覺浮洪右手居多之脈失血過多則脈虛大無力芤脈之類者亦有之此皆余由經驗得來並非抄襲古說故以上論症概取西醫獨缺略脈搏一項特録中醫脈理於此以補西醫之缺點希望醫者詳細參考據此認症似較顯明再肺癆症雖如上述其症狀大多數固然一律然以余之經驗亦有例外患者不必各症皆具即主要症狀亦大半皆無不咳嗽不吐血不發熱纏綿日久或僅有吐血中西醫均認定為肺癆病並經愛可斯光照診毫無疑義者而主要症候竟缺如或時一發現即便消失如此遷延終歸不治者有之又有肺癆斷定千真萬確經有名各醫院照診有名中醫診斷毫無疑義然中西醫一用治肺癆之方法則立時加重絶非誤診亦絶非誤治而絶對不適用中西治肺癆之藥品反而恣用大涼藥例如生地石膏等而漸減輕者亦有之此例外實屬奇特皆余親歷因附録於此須知西醫論症固屬確實然紙上談兵尚不能盡此症之變態此外是否尚有特例亦未可知是以吾輩醫者要虛心也與肺結核類似之症頗多但以二例外絶非誤認治法治療肺結核以愈早愈妙最好是預防法之講求然普通患者往往缺乏此種常識不幸而罹本病乃又以其為慢性疾患恆被視為無關重要倏然失其容易治療之時期最為可惜逮至患者自覺危險遍訪良醫十之八九已入於不易療治第二三期之階段中於此時期若再誤於中西醫藥治法不善反致增加病勢也則自入岐途未有不斷送生命者此症大概應注意事項均載入余著之肺癆病自療法一書中可以參看自療法全文列陰虛發熱節下此僅將對症療法比較中西治法及藥物之優劣分述如下以資印證此皆根據余數十年之實驗一字一句不知經過若干次之苦心體察反覆試驗始敢公諸社會願研究此症者根據余之報告再作進一步之探討更願肺癆患者注意余之著述以作訪求良醫之指南針自不致誤入岐途早脫病苦是則著者之本意也熱以下與前列症候次序相同之一症為肺癆病中最要之徵象亦最難療治之一端欲使此症急速退熱除服用西藥安基比林規尼涅別拉密童等退熱劑外絶少速效然此等西藥往往誘起自汗盜汗在心臟衰弱者且恐驟致心臟停止之大危險故以不用為是規尼涅雖無發汗之副作用然用之多不能退熱且能誘起嘔吐眩暈亦非適應此症之良藥近世多用愛兒邦藥片者然其效極緩價又極昂非多日繼續服之不可而亦不能十分準確退熱不過比較安基比林等為和平耳以樟腦酸佐別拉密童伍用以防出汗過多心臟停止亦是一法中醫稱此種熱為陰虛發熱實含至理故滋陰藥中實有一二味有確效者中藥滋陰藥品類極多不可濫試例如白芍此藥不但養陰且能斂汗又能斂肺止嗽為治肺癆病不可多得之品生地丹皮地骨皮女貞子牡蠣鱉甲龜板桑寄生均有相當效驗白芍用量須在一兩以上餘藥須在六七錢以上其餘中藥內所列滋陰退熱之藥多無效不必試驗余已歷試多年矣尤以麥冬五味子吳茱萸白朮當歸肉桂肉桂一味中醫有引火歸元之說西醫亦用肉桂酸然多無效等藥萬不可用以習慣用者頗多故特別申明禁用人參雖非絶對禁用然流弊頗大不可不慎以上所列有效之中藥若在第二期或第三期尚未至十二分衰弱者十之八九可以退熱且其效力和平永久不似西藥之急遽退熱效力持續時間甚短故比較優良其中藥唯一優點即絶無發汗之副作用對於衰弱者之心臟絶無絲毫危險且與止咳止汗止血等藥更有相得益彰之美可以放膽用之也西藥注射劑關於肺癆者品目極多試驗多次均無良效不可濫用一般西藥宣傳刊物多不直實不可盡信余以為正常之熱平溫在人體內乃最寶貴之物惟肺癆病者陰血不足不能含濡此熱使其潛靜融合以發揮其溫暖人體之正當作用反而浮游灼爍不得其所釀成亢旱乾枯之病態醫者宜設法令其歸納中和吸收自然熱退若以西藥退熱劑解除此熱是將人身寶貴之生活力加以斧削一時雖覺熱退而其餘幸未全離陰血之熱必又浮出故仍發熱也若屢屢用西藥退熱則必致剝奪淨盡一毫熱氣皆無此熱退盡之日即人體內生活力耗盡之日心臟不停何待乎故余主張治肺癆之熱可以使熱收縮不可使熱放散自以為頗有精義蓋一部分西藥退熱是使熱放散於體外故病人雖覺暫時輕快實則等於剝奪其生活力一次默默中反使肺癆病患者更受莫大之損失本此主張故余用中藥退熱只是使熱收斂保存含濡絶不令其外散西醫認此熱為有害故退熱之藥與治實熱例如溫症之藥同余認此熱為人體內極寶之物人之所以能恢復健康者全賴此熱若此熱用西藥或中藥內之發散藥強制使其放散則旋散旋熱去一分熱即去分生活力生活力盡而人死矣故余主張必使此熱收斂於氣血之內不可排除於人體之外必使此熱退回於氣血之中不可放散於皮膚之外西醫患此熱之多余恐此熱之少也余本此主張歷試多年實有奇效此論與西醫說正相反與中醫說亦不盡同然余治病重實際既不敢空談誤人古醫書多有此弊亦不敢盲從新說願有心人一試之咳嗽亦為本病主要之徵候此種極頑固之咳嗽雖一般患者不必盡有然咳嗽一症治療上實感困難且愈咳則肺愈震動愈震動則炎症部愈大而痰亦愈多肺內侵潤部分更易擴充故止嗽之法在本病過程中與退熱方法同一重要蓋本病之咳嗽與熱相輔而行愈咳則愈弱愈弱則愈熱熱減咳亦減熱加咳亦加也止嗽之藥中藥之白芍應居首位凡日期稍久有肺癆嫌疑者之咳嗽以白芍為主藥五六錢佐以杏仁貝母紫菀桑白皮枇把葉等作煎劑或加梨引三五劑後無不大效者稀痰過多茯苓為必用之品六錢以上若係稠痰則橘紅遠志根必須加入三期之末病人有痰極稠不易吐出者更危險皆中藥之有卓效者然以余之經驗中藥止咳效力常久是其優點但大多數只能緩緩減輕咳嗽若令病者完全不咳則殊感困難西藥止嗽之品有特效者例如鹽酸歇魯因莫爾比涅阿片哥羅仿等凡阿片製劑對於小兒非常危險萬不可用慎之慎之皆不外麻醉之類不可濫用其比較和平者則有拖洶兒氏散此藥雖亦含有阿片但含量甚少對於小兒尚可用然亦必須小量是以單論止咳藥之效力中藥固不及西藥之有速效然西藥麻醉品並非真能治療本病不過麻醉作用所致故藥力一經消失仍然咳嗽較中藥之對於咳嗽確能根本減輕之現象似屬各有短長然醫者如能於相當場合利用西藥以濟中藥之所短則相輔而行實有不可思議之妙是在醫者運用得當耳吐血肺癆之咯血或吐血最足惹起病者之惶恐此症雖非絶對危險然往往患者精神感動太劇烈因而增加不良之影響者不少故止血方法在治療上功非常重要尤其在大吐血時更宜特別重視醫者凡遇輕微之咯血即應明白告知咯血之病理使其加意預防免致日後之大吐血若遇大吐血病者極端驚慌時醫者必須設法安慰之務使患者及其家族格外鎮靜而後施以對症之藥品以期止血在大吐血時若以暫求速效為目的當然以注射西藥麥角劑為宜內服亦可用麥角及阿片等劑均有止血之速效以余之經驗麥角一藥雖有止血之效然隔若干時或數月或數年之後患者若再吐血時其數量必更大此或為一般醫者所不知意者此藥有刺激血管收縮神經中樞之作用因收縮血管之力過強或致該部鬱血故積之日久反致大吐血歟至此藥之易於中毒及不宜於懷孕之婦人收縮子宮種種缺點中醫更不可不知余在完全崇信西醫時期每遇吐血症幾無不用此藥後則漸漸發現其缺點即只以暫時止血而論亦不能盡如藥物學上所載之效驗成藥販賣之宣傳刊物更不必論余實遇有數例在肺病大吐血時連續適用麥角劑之極大量約五六日竟不能完全止血僅僅止其大吐然一日之間尤其於早晨必吐二三口或數十口一日藥量用至一克此藥用大量至五六日原非所宜乃竟不能收效此外尚用可阿古連注射皮下同時嘗用麥角劑內服並不能收完全止血之效此例甚多故余現在對於吐血不主張純用此類西藥矣咯血少量時更不可用麥角劑以免後患中藥中之白芍其止血之效力乃至神妙而不可思議上述數例於麥角及其他西藥不能完全止血時或再發更大吐血時竟以白芍四錢至一兩佐以藕節一兩漢三七一錢生地四錢至八錢等藥而完全止血且止血後均經過數年或數十年亦未見再發或根本不用西藥一遇吐血或咯血即以白芍為主藥與之率皆一劑即有奇效有時以白芍之方與麥角之方每星期掉換令患者試服十分之十無疑地皆於服麥角時期復發吐血病勢反覆此例亦不下數十故余至今廢止麥角劑並以余之確實試驗與比較成績坦白說明於此願中醫堅信白芍為止血神品放膽用之願西醫注意白芍止血千真萬確毫無流弊迥出於麥角等止血西藥之上也白茅根天花粉二藥於初起之咯血或驟然大吐血不論肺胃出血用之良效然此藥只宜在體氣未衰偶爾吐血者用之萬不可施用於二三期肺癆之吐血倘或妄用必致病勢加重喘促失音即以此二藥媒介與麥冬五味子及其他溫補藥同一流弊久用必失音不可不知此亦屢經實驗者也大薊小薊二藥止血亦有良效此藥自春至秋鮮者極多吾鄉俗名曲曲菜青青菜薊菜遍地野生可作餡可作湯可作鹹菜以之佐餐常常食之盡可令病者以此為常食品不必加入藥中也汗肺癆既有頑固難退之虛熱纏綿日久消耗體內有用之津液然並非如實熱之消耗津液此熱因虛弱浮游於外不能與氣血含合互生互長以致津液失其來源而乾枯此余對肺癆熱一貫之主張願學者深信此言也皮膚肌肉因而不健全自汗盜汗亦相繼而至愈熱愈汗愈汗愈弱病者之危期至矣根本止汗必重用中藥滋陰例如生地白芍元參阿膠等其中最有奇效者首推白芍生地再佐以收澀滋陰之生牡蠣生鱉甲等用之必能止汗但此種藥量用之均宜在一兩左右生地可用五六錢方能有效西藥止汗劑多劇烈且非根本治法不可用也其他中藥止汗類例如浮小麥等亦不必用間有用人參當歸於此症者余不主張之失音此症在肺癆第三期或誤服不對症之藥往往如此偶爾風寒咳嗽失音不在此例不可誤解喉頭結核時亦有此症狀肺癆之敗象也此症有效中藥例如生扁豆懷山藥蓮子苡仁沙參等佐以白芍牡蠣炙桑皮炙枇把葉地骨皮杏仁橘紅遠志根等味不公皆用可以選擇不難收效此中醫虛則補母之說以脾胃屬土以肺屬金失音之症責在肺氣太虛補土所以生金也余不願談此理然補脾胃藥試之良驗蓋強壯治法實治肺癆之上規也治失音頗有良效西藥對此症無良藥蓋中藥補養脾胃即合於西醫治療肺癆之原則身體強壯渚症自愈然服龜肝油帕勒托等則絶無效所以身體稍健而聲音恢復亦有定理試驗極確但中藥之溫性補藥例如肉桂乾薑人參等及種種涼性藥例如天花粉金銀花白茅根麥冬天冬等收澀藥例如五味廣烏梅等則實不宜於失音之症此類藥品未失音前誤服之可致失音既失音後再誤服之則不可救藥矣慎之慎之張嫗年四十八歲通州城南車裏墳人余家之女僕也患極重之産宮瘤因出血過多身體漸弱又以伊本鄉婦不慣燒煤前在姚姓家傭工一家四五個煤爐由伊一人掌管自云曾受煤氣遂有氣管支炎之習慣病每至冬徒一添煤火必患咳嗽氣短俗名憋氣有時呼吸阻滯夜不能臥戊寅春忽失音前亦有失音以此次為甚月餘不愈經某醫用桔梗五錢法夏五錢麥冬五錢河於肉三錢化紅二錢元參五錢甘草五錢蔞仁二錢生地四錢知母三錢貝母二錢枳實三錢香附三錢燈籠三錢銀花三錢五味子一錢藥名均照原方抄録服數劑更其絲毫不能發音矣余乃以蘇子二錢法半夏一錢金銀花一錢鮮蘆根五錢沙參二錢炒生地二錢生百合三錢旋覆花一二錢甜杏仁一錢炒粳米引煎服共服七劑而愈此例本不足録只以此病用藥與此章本淪相抵觸而亦有效則以其原因為煤毒並非結核故此等藥竟能收效若在第三期之肺癆失音則絶不可用録以此見醫者認症及讀書均須有靈活之眼光不可拘板此道之所以難也煩躁此症並非必要主征以精神的療法求其安慰自然症候消失此外環境之改造余曾因此症而辭官職三期之肺癆競獲痊愈職業之選擇肺癆愈重煩躁亦愈甚普通人認為肝氣即是此症均有良效藥品方面不過平肝滋陰之品白芍生地等肺癆漸減此症亦必隨之而去也喘肺癆病在未至十分衰弱時若有喘症或病者自覺氣短稍稍與以中藥之旋覆花桑白皮杏仁熟地少用沙參白芍首烏阿膠建蓮山藥苡仁等或間接治喘或直接治喘均能有效然至肺癆末期肺之本體己崩潰殆盡發現真性喘息時則無法挽回必不得已而用西藥之麻醉劑亦屬飲鴆止渴絶非善策麻黃素絶不可用於此種喘息近有用樟腦製劑者比較穩健然須絶對避免酒精屋克沙福之調製多添加酒精橙皮糖漿雖為調味藥然內有酒精不可不知中藥內之紫河車真有根治虛癆喘促之效但制法宜格外潔淨耳貧血因肺癆而致貧血萬不可用西藥之鐵製劑及中藥之當歸等補血藥此症不必專治只要肺癆得脾胃調和飲食增加身體強壯則貧血自愈若在肺癆藥中加入補血之品十之八九愈補愈熱不但無益而反害之此余歷試不爽者也余曾親見有因服帕勒托自來血等反致誘起吐血者怔忡此為中醫病名肺癆大吐血後往往見之患者自覺心臟忐忑不寧每隔數分鐘或數刻鐘即宋一次為心血不足之危象有此現象無淪如何萬不可用西藥之退熱劑及麻醉劑然在普通人往往不甚注意實則大吐血後頃刻之間因而失劫生命者即由於此余在治療肺癆中甚不主張用參耆當歸等然遇此症劇烈時深知性命有不保之危險輕微之怔忡不在此例故必重用大劑台參炙黃耆當歸身白芍柏子二炒棗仁龍眼肉炙甘草以上藥味不町增減以末治之唯大吐血尚未全止時若患此症甚急不可驟用大劑參耆反致大吐此時可以西藥樟腦酸內服若有虛脫之慮時可注射強心劑例如哥羅那金實芰答利斯等以暫救一時之危險中藥可以暫停此種西藥持續時間不如中藥之長可暫用之以資急救若根治心臟衰弱之左方仍以中藥為准也以資挽救不可拘泥泄瀉此症為肺癆病末期臨危之現象每伴浮腫以俱宋蓋其腸內已滿布結核菌完全失其吸收之作用血液來源既漸減少血行障礙勢所必致也以中醫說則為脾腎虛弱已極之現象總之病者滋養缺乏已成難治之症若再加以泄瀉則所進些微食物完全在腸內不能吸收養源斷絶不死何待故善治肺癆者在病人尚未十分衰弱之時即當先顧脾胃此是要訣以預防此症之演變不幸病者發現此症此時萬不可服魚肝油等若欲求一時速效則阿片末次硝酸蒼鉛單那而並等西藥均有確效凡肺癆病者飲食下咽後既覺腹痛即是泄瀉之預兆不可不防然中藥之蓮子山藥苡仁等亦有效但力緩耳病勢至此十之八九不能挽回矣肺癆病治法總論余既認定虛弱為肺癆原因結核為肺癆結果故余治此症專注於脾胃及腎之清補使病者脾胃強壯飲食增加自然氣血漸旺腎陰潛和自然虛陽歸納可以根本限制結核菌之繁殖此症不適用補氣參耆補血當歸及鐵劑等藥蓋以此病例有一種虛無飄渺之熱游離於肌肉皮膚之間稍加燥補則熱更升高而肺之炎症部受其灼爍潰爛更甚無益有損也是以蒺藜熟地山藥白芍蓮子扁豆苡仁茯苓等品看似清淡然補養脾胃及腎不溫不燥適合於有虛熱之病體也夫虛熱何由來蓋因病者氣血太弱失其溫煦涵潤之正規不能抵抗菌毒遂致生此慘敗熱象此熱並非由毒素産生乃人體內抗毒力量勉強掙扎不肯受死於菌毒而發生筋疲力竭自救之呼聲西醫退熱藥乃多半退實熱用之於此是將此些微掙扎之自救力而又加以解除也是以因用退熱藥誘起自汗者實多不但無益而反害之此種虛熱恍惚迷離如因風之遊絲不可捉摸蓋熱之正當生理本應涵蓄於吾入氣血之中氣血若無此熱之溫煦則不能生長此熱若無氣血之含吸則亦失其附麗此症氣血與熱因身體太弱愈離愈遠則愈虛愈熱愈熱愈汗愈汗愈虛陰陽脫鈕日久抱合愈難勢必消耗灼爍使人體之內無絲毫自救能力而後已故肺癆臨危反不熱不咳矣若只認為菌毒猶淺見也在稍有生活力病者常服此種健脾養胃補腎之藥使其真陰漸固消化容易納食健全得一分食物即多一分氣血久久自能氣血漸旺抵抗力增加此種無著之虛熱即漸漸與氣血濡合而歸於平靖故氣血暢旺未有不退熱者然用此等中藥必合大劑養陰之品用之白芍生地阿膠地骨皮牡蠣等以促其陰陽之攏合一面兼顧肺癆唯一目的必先止嗽蓋不震動肺體而後可望減少炎症産出物不令其為害於血液希望游離之熱不再受其擾動而後安靜含濡容易潛藏入陰則健脾藥亦有用武之餘地使肺之病灶不再擴大有數日不咳則脾胃藥得其機會大見功效漸漸生長氣血調和自然不咳不熱其初雖係藥力強制其後即成自然向愈身體日強病灶日漸縮小即是此症唯一向愈道路止嗽之藥以重用白芍杏仁炙桑皮等最有效必不得巳時可兼用西藥之止嗽劑然西藥不過一時用之以補中藥之不足亦經驗談也此症絶對不可用中藥之五味子等斂肺藥及其他中藥不但無益而反害之肺癆之熱最不易退然若認定此理堅信不疑未有不奏效者病人自覺手足心發熱或胸內熱灼皆是此熱萬不可用苦寒藥也若用西藥麻醉劑止嗽病人嗽止更覺痛苦者不宜過用麻醉藥此時已入危境矣余曾治有極凶險之肺病參看醫驗無不以此法而退熱唯此種立論理想上與西醫說不能吻合而排除中醫說法之處亦不少余實不敢只憑理想憑空結篆貽誤後人致蹈以前中醫著述之罪惡余只知治病有效即為有價值之學說既由實驗得來因而恣談之以告同好此章可與前論陽虛發熱陰虛發熱參看然肺癆者則陰虛者多不可誤用補陽藥也又中藥內補藥最多凡本論未載之補藥萬不可用即其他止嗽止血退熱等中藥未經此論表出者均不可用以余對此症歷試中西藥已四十餘年臨症何止千百試之又試煞費苦心一字一句皆實驗談也余治此症實有獨得之妙頗饒興趣也比較中西藥之效力固不可先存偏見尤不可不具多次之實驗余對肺癆病一症本諸歷年臨床之實驗下一斷語曰中藥實勝於西藥也蓋此症治療中雖有時借重西藥之止嗽止血等劑然不過利用一時根本奏功全在中藥此中分際苦於余之筆墨拙劣不能言傳但不用西藥完全以中藥治療雖能有效不能奏厥全功然雖不能完全治愈最低限度亦可以帶病延年限於本淪所採用之中藥若濫用其他中藥流弊極大不在此例反之若不用中藥完全以西藥治療其一時的特效似勝過於中藥例如咳嗽注射或內服麻醉劑十之八九可以立止然非根本治法然根本不如中藥之效力持續常久且西藥內之補劑其意義不與中藥補劑相同不可誤認即為中藥之滋陰補血之類常見有誤服西藥之補劑反而誘起吐血即其明征即肺癆病恆用之補劑例如魚肝油帕勒托等均有流弊歷經試驗亦不如中藥確實以故西醫對此症除用天然療法用外科手術更危險外藥物療法可謂等於無用但若採用西藥西醫理論一部分之特長以補中藥中醫醫理一部分之缺點挹彼注茲則中西醫藥之對於此症實亦有其相得益彰之價值但單獨適用中或西醫一種之治法則收效均不完全尤以西藥之缺點更多總而言之余所指定之有效中藥其效力實勝於西藥若於中藥藥力不能達到治療目的之某時間內參用西藥則其收效之速更勝於單用中藥中西藥互用中間總要隔開二十四小時以免中西藥相合致起化學作用危及人體此一般醫者之恆言然余既深知中西藥對此症有不可偏廢之理希望當代學者深研余所歷舉關於此症之各藥其化學作用究竟如何是否若干年後有根本化除中西新舊等字之一日而成為世界醫學是則余所深望者故對本病治法余頗自喜也醫驗向日凡中醫治愈之大病在西醫多疑為並非本病不過類似之症而已例如肺癆病西醫認為絶無特效療法一旦經中醫治愈則疑為必係普通之氣管支疾患非必真為結核性之肺癆病此種觀念不但容易錯誤且可阻礙中西兩醫學之接近常此以往真如自畫鴻溝余以為學者正當態度不應如此沒必互相盲訾何異市儈耶余深願對此道感覺興趣者切不可自信過高置多數病人於不顧而自分其門戶之見也此處所列數醫驗乃擇其千真萬確較重之肺癆病而又取其住址確實環境較險信而有征易於訪問者詳舉數例以概其餘願高明教之祁連城住德縣東關患肺癆病時年二十歲於光緒二十五年延余診治所現病狀為咳嗽咯血特甚日晡發熱脈細數自汗患病已年餘瘦弱已極已成第三期肺癆除囑其注意攝生嚴格適用空氣日光滋養療法外參看肺癆病自療法內服藥一如上述即前論治法內所採取之各藥品唯圖節省文字諾方總列於後以免重録調養半年已痊愈身體強壯此人現仍健在從未再發肺癆病治愈後往往因事復發近已年逾五旬康健猶昔此症以熟地為主藥白芍等次之此症年歲較遠特録之以見中藥治療此重症痊愈後永未再發也陳幼廷德縣東關太平街洪昌號經理年二十餘歲於民國二十六年宋京就診所現症為虛熱咳嗽吐稀痰極多兩頰發赤咯血特甚虛汗脈虛數已極衰弱太甚病已經年經診斷後認為第三期肺癆給豫肺癆病自療法一冊囑其嚴格照辦一面與以此症以白芍為主茯苓次之餘藥即本論所談者中藥膏劑並令服西藥愛兒邦藥片約數月已漸恢復健康適值戰事逃難流離不能服藥者纍月然幸未發生變故平靖後又服藥二月餘即痊愈乃又因妻喪哀勞過甚又咯血數口急服前藥又平復矣此症對於療養方法限於時勢不能完全做到是以向愈較緩當此症來診時敗象皆具肺臟已有崩潰之險法在不治幸而藥餌有靈故在治療期中雖一再逢著北方之大變亂家庭之大悲哀顛沛流離而又加以焦慮商業哀愁喪葬均犯此症之大不違乃竟病勢漸退卒未演成大險得以保全生命此本案之所以可記也王維山住北京府右街八號年二十四歲直係血族中因患肺癆病而死者已數人於二十七年四月來診因供警職不易請假故僅有咳嗽仍勉強支持以前僅有劇烈之咳嗽自覺身體格外疲勞不思飲食近忽失音咯血咽痛而乾自汗吐稀痰極多特別感覺胸內灼爍極甚午後體溫更高不能向左邊躺臥診脈細數肺癆雖大多慢性然至第三期亦有兩三月內即致命者此症現象頗似此類認為第二期肺癆乃以本方以白芍為主治之即止血未出一月嗽止汗止失音亦去飲食增加即最痛苦之胸內灼熱與最可慮之午後發熱亦隨之即愈誠大幸也此症若再勤務必不能治且其血族遺傳又有此症殊屬危險余勸其先辭職務是以治愈較速以其體氣尚未大衰也吳夫人住北京新街口時克亮胡同一號年三十餘歲於二十六年四月先患滲出性叻膜炎經治愈者吳君充第二監獄醫職自己治愈誘起肺病有極頑固劇烈之咳嗽所吐之痰甚多且稀有腐敗臭味午後熱度微高飲食大減脈沉澀恆覺胸脅有水瀦留此症在中醫多以為痰飲實則病理上以肋膜炎誘起肺結核者此例正多是此症已成肺癆病且浸潤極速稍延誤必不能治矣據吳君病者之夫稱曾服止嗽藥及注射百克妥爾等藥均未見效延余診治先服湯劑以茯苓為主白芍次之飲藥同前例即大效繼服膏劑約月餘而愈曹君住西四大拐棒胡同二十三號年二十一歲係鞋匠學徒於二十六年三月延診據稱病因患溫症水瀉每日勉強飲酒治病或告以偏方如此誤人甚矣約二月之久遂患咳嗽痰喘頭暈盜汗特甚午後發熱失眠衰弱已極兩肩高聳診脈右手無脈左手脈細數而微飲食極少脫力種種危象畢露至此已延遲三月餘矣余既認定為第三期肺癆乃與前藥以白芍為主不用茯苓佐以杏仁生地沙參橘紅牡蠣貝母竹葉元參梨等味月艮五六劑後喘止盜汗止咳減熱度下降右手脈出現精神已振此症中間曾用拖氏散重曹凡七日均見大效用此藥時均在白天夜十點鐘服中藥特記於此肺癆病主方此方不可不經診斷隨便濫用加減時務宜慎重白芍六錢至一兩茯苓五錢至一兩山藥四錢至八錢生地三錢至八錢熟地四錢至八錢芡實四錢苡仁四錢貝母二錢至五錢沙苑四錢杏仁四錢至六錢橘紅五分至一錢梨一枚為引吐血加藕節八錢漢三七末一錢虛汗加生牡蠣一兩鱉甲一兩先煎咳甚加炙紫苑四錢粟殼三錢炙桑皮三錢痰多而稀重用茯苓加遠志根三錢咽乾咽痛力口元參三錢竹葉三錢去茯苓此方各藥雖皆平常慣用之品然不知幾經比較幾經試驗幾經失敗而後始能成功余確認此寥寥數藥實為治肺癆病之主藥此藥凡遇對於極重之肺癆十劑內外必見大效凡咳嗽痰喘失音吐血虛汗胸內熱灼午後發熱泄瀉全身衰弱等現象耐心服之自然諸症減退若病勢不同臨證加減不過一二味凡本論未採用之治癆各藥均經試驗多次深知其絶無效用故不列入而此寥寥數味又深知其確有奇效也醫者倘信余言不必再試他藥亦不可輕視此等中藥也建蓮子苡仁與山藥扁豆同用確能調養脾胃久服毫無流弊對於衰弱已極之肺癆為必需之品久服不但消腫且有退熱之效但必須與止咳滋陰等藥合用耳麥冬天冬花粉白茅根金銀花丹皮地骨皮熟地元參枸杞子瓜蔞仁海浮石沙參有時可用然用時必須謹慎不可濫與肺癆病服中藥五六劑如見效後不可常服湯劑以常服膏劑為愈恐傷胃也余喜將湯劑加重分兩改作膏劑一日三次用開水化服但有泄瀉傾向者不可加蜜可以飴糖代之漢三七桑寄生有時可用但必須斟酌盡善方可加入否則以不用為是其他對症西藥一時用之未嘗不可但不可認為主方本編原非專講西藥故從略大吐血時以生白芍一兩藕節一兩杏仁五錢漢三七三錢煎妥分三次於一日間服下比較西藥和平有效大吐血後血雖止而心臟衰弱太甚時覺忐忑不寧者必非小恙應以生白芍一兩台參五錢炙黃耆五錢當歸身六錢炒棗仁四錢龍眼肉三錢炙甘草二錢煎服一日三次此藥不可加入以前止嗽等藥蓋此症不救頃刻致命西藥之強心劑歷試不如此方也此方見效後必連服三五劑分量酌減心臟衰弱現象減去後仍用以前治肺癆藥療治肺病可也凡忐忑現象連續而宋每隔數分鐘一次者急速以此法治之遲恐不及若危險過甚已有虛脫之慮時注射西藥強心劑亦可但病勢稍緩仍用中藥可也人參白朮當歸必俟肺病治療成效大著後諸症皆退而後可以漸漸試行加入稍有不適立即勿用在諸症例如熱咳咯血未退以前此等藥總以不用為是以其補性呆滯恆有助熱之流弊也本論未採取之各學說及中西藥品強半均在無效之例不可再試以余已遍試四十餘年深知其無用也注射藥亦在內以上所列中藥不知經過幾百次之實驗始能確定其效力而筆之於此學者不可以其平常而忽之更不可隨意加減致減效力以余對此種藥品之分量亦試驗多次矣所列數例均擇其確實可以查訪除居住余之故鄉德縣即近在北京者其他遠人不願列入以免又蹈前人醫案故為鋪張之虛僞陋習普通之咳嗽及稍久之氣管支病萬不可誤認為肺癆病冒然以余之方法治之以免誤人余以十二分熱誠希望真正之西醫研究余此種報告之是否確實並希望拋開中西新舊各成見實事求是直接訪問病家請其說明共謀增加治療此症之方法及效力或於醫術上不無小補也二雜病類雜病亦有多種此皆摘録其最常見及最有經驗者血崩婦女病中以此症為較多治法稍誤多致殞命西醫書名此症為子宮瘤包括於中醫崩漏帶下等症之內但此論則專指血崩之重症言也原因為房事過多遺傳及病毒轉移等例如淋毒等症候本病初起多有月經不調繼有肉汁狀赤白帶下中醫以其顏色不一過事區別其說殊不足取漸次入於初期此時出血點滴不絶中醫謂之經漏多由於外來刺激例如交接出血放惡臭發疼痛或便祕或下利嘔吐身體衰弱此後子宮內毒瘤已成頻頻出血顏色淺深不一現癌性惡液質患部起腫瘍病者往往自覺少腹內有腫形物漸大腰痛背脹尤甚時常癌腫壓迫尿道小便不通全經過一年至一年半卒發大出血中醫謂之血崩若中醫治療錯誤則必發尿毒症及腹膜炎而致死然此症若遇高明中醫治療得法可以帶病延年非必死之症西醫之說非定論也此症西醫根據解剖認為癌瘤最為精當中醫牽拉沖任奇經而又加以種種玄說理想之談不如西醫解剖之確鑿可據故余說明此症病理病狀純采西醫學說然治療此症則根據確實無疑之經驗大聲疾呼使患此症者急速猛醒認清西醫片面之決定預後萬不可信即西醫對此症所下斷語此症全經過自一年至一年半體軀衰弱卒發尿毒癥腹膜炎而死等語即可證明西醫對此症尚無適當療法然西醫非冒然下斷語者是必經過各醫院之報告統計而後筆之醫典確定病程吾人亦不可輕視之余之所以希望西醫之能讀是書者取而加以研究其命意在此蓋據此論斷可見西醫遇是症若非割治必於一年至一年半之期間內取死亡之轉歸自無疑義其割治之法亦非十分完善常見有子宮瘤割治反而變生他症而致死者不一而足然因割治而完全根治者亦有之且有因癌瘤腫大過甚每逢經期血阻不通全身血管怒張脹痛面部紅紫或則尿閉不通危險立至者此時病者如係身體強壯寧以早割治為愈蓋割治子宮瘤雖非十分完善之法但至內服藥餌無靈於其坐視其死固不如冒險一割猶可望其幸而脫險也早年余診一德州桑園鎮張厚庵君之夫人其子宮瘤現象即如上述余曾勸其速赴醫院割治後不知其果割否也以余回藉不數日即去不知其究竟矣中醫治不得法其殺人罪惡亦等於西醫然西醫有極精之科學而缺乏機會吸收中藥之特長中醫中藥對此症本有其相當之特長而又學說龐雜立論玄虛致使對此症遠勝西法之中藥非經過數十年之試驗失敗與成功屢屢比較而又按其病者個人之體質披沙揀金而後幸得其真正有效之治法而後敢斷然糾正西醫醫典之錯誤曰治子宮瘤症中藥勝於西藥治療得法絶不致於一年至一年半期間內取死之轉歸西醫對此症之外科手術必不得已時一用之可以補中藥之缺點然此法亦非絶對的完善不可不知治法西醫治此症內服藥歷試多無效大出血時服西醫之止血劑或用坐藥亦無特效其外科截除術亦多流弊不可不知二十六年余治一東四牌樓演樂胡同二號王慕韶君之夫人經診得其肝臟鬱血完全硬變脅痛至不可忍耐詢知其初係因子宮瘤在某國醫院割治後不久即發現此症歷經中西有名醫生診治均斷為不冶之症此病人年僅三十見其割治前之相片體貌豐腴且詢知當時子宮病並不甚重乃竟毅然割治致罹此險斷送生命豈不可惜吾人對新學說不呵不加深研即便盲信於信仰醫術更宜慎重萬不可存凡是西學即為神聖之心理也中醫治此症此處專指血崩血漏圓妙靈活向有清補填補滋陰補氣和血收澀諸治法因人而施率多奏效其因醫藥無靈終至死亡者不過十之一二茲特録三案於下甲症曾用乙藥不效乙症亦曾用甲藥不效一轉移間則此極危險之血崩竟而皆有向愈之希望雖不能云根治然實足證明西醫醫典所下之一年至一年半而死之斷語完全不能盡信矣醫驗甲尹夫人年四十餘歲此為余友尹漢岑君之夫人住德州城內舊州署東街於乙未年患血崩症先有帶症甚重先延西醫診治服止血藥麥角三日而血不能全止出血過多乃延石冕卿先生與余合診見其神衰氣喘六脈細小乃議以大補氣血兼疏肝補脾一劑大效原方加減共服三十餘劑痊愈此人至今尚健在茲録原方於下大黨參四錢當歸身六錢炙黃耆四錢土炒白朮一兩炒白芍八錢山藥八錢升麻一錢川芎一錢柴胡二錢煎服乙張嫗年四十八歲住通州南關外車裏墳村此余京寓女傭現仍在此於民國二十三年患血崩症以前曾有帶症腰腹常痛腹內有形如巨碗瘤每次出血後即漸小經漏不止積瘀多日形又漸大則必有大量血水流出如此反覆年餘身體日衰漸漸不能服務且時常小便不通頭暈乾嘔酸軟而經血三五日一至時或每日不斷遂成重症某夜忽又血崩出血盈盆遂致痙厥此症曾服西藥及用坐藥以前並服尹夫人之中藥方均無大效當注射強心針哥羅納金一次衰憊已極六脈細微以後即以中藥治療茲録原方如下此症若出血過多實行西醫之輸血法極有效然非貧家所能辦到第一方注重生血養陰此方服後精神漸蘇稍飲米湯囑其靜臥勿動最為緊要冬桑葉二錢杭菊二錢荊芥炭二錢北沙參三錢地榆炭二錢生地炭三錢懷山藥三錢地骨皮二錢五藕節炭二錢當歸身三錢金銀花二錢炙鱉甲二錢五蓮子肉三錢大熟地三錢枸杞子三錢柏子仁三錢水煎服十一月初十日此方服三劑第二方注重生血養陰化風此藥服後頭暈腹痛均漸輕精神飲食均好轉北沙參四錢朱茯神二錢地骨皮三錢大熟地三錢枸杞子三錢生地炭三錢藕節炭三錢地榆炭二錢炙鱉甲二錢荊芥炭三錢當歸身三錢五陳棕炭二錢懷山藥三錢五薏米仁四錢金銀花二錢炙甘草二錢蓮子肉五錢杭白芍一錢銀柴胡一錢水煎服十二日此藥服三劑第三方注重生血養陰補氣健脾此方服後諸症輕減潞黨參三錢大熟地四錢荊芥炭三錢真茯苓三錢當歸身四錢陳棕炭二錢大生地三錢懷山藥四錢薏米仁四錢蓮子肉四錢枸杞子三錢北沙參四錢黑元參二錢炙鱉甲一錢五生棗仁三錢炙甘草二錢制香附二錢地骨皮三錢藕節二錢引水煎服十四日此藥服三劑第四方注重生血養陰建中止渴潞黨參三錢五柏子仁三錢冬桑葉一錢五杭菊花二錢生棗仁四錢大熟地四錢真茯苓三錢懷山藥五錢薏米仁四錢建蓮肉四錢當歸身四錢朱寸冬三錢補骨脂三錢地榆炭二錢荊芥炭二錢陳棕炭二錢地骨皮三錢北沙參三錢荷葉炭一錢五炙甘草二錢杜仲炭一錢川續斷三錢大生地三錢水煎服十六日此藥服三劑第五方注重生血化風健中服此方後病已愈大半頭暈大減冬桑葉一錢五杭菊花二錢潞黨參四錢柏子仁三錢朱茯神二錢當歸身四錢薏米仁五錢陳棕炭二錢大熟地四錢真茯苓三錢懷山藥五錢貢阿膠二錢北沙參四錢大生地三錢建蓮肉四錢杭白芍二錢土炒白朮一錢五生棗仁三錢藕節三錢水煎眼十九日此方服三劑第六方注重生血養陰健中此方服後飲食漸加精神恢復血亦漸少已能起床北沙參四錢懷山藥五錢柏子仁三錢薏米仁五錢廣砂仁一錢蓮子肉四錢黑元參二錢大生地三錢大熟地三錢地榆炭二錢陳棕炭二錢杭白芍三錢朱寸冬三錢當歸身三錢粉丹皮二錢藕節三錢引煎服二十二日此方服三劑第七方服煎劑約二十餘劑精神已恢復身體已漸健壯病者幸是農婦體格素強故病後恢復尚易然血漏尚未全止服此方百日乃血止體強照常工作此丸藥效力極確不可忽視也白鳳丸早晚各服一粒白水送下引用土炒白朮乾薑等查照原發單用引藥此症較甲症尤危險當其大出血血崩之時幾無生望注射強心針之後雖覺心氣稍可維持然出血不止幾於無法可施雖以大劑尹方即前列甲症之驗方與服總未生效蓋甲症係陽虛勝於陰虛故用健脾為主佐以參耆等藥得收大效此症乙純係陰虛故一再用甲方均不見效而且出血更甚此症每隔十餘日或七八日即下血一次下血後腹即不痛越數日又腹疼瘤腫愈大則又下血旋即腫塊漸消愈漏血愈多約半年之久其間亦用內服西藥及坐藥等法雖有小效然血瘤愈腫愈大時常小便不通服西藥利尿劑有效卒至毒瘤崩潰若按照西醫說法病至如此法在必死乃於無可奈何中竟於中醫大滋陰治法之原則下得以二十餘劑之中藥挽回其生命且白鳳丸一方亦非奇異難得之品殊不料其效力宏大對中醫視為難治西醫決為必死之子宮瘤竟能如是之靈此症在西醫固為不治之症即中醫治不得法十之八九亦終歸死亡故録此二例以資研究且乙症用甲方絶不效意者尹系富室張系農婦平日滋養不同生活不同體格不同是以余以同一之主張治此二症則效於尹而不效於張耶然兩症均危險乙症更危命在須臾現在均已強壯飲食起居一如平人甲已經過十八年乙亦經過五年餘康健優昔且一在余之故鄉一現在北京本寓均非遠人訪問不難願虛心之士高明醫者一研究之丙董夫人住德縣城內大寺街此余友董瑞芝君之夫人患血漏症月餘不止董君以傅青主成方與服不效血色愈淡患者日漸衰弱面色黃瘦延余診治以十餘劑治愈至今仍健在此屬初起之經漏症録原方於下第一方全當歸三錢土白朮四錢吳茱萸一錢炒杭芍三錢黨參三錢大熟地三錢棕炭三錢炙耆一錢川芎一錢地榆三錢升麻五分薑棗引水煎服第二方照前方加漢三七一錢減升麻川芎餘藥同前計第一方服七劑第二方服十二劑痊愈頭痛及眩暈此指日久頭痛或眩暈或偏頭痛而言若初得之實證不在此例原因日久頭痛或偏頭痛按西醫說不外腦筋病及牙齒眼目疾患之影響神經系眩暈一症則更屬於神經中樞衰弱之現象而中醫則率以腎虛陰虧內風旋動八字為主旨治法中醫有效治法率以滋陰清熱平肝補腎為主西醫則先檢查其病原例如有目疾牙疾時將病齒摘除或治愈眼疾則頭痛自愈而除去之用藥則不外止痛健腦與興奮等劑例如咖啡因之應用但此藥劇烈宜注意此症以余之經驗若無牙眼原因總以中藥治之為宜醫驗余少年時身體甚弱曾患偏頭痛數年一見涼風立即頭痛嗣以從鍛煉身體入手注意強健自然治愈某年由京回籍為次子結婚忽以感冒無暇療治日久竟誘起偏頭痛左偏下午尤甚鼻流黃涕長途往返痛苦異常日惟以加當藥片等退熱止痛敷衍治療後竟一服西藥即便嘔吐連試不爽且又不能根本治愈不過暫時輕減乃改服中藥發散之中兼止頭痛服藥微效此症初得即無暇發汗遲延多日未經注意但此時已不宜用發散藥故無大效也但每至午後不但體溫升高而且偏頭痛更甚急以連翹菊花桑葉黃芩薄荷苦丁茶夏枯草槁本白芷荷葉邊鮮茅根等藥治之一劑奇效病減大半三劑大效六劑痊愈此方治偏頭痛極靈屢試屢驗也張夫人住德縣城內大營街此余友張虎臣將軍之夫人年五十歲患習慣頭暈甚則欲吐遇有過勞或忿怒病即發左脈弦緊右小而弱此內風上逆肝腎失其條達滋潤之原理因而上擾頭巔也治宜疏肝滋腎久服可得平穩此症自服余藥今已數年未發原方列下霜桑葉二錢黃菊花四錢白蒺藜三錢鮮生地二錢生白芍三錢淡竹葉三錢嫩勾藤一錢生牡蠣二錢櫓豆皮三錢黑芝麻三錢水煎服每隔三五日不論頭暈與否必連賑二三劑並須注意攝生胃潰瘍此症最多中醫有胃脘痛胃癰及俗名心口痛種種病名籠統含混殊缺明瞭此取西醫病名也原因本病由胃黏膜受過當之刺激而起例如胃酸過多俗名吐酸水及過食辛辣焦香之物例如煙酒油炸火烤之物咀嚼不細例如暴食不嚼即咽下大涼大熱半生不熟不易消化等物及身體一切不攝生例如饑飽勞碌及恣食過當因而致使胃之血行起障礙則本病生焉症候本病有一定症狀不難診斷初起只常吐酸水亦有不吐酸水者即漸漸胃痛茲述於下胃痛此痛每於食後發生當胃部痛極劇烈甚則恆覺內部有擠壓狀血聚成病奇痛嘔吐此為必有症狀然吐出食物後痛即輕減背脹痛此症狀恆亙一二星期或二三個月時覺背部脹痛便祕十之八九患此症者大便多乾燥吐血必經過大痛此症至出血期則潰瘍已破吐血量極多所吐之血多暗赤色同時一部分血液由腸而下經過腸之作用變成暗黑色患者食欲如常或反亢進舌多清潔無苔此症疼痛亦有放散至胸肋間者此症至出血期已不致與其他疼痛誤認矣治法中藥對本病可謂一無可取歷試多次絲毫無效連治胃脘痛各方包括在內故余對本症完全採用西醫治法百無一失蓋此症初起不過胃酸過多吞酸食後脹悶此時診斷若兼有便祕只與硫苦合以重曹一面疏通腸內容物一面中和胃酸猶中醫所謂消食數日即可治愈此指輕症而言此時尚未形成腫瘍若習常胃痛嘔吐即可斷定其胃內血行已起障礙是必先以人工鹽重曹等清掃其腸胃一方面必須與以止痛之藥品例如鹽莫阿片丁等但不可用極量謹慎治療再加以飲食之攝生二三星期亦可治愈若患者發現大吐血及便血則是潰瘍已破非常危險第一須令患者靜臥禁止固形食物三星期內只飲牛乳或米湯不可食菜切忌驚慌內服次硝酸蒼鉛此藥能被覆潰瘍面促其結痂重曹痛甚者酌加鹽莫或菲沃斯越並須每朝夕服人工鹽此藥無習慣性故常服無礙約至四星期不可間斷患者切不可起立行動出血後至第四星期胃痛已去可以室內起坐緩步運動可以酌食稀粥此後再過一二星期可以稍食易消化之物至少一個月內不可斷藥人工鹽等小心看護必能治愈此症患者女性及壯年較多不必用外科手術也此症治不得法後遺症往往釀成中醫所稱之噎膈病即俗名之倒食反胃病醫驗此症在未潰以前不得謂之潰瘍只可稱為胃痛本編所列醫驗二則皆已潰之重症也余次子漢果體格強壯年二十歲乎素便祕有胃酸過多吞酸症食物時又不慣細嚼偶因旅行飲食失宜過於勞動因而感患胃部奇痛胃內似有西物相擠繼而大吐症遂減輕余診係胃瘍將成乃遂往西城某大醫院診察余蓋希望該院檢查胃液詳細診察以資印證也乃該院醫生臨診特別號略一詢問即為了事余當詢以何病乃竟意氣用事反詢余曰汝在何校畢業汝以為何病余從實對則忿然答曰此膽石疝痛四字而已余雖才淺學疏然對膽石疝痛與胃痛尚不致鑑別錯誤一至於此不得已乃又送入同仁會醫院經嚴澤與林荷駱兩君之診察認為胃瘍與以緩下劑約一星期而治愈自此以後時有胃酸過多便祕胃痛等現象與以緩下劑旋愈某日夜間忽覺胃痛加劇吐血甚多便血黑色便更多余知胃瘍已破乃以西藥施治囑令靜臥並先嚴禁固形食物只與稀湯約二星期處方如下第一方人工加爾兒斯泉鹽二五分二包每日早起用白開水化服一包第二方重曹八次硝蒼六菲沃斯越三分六包一日三包食前服白開水送下第三方鹽莫一乳糖五左為一包與以六包痛時服一包不痛則不用此藥此症即以此三方而治愈當其大吐血時勢頗危暈厥然已確認為胃潰瘍無疑故必先令靜臥勿動約三星期只以病者平素不能食牛乳故代以米湯稀粉雞蛋糕以雞蛋打破攪入一碗之清水放盂內蒸之如豆腐狀等稀薄流動之物為食品約三星期每日早晨服第一方一日之中分三次服第二方約一星期即將第二方減去菲沃斯越以胃已不痛故不用此藥也服之第三方只於吐血之始第一二日各服一包以痛較甚也嗣即不用此藥矣然第一第二兩方每日與服約四星期一日未曾間斷第二星期後已起床能食易消化之物矣此症遂以此等西藥而治愈中藥內之大黃有刺激性萬不可用薑君住北京西四牌樓大拐棒胡同十三號年十九歲以前患腸胃病年餘據云腹痛經過若干中西醫及針灸醫生之治療至二十六年四月病勢已危延余診治見其面色蒼白身體瘦弱病者自訴胃部奇痛有頑固之嘔吐大便則服瀉藥亦不得下以故只有嘔吐疼痛飲食不下衰弱幾至不能起立詢悉以前曾有一次大瀉黑色大便極多正在扎針期內聞此症請中醫扎針約數十日之久延至現在中西藥均辭不治余即斷為胃潰瘍無疑當日與以人工鹽一五不效又與硫苦二不效又與甘汞錠六片每片含量二分三次服仍未得瀉乃與拉克沙妥兒二片服後竟得瀉下極乾燥之糞嗣即水瀉二次當與阿片酊劑囑其每隔半點鐘眼五滴凡一日夜痛驟減嘔吐亦減止能稍飲牛乳伊家驚為神奇嗣即與以重曹硝蒼即前第二方去菲沃斯越囑一日三次服並與人工鹽即前第一方囑其每日早晨服之亦順利得瀉約三星期遂告大愈然患者有鴉片嗜好且食物不謹為本病治療上一大障礙是以治愈後約年餘忽又大吐血瀉血衰弱已極危險萬分又以前法參照前例治愈之此君若無鴉片嗜好決定不致有此二次之反覆也按胃潰瘍一症較易診斷以其疼痛發作時特別劇烈且有一切胃病狀況例如吞酸噯氣脹飽便燥嘔吐等症醫者不難參照斷定此對中醫而言故略去檢查胃液及檢查糞便等說明唯此症往往與胃痛相混胃痛症按之多輕緩胃潰瘍則按之更痛以此二症之病的現象多相同例如上述一切胃病症狀故醫者當二症初起之時容易相混但二症治法不相反背此指西藥言若中醫論此症則有寒熱虛實之分惟余不取中醫之說若以本編所述之西藥治法治之亦均有效僅有胃病不必用次硝蒼但二症用中藥皆不如宗西醫說為確當速效此因論胃潰瘍連類說明之但普通病人對醫學不能具有常識往往以心口痛或胸口痛自訴痛苦醫者對於此種場合最要細心診斷胃潰瘍與胃痛二症診斷不清治法尚無大異不致誤人性命唯胃病症治最宜與心臟病精確鑑別尤其與絞心症中醫所謂真心痛更須鑑別否則用藥一誤立出危險而中醫遇此場合尤易誤認故余不得不詳細說明之願醫者臨是症時格外注意也凡胃痛例如嘔吐吞酸食後痛大便燥脹飽等多有一切之胃病症狀此為首應注意之點若無一般胃病症狀時常感覺心臟部疼痛或忽然發作疼痛俗名心口痛胸口痛多系統指胃病與心病之名稱最足誤人醫者即應格外注意於二者之鑑別茲將其此二病相異之點說明於下心臟之疾患急性之心臟內膜炎此症有顯著之高熱及腦症狀只有心悸亢進不發劇痛與胃痛容易分別心臟瓣膜病此症有喘息呼吸困難心悸亢進腸胃障礙雖與胃病有相似之點然只有僂麻質斯疼痛與胃痛亦易分別又有心臟病劇烈時患者立時即病倒心亂如麻且有咳嗽吐血及吐白沫者俱係偶爾一次須注意此實例亦甚多此蓋由於心臟血行障礙因而牽動肺循環之血行歟然此種咳嗽吐血只限於心病發作之一時若心臟病不發作之時絶不咳嗽亦絶不吐血自然不致與肺病胃病相混此余之實驗談也心囊之疾患中醫書所謂心包絡也心囊炎此症雖有心部發痛似與胃病相混然此種疼痛乃隱痛並非劇烈且此症心悸亢進惡寒發熱亦與胃痛迥異不致誤認心囊水腫此症心臟部有顯著之漿液蓄積且乏疼痛亦與胃痛不致誤認心臟實質之疾患脂肪心此症無疼痛不致與胃病混淆心臟肉質炎此症雖有心臟部之疼痛然本病必發高熱且有極重之神經症狀與胃痛不致混淆冠狀動脈硬化症本病多起於歲以上之人且多因身體過勞飲酒吸煙過多或梅毒痛風而起為一慢性之心臟疾患其症候有心筋衰弱絞心症心內絞痛此點最易與胃痙相混心臟性喘息失神發作胃痛無此失神現象心動急速或緩慢此症極易與胃痙相混應注意其他胃病現象自不致誤認心臟之神經性疾患神經性心悸亢進此症無疼痛不致與胃痛相混絞心症又名心臟痙攣中醫所謂真心痛者是也此症最易誤認為胃痙攣治法一誤立致人死醫者最宜謹慎診斷此症除缺乏胃病之吞酸嘔吐便祕等症狀外最宜注意此點其疼痛之發作幾與胃痙相似以故中醫遇此症時往往誤認殺人即在頃刻以此症一遇中醫之消導順氣清熱等藥服下即可令代償機停止活動而歸於死亡此余所親見閲後王成琨一病自知非有不慊於中醫也此症與胃痙在真正之西醫一經診斷不難鑑別此為中醫立言故知此云云絞心症之原因強半由於心臟中應有之血量急速減少或因煙酒過度及其他心臟病故其現象患者夜間常常醒覺感呼吸困難及心臟部之奇痛與異常之煩悶苦惱此時之劇烈疼痛如絞縊如壓迫如掰裂有難以言傳之痛苦其痛往往波及肩胛頸肋此與胃病不同之點但又與肝膽肋等痛容易誤認手足厥冷顏面失色愈遠愈顯痛時皮膚出汗脈或停止病發時更有一種苦悶與滅絶之感覺在病者比較疼痛尤為苦惱疼痛持續時間由數秒至三十分鐘不等誘發本病以身體之劇動精神感觸有一見涼風或行動用力即誘發者及飽食交接等為最易夜間發作時尤多除消化有時微覺障礙外其餘一切胃之病狀絲毫不見有時吐白沫喘息故又易誤認為肺病然肺病絶不如是之絞痛也是宜特別注意之點也退失音亦能漸愈此非主要症候也附録王成琨君病歷一則王成琨年三十六歲住珠市口南何家大院二十五號膏藥商人據稱早年一經過勞例如挑水恆覺立時心亂必須臥下須臾即愈在一千月前偶因入澡堂沐浴方入門即覺呼吸困難因而心亂疼痛喘息吐白沫甚多自是之後每一出門行動稍勞即誘發心內疼痛如絞如掰夜間尤甚注意胃病症狀均無絶非胃痛即請中醫某診治謂係肺病蓋因其喘息故錯認也治之不愈又改延某中醫診治認為脾胃病與以白朮白芍等藥余汜其方有此二味服下病更甚又延某醫診治聞係注射強心劑病稍減仍未愈最後其戚某亦中醫來診乃為開一藥方記得內有黃芩枳實陳皮龍膽草等味余適至病家作友誼之看望見其方煎此藥乃告以不可服用此等中藥然病者深信伊戚某之醫術至下午八點鐘服下此藥約隔三小時即覺病痛更劇意欲如廁方起床即驟然死去時為二十七年十二月五日此即絞心症患者之病歷録之以為庸醫殺人者戒也此症疼痛最烈時稍與鹽莫止痛亦可然最有效之治法應參照本編怔忡病作膏劑與服可以治愈怔忡此指久病無熱之心臟重症而言若熱性病中發現之心悸亢進不在此例原因此症原不外心臟衰弱所最習見者為老年人衰弱者及大失血之後大熱性病之後日久大驚恐及手淫均為本病原因之一其次則嗜酒者身體雖不甚衰弱亦能漸罹此症治不得法多取死亡之轉歸症候感覺心臟部跳動不寧在輕症之患者偶爾心動多不注意若再病勢加重則每隔數分鐘或暫停止呼吸時即覺心臟突突顫動若連珠水泡之激發稍停又來忐忑不寧漸次失眠喘促面目浮腫一有思慮及談話即感心亂即或一人獨處亦覺心內擾亂悲慘有口不能言之心內悲苦卒致驟然感覺心動倏忽畢命余友鄭如穆松軒二君皆死於此症二君皆嗜酒余回籍時詢病歿時情狀故知之治法西藥對此症之唯一治法為強心劑有特效然根本治療此症乃中藥之大補氣血法余曾與西藥之實芰達利斯樟腦酸斯爾方那爾等及其他鐵劑與強壯劑等厲經比較而知用西藥結果一時有效藥一間斷則病仍發作且毛地黃等又有蓄積作用不宜常服而中藥內之治此症藥品則極簡單子和數味此數味不知幾經試驗若千年而始得之不可忽視也其效力之大起死回生參看醫驗真有研究之價值但歷經試驗若於此數味之中藥外加減太多或太減輕其用量則仍無效此點更有研討之趣味故此數味中藥真可定為奉症之標準方矣原方列後不可加減用時不可隨意更改藥味大台參八錢炙黃耆八錢當歸身兩柏子仁四錢炒棗仁四錢龍眼肉四錢炙甘草四錢煎妥沖入黃酒少許約三瓦此藥煎一大杯一日三次分服或不用黃酒亦可醫驗蔡夫人住德縣南關柴市街年七十餘歲此症係病家轉挽余友徐仲甫先生及石君延余治療當時診得左手現代脈右手脈細小亦三五至一止詢其痛苦病者下能言伊子蔡君則聲稱不過感冒之小恙而已然詳細診察毫無感冒症狀又無表熱徵兆洵其不能起床則已數旬且衰弱現象畢具絶非外感參以脈象非常危險乃斷定為心臟衰弱之重症處方如下中醫診術望聞向切之問字遇此種場合最感困難學者注意第一方台黨參六錢炙黃耆六錢當歸身八錢柏子仁三錢炒棗仁三錢龍眼肉三錢土炒白朮四錢炙甘草一錢煎妥一杯沖入黃酒少許一日三次分服服前方三劑大效病者漸進飲食又復延診脈象稍有起色但仍現結代精神略佳古稀老人心臟衰弱藥雖對症不能驟見大效然服藥數劑即能得此效驗足證此病尚可挽回乃照前方加減治之第二方土炒白木四錢大台參八錢炙黃耆八錢當歸身八錢柏子仁四錢炒棗仁四錢龍眼肉三錢炒白芍二錢炙甘草一錢煎妥一杯沖入黃酒少許照前法服前方約服十餘劑完全治愈囑其斷藥方法以次遞減不可驟然停藥約月餘漸漸止藥囑其每覺心內忐忑仍照原方煎服一二劑平時每隔一二月服西藥威古龍丸一二粒此藥不可濫用往往誘起吐血惟不可按時常服此症治愈後蔡君在喧譁角街設宴酬醫深致感謝之意余竊以為既係自覺感冒小恙何必轉托友延余診治既已治愈若自以為感冒小聲又何必盛筵致謝過分感激後乃微聞此症實已病危前醫業經辭謝不治並告伊家病重囑其預備後事余適於此時由湘旋裏余友恐告知病重余有難色故將病情隱去幸余尚能診斷確認否則幾何不致錯認小恙貽誤人命耶後見病者所服前醫之方所用藥品亦多治此病之對症良藥但藥味太多藥量太輕且有兼顧胃口等藥天王補心丹加減是以藥性不純功效不著耳余之此方不可任意加減服法亦宜注意叮嚀相告願讀者信余言也呂東生住德州城內八仙廟街年三十餘歲此余友也是時與余同客湖北有肺病於民國九年忽患大吐血衰弱殊甚血止後心臟衰弱症象大作診脈右手細微已極左手無脈每隔數分鐘即覺心臟突突跳動漸漸喘促失眠忐忑次數愈來愈急心臟將停詢悉曾自服自來血旬餘毫無效力症勢危篤以致於此乃以大補氣血之劑與之服三劑後症象稍輕左手現結脈右手現芤脈原方列下大台參八錢炙黃耆八錢當歸身一兩炒棗仁四錢柏子仁四錢龍眼肉四錢炙甘草二錢煎妥二杯分六次一日夜服完此方服三劑即見大效以後共服十六劑痊愈但服過五劑以後藥量漸減以次遞減至全量之半為止服藥之法亦照蔡姓方法以次漸減不可驟然停止服藥某年見報載段祺瑞先生在滬因大吐血後患心臟衰弱症極危經西醫用輸血法治愈細審病狀即此症若以此中藥治之百無一失輸血之法繁重不資非普通病家所能辦到亦非普通醫院所能辦理吾國自有天然妙藥即本方惜為不關緊要之雜說雜藥所紛亂例如天王補心丹孔聖枕中丹等試之均不驗而此數味良藥即埋藏於此成方之內余經過若干年之抉擇始得搜尋而出故特定為治此症之主方表而出之以告世人過信古人及偏重西醫者腫脹俗名臌症此指久病虛證之腫脹而言凡新得實證腫脹不在此例原因大病之後或身體素弱心臟腎臟肺臟肝臟血行障礙皆能致此症俗名臌症而中醫注重脾胃失運寒濕為病實有精義此論已中腫脹之的肺癆病之末期亦有腫症不在此例此症中醫主張溫補滲利與氣化之說互相闡明有不可思議之妙余本此理論治愈極重之腫脹不知凡幾勝於西藥萬倍願學者注意及之症候身體衰弱四肢畏冷不喜飲水小便短少大便不爽或溏或祕結胸腹脹悶漸即咽乾口燥鼻乾反覺熱氣上沖手足浮腫再重則面目口唇及腹部全腫男子腎囊亦腫臍部突出或有嘔惡甚則全身浮腫光亮氣喘或有或否痰飲肋下恆覺有水瀦留日漸衰弱不能臥下皮膚用手按下凹形不能立時恢復卒致心臟麻痹而死西醫論腳氣症其浮腫徵象亦與此略同然非一症不可不知治法西醫維他命療法內服及注射亦輒效余曾試驗若干次但非濟以中藥不能完全收功利尿療法及穿腹術俗稱放水雖一時有效然非根本治法亦非善策中醫對此症曰風曰寒曰熱曰濕曰痰曰蠱曰陰水陽水曰氣分血分其治法則有汗法有瀉法有補法有分利有消導立方紛雜故設疑陳後之人一遵古法按病施治百無一生余見此症之誤於汗誤於瀉而死者不知凡幾故敢痛切言之其實此症中醫極有效之治法僅有補脾胃扶陽氣以固其本參以滲利以治其標數語足以概之第攙入種種說法種種雜藥則失其效耳余不敏四十年來遇此症不知凡幾其稍輕者均以余之認定補脾和胃滲利六字而治愈其最重者則以中西藥並用無不愈者參看醫驗此病即俗名最可畏之臌症皆係久病注意久字為要非新得熱性病暴腫可比亦非僅西醫所稱之腳氣病浮腫乃周身水分因全體衰弱已極熱力消失無自然排泄蒸發之能力所致治療稍不得法必能斷送生命之一大危險症也此症初起只有手足輕微之浮腫或腫或消飲食動作一如常人此時期在病者既不認為重症醫者亦多淡漠視之不加注意殊不知此可畏之死症即於此漫不介意之中而演進不止逮至病勢加重腫脹不消或腫過胸腹或四肢皆腫男子腫及腎囊女人腫至頭面者已至危候症多不治則種種變相注意變相二字最足令醫者虛實不分寒熱不分一入此迷途殺人之速易如反掌繼續而來拘泥古說之中醫若缺乏多年之經驗精鋭之眼光堅固不拔之魄力遇此場合則中醫歷來誤人之玄虛學說似是實非之治法游離腦際乘機而來稍一不慎此際必受古人之仲種謬說所迷惑中醫大缺點即在此處若見病者大便乾燥小便又短赤鼻乾口乾舌有薄苔咽喉恆覺熱氣上沖舌且紅而起泡口渴不思飲水則必疑為濕疑為熱而欲一試其瀉下法耶一試其分利法耶一言以蔽之必無效也若見病者咳嗽痰不出且無唾無汗無淚小便赤短而味特臊頭暈而痛嘔吐不能食一聞有味之物即便嘔吐大便或微溏一日二三次或燥或腹痛腹鳴厄氣不出則又疑為風疑為寒疑為熱疑為上實下虛而欲一試其發汗法耶一試其補瀉兼施法耶一試其開胃理脾法耶一言以蔽之必無效也夫現某症狀用某古方何以不效曰古方誤人不只臌症一端也此症古方紛紜古論龐雜余之試驗者已四十餘年矣確知古方對此症分利消導順氣祛濕祛熱雖不中病尚不致於立傷人命惟有瀉下及發汗二法明明係治實證腫脹之方若誤用於久病脈細微之虛腫虛脹未有不致人於死者此非古人誤今人實則庸醫缺乏真正學識誤病家耳汗下二法皆治實證腫脹豈可以治久病之虛證學者須切識此言自不致再受古人風寒濕熱陰水陽水之迷惑矣此症既至危篤必然變相百出醫者若無真實經驗不易決定虛實寒熱生死關頭即在於此實則久病虛腫無論現何脈症均按虛治適用中醫大補元陽之法及西醫之收斂治法有泄瀉者維他命療法無不百發百中萬無一失此余歷經實驗絶無一字虛僞也例如此症既現小便短赤附子一味又明明有收縮小便之力用此治療看似藥病相反絶非所宜然非用此藥不能斡旋人身已失去之元陽蒸動將死之水氣故加此味於補脾補腎之湯劑內放膽與服數劑而後小便反多而且清白此中妙諦非經過多年實驗者不能知之故余坦白記述也本病變相最易令人迷惑者即是種種現症巳將虛象掩去若只見症論症則此時病變已非本來面目又焉得不迷惑猶疑耶蓋病患至此階段除腫脹現象日甚一日外餘如小便短赤而臊嘔惡略聞有異味即便嘔吐且厄氣不能出口舌糜爛呈鮮紅色舌上起泡口乾但不喜飲水喉內灼熱恆覺有熱氣由喉內上沖類似冒煙胸滿壅塞恆覺胸內壅腫悶塞一齊上湧口乾無唾肺乾無痰目乾無淚鼻乾無涕皮下無汗一切津液均閉塞不通大便溏亦有燥者或泄瀉心悸不眠頭暈頭重以上種種疑似實證之現象不即不離最易令缺乏經驗之醫者舉棋不定虛實混淆此症生死關鍵即係於此似實似虛之間醫者遇此重症之腫脹須以十二分之毅力認定陽虛衰弱純為虛寒血行障礙水失氣化之所致一切似是實證之點皆係假像萬不可被其迷惑中醫氣化之說精妙絶倫純粹適用於此種之腫脹絶非西醫腹水及腳氣等說所能及是以中醫之補陽補氣補脾溫腎滲利等法為根本治療此症之唯一原則若再參以西醫之收斂療法此症有泄瀉者適用之參看後列趙姓醫案自明利尿療法用否不關重要防有流弊且有一用利尿劑病反加據者不可不知維他命療法此法最效中醫應採用之但單獨用此法不能完全有效故須參用中藥也則此可畏之臌症必能根本治愈但病勢太重有時只用中藥或只用西藥往往各有困難不能即收速效此句不知經若干年之試驗始確知其如此也故余對此症主張中西藥互用病至極重時萬不可試服一二劑無效醫者即心無所上改變治療方針則大誤矣相濟為功中西藥互用之法除本編所載之醫驗數方外學者萬不可任意互用以免危險必能使一切似實似熱之假現象漸漸退去而後病者陽氣恢復始能重新蒸動周身內外分泌使其全部臟腑皮膚均有排瀉水分之能力則一切津液自通例如小便唾涕等諸症悉去口有津液小便亦多矣而血行通暢全體各分泌作用漸漸恢復使水分照常排瀉於體之內外注意此內字蓋內分泌之停止為害更甚於外分泌也是以此症治療有效之第一佳兆即是尿量增加涕唾汗淚等一律可以自然發出血管內不留水分組織內不留水分則腫症盡消矣此病理經過四十餘年之實驗反覆討論始敢確定望學者勿忽視也腫消後足痛脹不愈中藥牛膝有特效分量約在五六錢虎脛骨亦可用此症中間治法稍一猶疑例如服藥一二劑因病太重未能見效即疑藥不對症更換醫生或醫者自信不堅中途改變治療方針之類均足誤事必歸失敗是以醫者臨診疑難大症要有真識定見萬不可存以藥試病之心理對此症用藥之輕重緩急先後次序或中或西均賴醫者老練堅定之心手與夫隨機應變極靈活之心思起死回生透視一切確知此症演變至何程度而後可以與談中醫之神妙而後可以與談西醫之科學而後可以稱為能治疾病之醫否則人云亦云古今人均包括在內必不能治疑難之大病也欲研此症之病理第一即須明瞭中醫氣化之精妙理想經絡臟腑營衛氣血陰陽均包括在內與夫西醫之內外組織分泌臟器血管氣管淋巴腺膜等等之生理現象須知此症向愈之道路即是使病者身體恢復其生活力使其全身機關一律蒸動活潑內外通氣血流自然則大病斯愈腫症至極重之時往往患者自覺向左臥則體內血液全沉於左側向右臥則全沉於右側起立時則覺血液沉墜於兩腿即此現象可以推知病者血流已無自然回圈流動之活力一如注死水於皮囊之內左傾則左注右傾則右注可上可下可左可右任人顛倒擱置毫無知覺毫無自動能力高明有定見之醫者須一眼覘定此血流何以不能自動則必由於生活力之衰微已極生活力何以衰微至此則必由於全身神經衰弱已極早失其知覺運動指揮命令之機能所以腫病至極重之時皮膚肌肉無論如何刺激絶無感覺反應之可言幾如一塊死肉不知痛癢不知麻木知有麻木之時病尚較輕也皮肉以手按之凹處不能自起至此程度九死一生矣然治之得法參照醫驗縱極危之症余敢斷言必能有效其病勢好轉之現象始則漸漸感覺麻木痛癢繼則漸漸發生津液繼則四肢溫潤皮膚柔和腫消脹去不麻木不痛癢則健康恢復矣於此有一治療本病最妙之真諦即吾人體內之生活力及神經賴以生存之熱氣是也此熱氣不足則人弱熱氣滅絶則人死中醫藥內唯一有效補助此熱氣之靈藥即屬於大補元陽之方劑此種方劑求之西藥則難乎其難故此症中醫所以能挽回生命於危急之頃者雖有時亦應借助於西藥然其主要方劑實賴於此種特效之中藥則余敢斷言也此症關係內外分泌之理本係參以西醫生理立論亦應詳為解說以告學者蓋此症所以致腫之原因即係病者內外分泌漸漸閉塞停止活動以致周身水分一滴不能向外排瀉此外字包括臟腑而言所以眼淚鼻涕痰唾汗液一律閉止小便亦非常減少而色濃味臊每日所飲食之水分完全停留瀦蓄於血管及各組織之內有空隙鬆動之處瀦留更多愈聚愈多則內外皆腫人但見外皮之腫而不知內臟皆腫也水無出路漸向組織鬆懈處流聚例如下腹部於是大部分停留於少腹部之下西醫放水之法穿刺術純係治標旋放旋聚無濟於事故不如中醫之溫補滲利一面助其蒸發水分之熱力一面開除排泄水分之道路標本兼治百試百驗此中醫對腫脹一症所以有特長也此症俗名有臌症之稱西醫書載此症有大便乾燥現象然此症亦有大便泄瀉者不少此余之實驗談也蓋因患者至極重時腹部之腫脹特甚其病理已如上述然余既欲闡明中醫氣化二字以為根本解決本症之前提故不得不參合西醫分泌生理言之以資對照此種生理係根據科學毫無可疑學者須知此症一方面為生理的不分泌是以有以上無唾無涕種種之乾燥現象另一方面為生理的不吸收故又有液體鬱滯水分瀦留體內之壅腫現象蓋分泌與吸收兩機能作用不完全而後演成此症一言以蔽之設非神經衰弱氣不蒸化絶不致分泌與吸收失其平衡也西醫穿腹術俗稱放水為救濟一時之法不可不知中醫腫脹之說包括於俗稱之氣臌水臌即合西醫腳氣病與腹水之通稱考西醫腹水與腳氣病本係兩症原不可混為一談但此二症之原因於腎臟肺臟心臟之疾患而生之血行障礙因而誘起此二症者不少且水腫性之腳氣其漿液膜腔亦有顯著之蓄水是二症自有其一部分共同之現象醫者須細心參考自然運用中醫氣化之說則有左右逢源之樂矣腹水與腳氣病理以限於篇幅均從略中醫治病必分虛實而後定方此二症中西醫均有汗下二法並非錯誤但學者對於汗下二字須切記係指病者元氣未虛得病未久或在熱性病中之實證而言萬不可以此二法施之於久病纏綿脈虛體弱之腫脹再加以參看後列醫驗自然明瞭余對此症之立論並非偏於溫補矣余每遇極重之腫脹內臟腫故自覺脹悶即本此獨具之理論毅然排除古書不合理之說法謹慎施治只要病家信仰始終一致從未遇一失敗之例本編付梓時正遇一極重之腫症且已經過多數醫者之治療未能收效者現已完全依此理論治愈之此可謂最近最確實之一證茲將此醫案摘録於後以告學者此症為趙夫人住北京西四牌樓大拐棒胡同九號為大律師李鶴鳴君之妗母有欲研究此重症以證余言者不難訪問也醫驗張夫人住德縣南門東街年三十餘歲此係余友張松泉君之夫人於民圃十四年患腫脹日甚一日其初僅覺脹滿四肢畏寒手足指尖浮腫飲食日減繼則腹腫小便短大便燥或溏約年餘腹腫更甚臍部突出且有水浸潤腹部恆覺有水瀦留已成重症以前服藥率皆理氣消導利水之品經年未效經余診斷見左右手脈皆沉細而濡認為心脾虛弱心臟衰弱血行障礙易水腫此西醫病理脾弱不運之說則中醫病理也已極亟應補心氣以壯血行培脾胃以利運化冀以中西醫理相互治療無不應手奏效但此症最忌發汗瀉下等藥猛烈攻伐之品葶藶甘遂等尤為大忌即順氣之藥例枳實檳榔陳皮厚朴之類亦應謹慎余治此症不下數十例從未失敗親見誤於醫藥死於以上治法者不知凡幾最近乎綏鐵路局一張姓科員先誤於汗又誤服硫苦瀉藥至喪其生命故余明白揭示願病家醫家大注意也原方列下大台參六錢炙黃耆六錢土炒白朮八錢蒼朮二錢茯苓皮一錢薑皮四錢懷山藥六錢紫蔻仁五分薑棗引此症約改數方大意均如此服藥四五十劑其中加減不過一二味率皆補養之品絶無澤瀉車前大腹皮枳實等藥以此症改方太多為節省文字故未全録奉方用參耆即所以補心氣也此症愈後曾服人乳數月故健康恢復較易至今已十餘年康健如昔趙夫人年四十七歲住北京西四牌樓大拐棒胡同九號於二十七年十月十六日就診據云病已經年前已經過多醫現症為浮腫以前僅手足微腫漸腫至腿及胸腹均現高腫頭面頸項口唇亦腫時覺呼吸困難喉中每覺有熱氣上沖舌上口內並起紅泡咽乾無涕無淚無汗無痰無唾嘔吐小便短少色重不能飲食腹內恆覺脹滿厄氣不出每日大便約瀉一二次不思飲水兩手脈沉濡細微全身衰弱已極斷為陽虛脾弱一切假熱現象亟應舍症從脈大劑培補陽氣以冀挽救此危篤臌症病者自稱難愈原方列下中藥類懷山藥白朮茯苓皮薑皮熟附片豬苓苡仁人參炙黃耆蔻仁牛膝龍眼肉薑棗引西藥類利尿劑收斂劑維他命劑健胃劑漱口劑本病已至危候治療殊覺棘手脈症既不相符又兼接治之初患者聞藥即吐不能下咽但余既認定其唯一原因純係虛寒致腫一切熱征均係假像故敢毅然決定治法但病已太重服藥不能立效然余絶不因其未見大效稍存猶疑始終執定余之定見與此病相周旋立方加減消息緩急中西共濟自二十七年十月至二十八年二月此可畏之臌症已完全治愈所立藥方太多不能全録撮其大要如此此症若在缺乏經驗之醫者著手一見不效立即改變治法必致貽誤余雖庸工然認定病因從不妄事變動卒能收效亦快事也本書二十七年十二月已出版因欲補入此醫案重復印訂實以此例日期最近疑難之點頗多且又經過多醫頗有研究之價值故不忍割愛追加報告願醫壇師友共討論也久瀉此症與上條腫脹有連帶關係學者應以意會但久瀉二字似不足為病名余以中醫關於虛弱之瀉症名目繁多徒亂人意故定此名以資取法凡日久泄瀉皆包括在內但新得之瀉及痢疾不出數星期者不在此例此久宇應特別注意原因此症唯一原因即為腸之衰弱大約均由實證轉變而來例如原病係新得之痢疾實證因治不得法耽延日久數月或數年遂變為久泄或大病之後飲食不攝生或身體素弱又有不良嗜好飲酒及手淫等或肺結核之蔓延或營養不良或高年衰弱皆為本病原因西醫所稱之慢性腸炎加答兒症即屬此症中醫則責之脾腎虛寒其理一也症候一日之中不斷如廁或二三次或四五次晨起及夜間尤易泄瀉其大便多溏稀或下利如白油或腹微痛脹滿不思飲食日漸衰弱全身違和肌膚甲錯發脫氣促虛汗數月或數年之後全身衰弱已極漸致不起在小兒尤危險參閲後慢驚風症卒能因此斷送生命治法此症治法第一須嚴禁固形食物在治療期間每日飲食尤應以流動而易消化者為准其藥品中藥則以收澀例如粟殼桑螵蛸等補氣例如參耆補脾例如白朮山藥茯苓補腎例如補骨脂補陽例如附子肉桂皆有大效至若調胃之藥不過加入少許例如豆蔻三分以防補藥太重妨礙胃氣西藥則以阿片末次硝酸蒼鉛單那兒並為特效單寧酸太害胃不宜過用余治此症甚多率於著手施治之始預用小量之瀉劑先刷清其腸胃例如硫苦重曹次則禁止固形食物次即入於正式藥物治療法以硝蒼等西藥自晨至下午五點鐘分三次與服此指成人而言小兒不必用西藥至十點鐘以後令服中藥一次約一星期必見大效以後即將西藥分量酌減仍分三次一日嗣即再將中藥分量酌減在此時期斟酌病情中西藥亦可酌加或變換其服藥時間久久自能治愈矣但此症只服中藥或只服西藥多不易根本治愈此症服藥方法例如臨睡時令服西藥第二日晨仍服西藥午仍服西藥下午五點鐘服中藥一次臨睡再服中藥一次如此可以試服一星期病勢漸減則減去西藥或偶服一二次將中藥一劑之分量加重一日三次盡服中藥約一星期再將中藥改作膏劑每日三次與服大約一二月之中必能治愈此症中西藥互用讀者必有相當疑慮實則此用藥法余已實驗多年毫無危險但在小兒病最忌阿片故不可濫用西藥也此症最易確認只要常年纍月泄瀉頻頻即可以此法治之不論腹痛及所瀉有似痢疾之物與否一律概從虛治萬不可迷惑於中醫濕成五泄及噤口休息痢等說一入此迷陳萬無治愈希望且恐治絲愈棼糾纏不清也醫驗門君住北京齊化門內北豆芽菜胡同四號年五十二歲前曾患紅白痢疾一年前未能根本治愈後即漸漸泄瀉每日五六次黎明之時必瀉一次腹微痛所瀉有白油樣膿黏物亦有微痛有時瀉稀溏糞所服藥品復雜久治不愈病已年餘漸漸衰弱於草六年七月就診左脈弦細右脈沉濡認為脾腎虛寒腸神經衰弱治宜澀補其方列下第一方西藥此藥晨服一次午服一次下午三點鐘服一次晚十點鐘服中藥一次次硝酸蒼鉛六人參精二分六包一日三次二日分服此方服後立見效每日只瀉二次又與下方令掉換服之第二方西藥此藥服法與前第一方同仍兼服中藥遂收大效次硝酸蒼鉛四單那兒並三分六包一日三次二日分服此方服後每日瀉二次後又加人參精二仍分六包約服二星期每日只瀉一次三星期後此方分量減一倍此後每日服二次或一次第二方中藥此症根本非中藥不治然中藥效力稍緩故以西藥救濟之不可只用西藥也土炒白朮四錢懷山藥六錢炒茯苓四錢白扁豆五錢杵大台參四錢炙黃耆四錢炮薑一錢補骨脂一錢酒炒砂仁米三分杵粟殼二錢炙甘草一錢薑棗引此方效力極大加減約服二十餘劑即痊愈先停止西藥又將此中藥方加重分量製成膏劑一日三次白開水化服一茶匙約一月痊愈第四方中藥此方係病愈後已逾一年患者又覺漸有泄瀉來診與以此方囑其每隔五六日即服一劑至今健康已恢復炒山藥四錢雲茯苓四錢土炒白朮四錢粟殼四錢台參三錢炙黃耆三錢炮薑錢半補骨脂三錢桑螵蛸二錢熟附片一錢豆蔻五分炙甘草一錢薑棗引煎服此症最忌用一切治痢疾之藥及清涼等藥而中藥之內所慣用之一切藥味凡重濁不快之品例如吳茱萸烏梅五味子等均不宜用以患者胃氣已衰不能勝此等藥味故有損無益也其餘順氣破氣之藥一概禁用丸藥恐害胃亦禁用改用膏劑縱有虛脹調其飲食可也慢驚風此即小兒久瀉衰弱之症一名慢脾風此症可與上條久瀉症參看原因此症雖屬虛弱然亦多由實證轉變而來例如小兒暴得之吐瀉症西醫病名日久轉為此症者極多其餘或因瘧疾或因痢疾或因痘後疹後或因飲食油膩厚味瓜果生冷積滯日久過用攻伐及瀉藥或因熱病過服涼藥或因先天薄弱乳食缺乏或因貧困滋養不足皆為本病原因日久注意此二字失治全身衰弱脾腎虛寒氣血兩虧即成此症症候此症唯一病狀即為脈多細小日久泄瀉愈瀉愈虛遂現全身神經衰弱皮膚甲錯骨瘦如柴頭髮漸漸稀細而黃漸漸脫落頸項細長嗜臥不語或嘔吐再重則神昏睡時二目不能緊合甚則一日之間二目不能全開庸醫往往疑為目疾則大謬矣氣喘咳嗽或日晡發熱或忽冷忽熱手足驚搐俗云抽風面色蒼白或二目如蒙小便清白或有白粉沉澱口鼻氣冷雖有口唇乾裂出血須記清此條久病口中氣涼不喜飲水即是虛證不可誤認為真熱也或瀉利冷汗或完穀不化或四肢冰冷喉內痰鳴角弓反張二目天吊自汗盜汗囪門下陷以致痙厥衰敗而死此症發熱唇焦最易令醫者猶豫不決須切記日久二字必為虛熱無疑也治法此症唯一治法第一要著即在止瀉其他現象只要瀉止一律皆去是以參耆白朮白芍熟地為必不可少之品再重則附子肉桂乾薑補骨脂粟殼亦為要藥雖有發熱萬不可認為實證醫者診察明白即應放膽治療起死回生實有奇效最重之症必不得巳時中藥與西藥互用無不收效參看醫驗但小兒科總以不用此種西藥為宜以藥量倘有錯誤立致危險故余鄭重聲明於此醫驗張宅幼童年四歲住崇文門外鐵欐欐把胡同四號此余友欒翔云君之內侄於民國十七年三月患疹疾經過半年遂衰弱泄瀉久治不愈來診時大脈細微氣喘神昏發熱骨瘦如柴嘔吐咳嗽泄瀉不止完穀不化睡時二目不能緊合察其前服藥方率皆指為疹後餘毒未盡所用之藥仍是清涼分利解毒之品余認此症已成慢驚重症即以脾腎虛寒論治處方如下中醫命門相火之說精妙玄奧實能闡發吾人生活之原理絶非有形質之物故余於前編生理下取命門即精囊乏說參看自明第一方大黨參二錢炙黃耆二錢土炒白朮三錢懷山藥四錢炒茯苓三錢炒白芍四錢大熟地三錢補骨脂一錢炙甘草一錢薑棗引煎一杯分六次一日夜眼完此藥一劑即大效第二日熱退大半瀉亦減精神稍旺吐亦止漸能飲食此症改方約四次大意均不出此余治此症最多茲録兩案取其近在北京易調查也此症最忌寒涼順氣消食分利等品例如黃連黃芩半夏神曲麥芽山楂厚朴枳實陳皮車前子澤瀉之類誤用此品殺人最速醫者戒之余表弟盧玉如之公子年四歲一日延余診病至則見其身熱大喘大喝呼冷飲脈已絶病已不治詢其以前病狀則以因患溫症腹瀉對請其出最近所服藥方則某庸醫之大補劑也此醫因常見余以此等藥治愈小兒之泄瀉乃不分虛實驟然與之真可恨也嗚呼此子係新得之實證何可用補劑而某醫一見腹瀉即以參耆朮地等品與之其殺人之速較之誤用順氣消食之藥者更覺可畏録此一則可見此種起死回生之實驗良方若用之於新得之實證則萬萬不可也王宅幼女年五歲住阜城門外內巡捕廳胡同二十九號於民國二十七年九月來診據稱此症已經過多醫以前病狀泄瀉咳嗽已經數月診療未愈近則咳嗽泄瀉所瀉之物且有如白痢狀者每日鼻塞不通上午二目不能睜開泄瀉亦在上午為甚診其六脈細如遊絲全身衰弱已極且有虛熱認為慢驚風重症處方如下此症檢查以前藥方多將各種病象認為另一獨立病症分別施治是大錯誤不忍不言第一方西藥托氏散三重曹一分六包一日三包此方白天分三次服之共服三劑第二方中藥炙黃耆二錢台參二錢上炒白朮三錢炒白芍三錢懷山藥三錢補骨脂一錢大熟地一錢炮薑五分粟殼五分歸身一錢沙苑蒺藜二錢枸杞子一錢桑螵蛸一錢棗一枚引煎服此方早晚二次服下加減只此數味第三方西藥人參精一次硝酸蒼鉛四單那兒並一分四包自上午九點至下午八點共眼三包第二日上午五點服一包第四方中藥炙黃耆一兩台參一兩炒白芍一兩炒山藥二兩土炒白朮三兩大熟地八錢枸杞於八錢炙甘草五錢加飴糖一兩煉膏每服一小茶匙一日三次第五方西藥單寧酸五乳糖三分二十包每服一包此係善後備用並非必服之方此症以第二方為主方每口服之約二十餘劑與第三方並用大見功效約過十餘日瀉即大減又數日二目亦能全開鼻塞漸通古書未列此二症狀然余實已經過數例凡慢驚風兼有鼻耳二目症狀者不必疑慮仍以補脾補腎治之無不收效也漸即瀉止熱退脈則右手先見起色繼為左脈亦漸旺面色蒼白亦漸去乃以第四方制膏令其常服以期恢復健康第五六方不過備用之品以防服膏期間偶再泄瀉即服一次以策萬全也盲腸炎盲腸炎此為西醫病名或名蟲樣突起炎說者謂即中醫所稱之腸癰然絶對非是不可混為一談余以此症極多中醫最易溟治順氣消食破滯甚至大用熱藥殺人易如反掌故采此西醫病名以定標準原因本病因病菌或不易消化之物侵入腸突起中因而構成糞石促炎症之發生此症急性者中醫率包括於腹痛及絞腸痧等病名之內並有種種俗名例如中寒率皆以其急劇腹奇痛而致命也其慢性者又有俗名肚子痛病根之俗稱皆此症也症候右腸窩部即右下腹之近大腿凹處頓發劇痛遂波及於腹部嘔吐便祕或體溫增高惡寒腹部膨脹甚則熱度不退腹部炎腫致發腹膜炎而死此症有慢性者時常右少腹部疼痛時發時止亦愈發愈劇但至不能挽回之時亦發腹膜炎而致命其急性者則右少腹部忽發劇烈之疼痛遲延三五日即有化膿之傾向熱愈高因而全腹腫痛卒致不可救藥發生腸穿孔誘起腹膜炎而喪其生命女子患此症者更多且係危症中醫缺乏此症之正確認識往往遲誤病機致人死命故將表而出之治法以用西醫外科手術割治為唯一根本治法然此法宜及早施行且須身體強壯手術完備者方保無虞否則因割治而反喪其生命者亦數見不鮮最近余友王悅之美專校長君即因割治盲腸炎身故故適用外科手術亦必須加以慎審余長子漢真患盲腸炎係在濟南醫院割治而愈中藥內服藥歷試多無效不必諱言西醫之麻醉內服及注射藥與外用消炎藥膏比較有效然非根治療法乃近忽得一中藥外治之法試之屢驗若此法果能特效則嗣後患此症者得免割治之險而治愈亦一快事也方用鮮槐樹皮一方約寸許先將外層老皮刮去留其中層再用真正麝香一分置病人臍內而後上覆槐皮再以艾球即針灸之艾團如指頂大即可一個置槐皮上燃之約灸四五壯即四五次若灸時太痛可將槐皮略略抬起少許令其距離肉皮稍有一線之縫不可距離太遠稍緩仍可將槐皮放下令其覆蓋臍上灸畢臍內起一泡內含汁水刺破之用消毒棉花拭淨其盲腸炎症則立消漸漸止痛消腫此方縱身熱腹痛病在垂危亦能救治吳君曾舉一例云其友某君供職於北京某有名之大醫院忽患盲腸炎重症已數日右腹部已高腫且痛不可忍然病者絶不願割治該院多方勸導卒不聽乃舁回家中此時已有化膿險象熱度甚高右腹部高腫更甚稍以手擬按尚未著肉皮即感覺痛不可忍內外皆痛醫院同人甚為惋惜以為必無生望矣曾有病者同鄉告以用槐皮麝香灸治之法據云江浙間對腹痛用此法者已成習慣並非專治盲腸炎病家不得已照法醫治乃竟獲大效臍內水泡亦未刺破漸即痛止腫消不數日即告痊愈此例吳君能舉其住址姓名惜余忘記吳君為篤實君子且係研中西醫藥而又現供醫職者其言當可信也余思此法頗具誘導之至理槐皮苦澀麝香竄透又得艾火灸引同氣相求則盲腸附近之瘀血充血得其引轉此二字頗費解係余杜撰而透出臍腹之外內部炎症自然消失亦是最有趣味之醫理也惜余得此法太晚照此法試驗僅有二例然皆結果園滿茲録其較重之一例於下醫驗鄭君住北京西四大拐棒胡同八號年二十四歲於二十六年九月十五日延診患者右下腹部奇痛不能步行嘔吐身熱已三日盲腸部高腫大小便均少脈沉數有力余當勸其速赴醫院割治奈以病家甚貧無力住院懇求施治乃為免費治療以槐皮灸法開明方箋令其照法施行並與硫苦一五令其頓服按此症西醫禁用瀉劑然以余之經驗得病之初先使腸內容物清潔而後再與以麻醉劑止痛比較速效又以鹽酸莫爾比涅一合以乳糖五作為一包與以三包令其一日夜分服因其痛苦太甚實不能忍受也一方面即用槐皮麝香灸法照法灸治第二日來診竟大見奇效據云只灸二壯痛即止臍內並未生泡嘔吐腹痛均止腹腫亦漸消乃又與以阿片丁劑五十滴囑其每隔兩點鐘服五滴約六日完全病愈此症余認為炎症太甚恐有延及腹膜之險竟以此方治愈殊出意料之外也五十年前余嫂陳氏即死於此症邇時余尚不知醫猶憶其每患腹痛即痛不可忍且必須令人捶背時或嘔吐每隔數十日或數日輒腹痛一次蓋慢性之盲腸炎也所服藥餌強半不能記憶但其臨危時所服之藥則記得係巴豆蓋以其便祕故也瀕危時所瀉之物極多極腐敗臭氣皆如膿血遂即全腹皆腫死後全身皆種口鼻出血頭大如鬥手大如箕狀極可怖邇時尚無西醫且亦無盲腸炎之名以此推知死於此病者不知凡幾尤以慢性之盲腸炎症人多忽略失治可慨也已脅痛脅痛此脅痛係新得之症指西醫之肋膜炎而言其他若日久之脅痛肋間神經痛肋膜癌腫肝臟硬化膽石等症不在此例原因本症由於感冒外傷肺炎或其他臟器炎症之波及而發由於激怒或抑鬱而致此症者尤多中醫對此症責之肝膽氣滯血瘀其說皆有至理故激怒以下數字均采中醫說症候此症分三種為乾性肋膜炎但覺胸脅刺痛於呼吸時更甚脈多弦數為滲出性肋膜炎因惡寒而發中等度之弛熱呼吸困難胸部刺痛劇烈乾咳脈弦數食欲缺損滲出液瀦留過多時患者能自覺之聽之可微聞振蕩聲為化膿性肋膜炎屢以寒戰而發高熱脈多洪大而數以上諸症皆劇烈大便多乾燥小便多短赤以上三種症候治不得法最易誘起肺結核症化膿性肋膜炎屢以寒戰而發高熱且有性命危險誘起腹膜炎等則危險治法滲出性化膿性二者以施行西醫外科手術為良用套管針抽除滲出物及膿液其內服藥之有卓效者則為撒裏天爾酸那篤當膜撒曹其餘則為下劑及麻醉止痛劑最近余子漢真患較重之滲出性肋膜炎即以撤曹四苦丁二蒸餾水二分六次一日三次服而治愈亦能有效然中醫治此症注重肝膽二經分別氣鬱血瘀痰飲及虛實寒熱不但對於新得之脅痛可以根本治愈即對於日久之脅痛神經痛亦能奏效絶不致演成非用外科手術不可之痛苦且亦絶無波及其他臟器之慮此則中醫對此症和平有效可取之方法不能不表而出之中醫對乾性之肋膜炎以橘絡枳實旋覆花鉤藤龍膽草赤芍陳皮青皮川棟子等藥為有效對滲出性者則以茯苓橘紅半夏中醫名此為痰飲加重用之合前藥無不奏效茯苓須用五六錢以上半夏二三錢至於化膿性之肋膜炎率用柴胡陳皮青皮瓜蔞仁穿山甲蒲公英金銀花桃仁生地桑葉山梔夏枯草連翹參照中醫外科肝癰症治法以此症近似肝膿瘍也等消腫退熱更有奇效他若久病之脅痛參用紅花歸須桃仁元胡等注重在疏通血絡更有精義而對此症兼發之咳嗽則加枇杷葉杏仁貝母氣逆加降香陰虧咳血加白芍均甚圓活靈妙屢試屢驗絶不致釀成危症也川軍亦為有效之品醫驗趙君住北京西四牌樓大拐棒胡同六號年十八歲業鐵工因激怒鬥毆於二十七年四月二十五日致患脅痛來診時已得病四日熱度晝夜不退三十九度六痛不能臥咳嗽嘔惡患側高腫隆起呼吸時痛尤甚不能手按惡寒四日不解大便燥結小便赤短舌黃脈左右均洪數精神不清呼氣有腐敗臭味有化膿嫌疑自覺肋內如有水汁存留脹滿異常經診斷為肝經瘀熱脅痛防成內癰急以解毒疏肝參以外科醫理論治與下方第一方連翹六錢金銀花四錢蒲公英五錢瓜蔞仁四錢青皮二錢陳皮二錢杏仁二錢貝母三錢荊芥一錢防風一錢鉤藤三錢丹皮四錢元胡二錢水煎服此方內服外用冷罨法於肋間高腫處一日三次施行中藥係於晚間臨睡時服下又用阿斯比林三乳糖三分六包一日二次自上午六點鐘至下午六點分服二包於三日之間備用六包中藥則服第一劑取微汗第二劑已不惡寒減去荊芥防風照方再服二劑計三日之間病勢大減熱度降至攝氏表三十八度強痛亦減輕腫亦略退脈仍洪數有力患者來診深致感謝但仍不能臥下呼吸仍痛甚大便一次小便仍赤短乃與下方阿斯比林並非連日必用不發熱則不用也第二方生白芍二錢竹葉三錢丹皮三錢杏仁三錢青皮二錢陳皮三錢大腹皮二錢元胡二錢前胡二錢枳實二錢龍膽草二錢貝母二錢鉤藤一錢連翹四錢水煎服仍照前服藥法白日與以撤曹四苦丁二蒸餾水一分六次二日分服臨睡服中藥一次共服二劑脅痛全止體溫三十八度脈漸平和尚有咳嗽便燥預防轉變肺炎肋膜炎誘起肺結核者亦有多例又與下方第三方瓜蔞仁二錢白芍三錢金銀花四錢鉤藤三錢杏仁三錢貝母三錢丹皮三錢小青皮二錢橘紅二錢蘇子二錢寸冬三錢天冬三錢桑葉三錢水煎服仍照前服藥法白日與以重曹三托氏散三分六包二日分服一日三次臨睡服中藥一次共服二劑以後減去西藥又服五劑完全治愈此症為較重之肋膜炎必須中西藥互用方收速效只用中藥或只用西藥收效均不能迅速且此數種中西藥品之用法試驗四十餘年絶無妨礙也疝疝此症與西醫所稱之疝痛不同乃純粹根據中醫書之病名不可誤解以西醫疝痛意義之解釋與中醫不同故也原因中醫書謂任脈為病男子內結七疝又云疝病不離乎肝故認定疝屬月千病細考西醫書所稱風氣疝痛膽石疝痛睪丸炎歇爾尼亞等病名均與中醫所稱之七疝略相似然皆不能吻合且此症除腎子睪丸腫痛牽引少腹作痛人皆知為疝病外其內疝數種中醫書雖皆說明然淺學之醫臨症多不能認識故不得不特別表明之中醫七疝名目不無離奇然有一部分可取且為西醫未經發明者學者可細參之症候此症除腎囊腎子腫痛牽引少腹或腎子不痛只腫大人皆目為疝氣勿庸詳述外其內疝症狀之不易認識而又恆見者則為患者腹內時覺聚有有形之物或橫或豎或一或二病發作時直向上沖或繞腰腹作痛向上沖痛者居多且令人嘔逆悶厥上沖胃皖吐酸填脹痛苦萬狀然忽而消滅立時諸症皆失歸於無形一如平人腹內上沖之時狀類黃瓜一直沖犯胃脘頭眩眼黑嘔逆氣厥者極多如此反覆發作常年纍月致令患者全體衰弱脈多弦實有力體溫多不高但發作時亦有寒熱往來及有四肢厥逆者寒熱虛實務宜細辨皆內疝也參看後列呂新甫先生醫驗此內疝病狀發作時類似歇斯的裏症臟躁然歇斯的裏係精神病腹內並無有形硬物上沖心口內疝發作時則有有形之物上沖可以分別二症不可誤認治法腎子睪丸腫痛俗名偏墜即副睪丸炎或牽引少腹奇痛有將睪丸引縮入少愎內者痛不可忍此症西藥可謂無用麻醉亦不過一時有效不能治愈中醫治疝之藥率用川棟子小茴香青木香橘核荔枝核山楂核炒元胡等輕症疝氣相當有效甚則用附子其效卓著然以余之經驗最效之方則為附子與大黃合劑此種用藥係合大熱大寒同時並用縱有古方未免駭俗然余實已經過數十年之臨床實驗以附子大黃加入普通治疝氣之藥中即上列川棟子等藥速收特效不可思議此治外疝之經驗談也四十年前因有患疝氣之趙得勝者第五鎮輜重營前隊副兵病發作時二睪丸完全縮入少腹內痛苦異常記得最重之一次病凡十餘日中西醫治療無效氣息已微全身皆厥六脈皆絶正呈報病重矣經醫官長等復診均無效不得已余與副醫官劉全祿君合議以附子五錢大黃三錢合於川棟子小茴香橘核荔枝核青木香小青皮等藥中與服不意眼下此藥大見奇效患者已能呻吟四肢亦漸溫暖一日連服二劑第二日已能言語轉動且思飲食已數日因嘔逆不進食物脈亦漸漸恢復如此奇驗竟出意料之外此後每日即照原方附子大黃各二錢連服六劑竟而痊愈自此以後四十年中凡遇他人不能治之睪丸腫痛或縮入少腹不論如何危篤一用此方無不立效從無一例失敗者故特定為治此症之標準方也其治內疝之方只要認定確係內疝上沖即以川棟子小茴香吳茱萸小青皮青木杳寒則可酌用附子縱有實熱之症然絶不可用人黃此與外疝不同之點再參與加減之逍遙散等無不奏效也茲録內疝外疝二醫驗於下以資印證醫驗呂新甫先生住德縣文廟前街年七十餘歲久患內疝時發時愈其病狀係於病將發作時先覺腹內左右有兩條如黃瓜狀有形之物一齊上沖胸脘直至心口以手按之可得因而頭暈心亂填脹欲死遂即嘔吐疼痛瞀亂異常經過一二日腹內硬物漸漸消散即化為烏有一切病狀亦俱消失有時亦覺有一條有形硬物上沖飲食起居又恢復原狀矣如此拖延已六七年之久經過各醫診治並未認定病名殊屬町笑其治法率以消導順氣者居多尤以降氣之藥幾乎每劑必備並無絲毫效驗中間經過西醫與以麻醉止痛劑三日治療病勢特別加重聞系鹽莫每日三包不但不能減輕痛苦且又自汗不止高年之人非常危險余適於民國九年回籍為長子結婚先生乃延余診治余診脈見兩手弦實毫無中和之氣參以病狀決為內疝肝逆犯胃數年痼疾經過多醫並未認定病名危哉乃為處方如下第一方熟附片一錢川楝子三錢小茴香三錢青木香一錢小青皮一錢桃仁一錢吳茱萸二錢淡乾薑一錢橘核二錢枸杞子一錢炒白芍二錢薑引服第一方立見效因來診時正值病發服藥後立見消散據病人自述自有此症以來服藥已四五百劑無一次立見大效者分服此藥病才半日即消散每次病發必三四日乃消散乃連服三劑又與第二方第二方川楝子三錢小茴香三錢豆蔻仁三分青木香一錢小青皮一錢桃仁一錢杵去皮尖吳茱萸二錢炒白芍二錢淡乾薑三錢橘核二錢荔枝核二錢薑引此方約服十餘劑完全病愈先生壽至耄耋此症愈後復經過多年永未再發余以此症甚多最不易確認故録此一案以告學者薛蔭槐君住德縣大寺街年二十餘歲於民國十二年患疝氣右睪丸腫痛特甚先經醫治原方為川棟子小茴香荔枝核橘核等普通治疝氣等藥愈治愈甚乃請余診治病者來時不良於行門檻幾至不能邁過則其腫痛可想而知余認定此外疝症也即與經驗良方一劑立見大效痛減大半五劑痛腫全消完全病愈茲録驗方於下熟附片二錢川楝子四錢荔枝核二錢山楂核一錢小青皮二錢熟大黃二錢小茴香二錢橘核一錢炒元胡一錢薑引煎服此余經驗多年之特效方也凡痛引少腹睪丸縮入腹內痛不欲生或睪丸腫大痛不可忍等極劇烈之疝氣無不立奏奇效然減去附子與大黃則不效其他各味不過輔佐藥品然亦不可妄為加減惟附子與大黃之分量不必一律醫者須斟酌病人之強弱及病勢之輕重寒多或熱多與其脈象臨時酌定大約自一錢至三四錢不等例如病者脈沉細現寒象則附子可用一錢五大黃可用一錢以此類推神而明之存乎其人但附子大黃必須並用缺一不可則為一定不易之理萬勿猶豫致減本方效力也小便短少附子可少用然不可完全減去外疝一症往往有原因花柳病者梅毒性應先以西藥注射根本治其原因則本病自愈不但此也凡一切病症如有此種原因必令患者速入專門醫院施行注射療法不可徒以中藥治療耽延時日此亦中醫應有之認識但中醫對梅毒性病症何由確認是必對於西醫病理詳細研究自求新知固不待言也
