body:
  text: 病理學合參卷二此章對於病理病狀診斷治法皆連類而及以便初學研究我們這個人所以生活的道理叫作生理學前已説明若是不幸害起病來普通人住往不能明白這病是怎麼一回事比方身上熱度高在病者僅能覺著發熱燒得慌至於身體內怎麼就太熱了這個道理必須講明白了人才能了然簡言之就是教人知道病態的所以然這就叫作病理學本編是講的極淺近的病理不過給初學者開個道路而已本編所講只限於習見而又重要之病症醫者治病最宜先將西醫病理瞭解於心而後參以中醫合理的説法及從實驗得來的中或西的特效治法及藥品較之只知中或西醫之單純治療收效最大但不可以一知半解即自命為中西兼通自誤誤人慎之慎之一熱此熱字在一切傳染病中為最多之病象可是非傳染病中亦有之西醫每以檢溫器測驗病人之體溫平人在攝氏表不過三十七度凡自攝氏表三十八度以上皆為體溫升騰之象若至四十度五分則為過高熱那是最準確的測驗按西醫説法其發熱的原理一為由於組織化學的機轉亢盛就是體內脂肪及含水碳素燃燒機轉太旺一為由於體溫放散之障礙就是體內所生之溫過多放散不及調節失宜一為有害性物質進入血液內遂致發熱例如産褥熱就是病菌所産生之毒素至於發熱之頃在往惡寒戰栗那是由於末梢血管收縮之結果皮膚神經之血液突然輸入減少所以病人自己覺著害冷此時實際上體內已經蓄溫過多熱度升高所以有時皮膚或蒼白厥冷或發赤灼熱或手足厥冷若是溫之放散量超過溫之産生量解熱期那麼就是皮膚的血管擴張充血發汗增盛遂復平溫發熱原理尚多此僅舉其一二然熱度太高時往往起了神經的症狀比方昏迷譫語狂妄頭疼痙攣角弓反張之類俗名抽風尿屎失禁等這是常見的症狀至於熱的太久或太高體內的蛋白質及脂肪消耗太多神經衰弱往往心臟因過於衰敗致人於死這就是發熱的大概狀況不基於以上原因亦有發熱者宜參考神經系統障礙之説茲從略熱的種類約分稽留熱間歇熱弛張熱回歸熱消耗熱敗血熱腸窒扶斯傷寒熱型以上熱型應參照病理學專書詳細分識茲從略七種至於中醫論發熱它的理想是極透徹而且它分的熱之種類非常清晰它的治法也非常靈妙若與西藥比較起來實在中醫用藥有它的特長不過中醫退熱的藥有時極快有時比較緩慢一些可是有時非用中藥不能成功我舉一個小小的例子於下學者可以試驗試驗自知我不是妄下斷語了民國元年冬余在山東提法司署供職因由德州坐火車到濟南沿途受了奇寒在家起身時又因事悲忿到署後就病倒了惡寒戰栗頭疼身痛尤其是頭痛欲裂格外厲害脈浮緊這是真正傷寒的表證誰也知道的客中煎藥不便乃服安基比林氨基比林服下後僅僅頭覺稍輕不多時又如前狀一日之中服極大量之安基比林全身症並未稍減曾發汗余友李靜波來視余已不能起床伊甚驚慌俗名夾氣傷寒余乃立方為羌活獨活防風炙麻黃四味生薑為引李即為余煎藥服下朦朧中睡去至第二日醒後其症若失亦未覺出汗李來視余甚覺愕然蓋伊前日目視余非僅感冒也此例極多凡初得之較重外感絶非安基比林阿斯匹林等所能治歷經比較千真萬確西藥並非不靈的不適用於此種發熱故遜中藥一籌耳外感發熱之症中醫約分十種即表證實邪發熱裏證實邪發熱也在外皮邪在半表半裏發熱內外兩感發熱餘邪不盡復出於表發熱邪退正虛發熱大熱似寒大寒似熱陰虛發熱陽虛發熱等茲將其病狀及治法分述如下表證實邪發熱中醫論表證發熱是傷寒及溫病的第一步初期之必有症狀若是傷寒初期的表證必須發散才能去病得汗則解可是傷寒之表證與溫病瘟疫之表證症候及治法不能盡同在傷寒表證初得病的時候一二日之間並不難認定傷寒初起最重要的現象就是惡寒就是身上覺著寒冷頭痛項強腰痛腿痛周身骨節酸痛舌無苔脈多浮緊皮膚或發熱或不發熱此時體內溫度已升高但只用手捫不覺發熱耳無汗者居多此證尤其易發於嚴冬天氣宜注意嚴冬二字此是極正規的初得的傷寒表證發熱或稍有乾嘔此是外寒束縛感動胃氣並非主要症候不可與裏證相混用藥但治表證嘔寒自止若兼顧嘔吐於發汗藥中加以和胃順氣等藥則大錯往往不能發汗反致貽誤但此嘔吐係隨惡寒一齊來在初得之始務須切記若三五日後惡寒漸少嘔吐日甚則宜審各兼症例如頭痛舌苔大小便脈象均宜考察不可一汗再汗致誤病機此條應特別注意在初得及嚴冬等季庶不至臨症茫然處方無據矣真正傷寒的第一步就是如此治之得法一汗而愈所謂太陽表證在病者亦只以受涼或感冒二字為病名並不重視殊不知可畏之傷寒即以此平庸數味之中藥而治愈此時若語以醫理上之重大生命上之危險鮮有能知者螢螢之火撲滅之後不自知其燎原之危險也於此有一極大之問題即中西醫關於此點之各是其是不肯平心靜氣比較試驗以增長其學問是也西醫譯傷寒病為腸窒扶斯其唯一之科學憑據即腸窒扶斯病菌之檢查及一定之熱型當然千真萬確毫無疑義然西醫治傷寒除注射傷寒漿苗傷寒血清外其初步用藥多用緩下次則亦有退熱藥之應用然其所下斷語則為待期療法及對症療法一若既得此症無論如何治療必須待至四星期始能痊愈者然若於得病一二日間用中藥發汗而愈者則必謂絶非此症也余關於此點最所究心自愧無細菌學之技術不能證明余説然余實已經過四十餘年之實驗關於西醫對此症所持理論發現可疑之點頗多茲細述之深願與當代醫壇共討論也此症譯名是否根本錯誤查中醫傷寒論一書是否兼言溫病已經議論紛紜莫衷一是且原書脫落舛錯不易索解則傷寒一書是否專治傷寒已成疑問西醫譯名腸窒扶斯主要意旨是腸熱然傷寒初起只是外傷於寒純粹實邪在表一經發散豁然而愈絶不致於腸熱必治不得法實邪入內其結果方為腸熱細參各症自知所謂熱結旁流等症當初得表證之時絶無此症候惟溫病初得往往即有內熱所以溫病之表證絶與傷寒上列之表證不同而且中醫治溫病之表證亦與傷寒迥異因傷寒初起惡寒特甚溫病則或微惡寒故傷寒之惡寒必用發汗藥否則只用解肌之品西醫退熱藥其副作用往往發汗並非發汗藥在溫病之表近第一溫病的惡寒不如傷寒之甚第二就是頭痛的症候亦比傷寒輕而且多頭暈頭脹身痛亦比傷寒輕舌多有滑膩白苔而皮膚上的熱則較傷寒在惡寒時為重亦有有汗者口唇多乾口氣重濁亦與傷寒不同最多見者就是兩手脈多洪大尤其右手更顯明這種表證不限於嚴冬越是春末秋末更所多見此症若只用傷寒發散藥治之多不中病參照後列溫病及傷寒各法蓋傷寒與溫病中醫論述有極端相反之處即傷寒是寒邪從外入若不俟其深入一汗而解溫病是熱邪內伏若不俟其熾盛一經清涼解肌亦可痊愈是二症不同之點但治之不當傷寒終極是因腸熱而致命溫病終極則不必盡因腸熱而致命溫邪逆傳卜之更危可為明證然傷寒初起可以一汗而解溫病初起可以清解而愈絶不致演到腸熱變象百出若然則是西醫之待期療法理由不能成立余不知西醫譯名之腸窒扶斯究指傷寒之腸熱言耶抑指溫病之腸熱言耶西醫書腸窒扶斯病名之下往往注明即古醫書之傷寒溫病之類更不可不加以糾正蓋傷寒係獨立病名溫病亦獨立病名絶不可二病並稱混為一談概稱之曰腸窒扶斯余曾見有傷寒延長病至數月者參看後列薛毆賓醫驗溫病亦有延長數月者參看後列丁姓醫驗非但四星期不足以言待期而且腸熱雖同而治法迥異究竟何者為腸窒扶斯耶若謂二症皆腸窒扶斯症試將中醫治傷寒之方法以治溫病未有不大錯特錯立誤人命者竊願有志此道者專心致力先將此兩種病液加以化驗若皆有同一之腸窒扶斯病菌則是中醫已有兩種治法並非絶對待期若以同一西藥治療此二種不同之病症所得之結果必須待期則不如以中藥補西藥所不及醫者責任所在又何樂而不為耶凡遇此二症檢查確定後姑且拋開科學試以中醫中藥分別治療之所得成績加以詳慎之統計與西醫理論與治法互相比較倘有特別收效之證明打破待期二字無妨再以科學的理論共同探討中醫中藥對此二症之收效點究竟何在余認為此中必含有科學的原理今日之醫理科學或者仍有許多未臻完善之域亦未可知也余治此二症中西藥之應用並非拘板從未失敗深知此二症純用西藥不易收功參看後列薛姓等醫驗自明所治各症率皆係經過多醫之症候其人今尚健在不妨詢問也裏證實邪發熱實邪在裏面日子淺者率在肺胃稍久必至腸內所以它的主要症候脈多沉數快甚則反而全閉外面皮膚發熱下午尤甚內裏頭多有咳喘口渴煩躁胸滿腹痛嘔吐舌苔黃厚乾裂唇焦或鼻衄或厥逆大便不通或便膿血小便短赤或無譫語侵及神經則譫語此時表證已多不存在不可聽病人自訴誤認仍有表證用藥猶疑且以上諸症病人不必皆備須注意也此時治法率用清熱利便之品尤以早用瀉藥為值合病機瀉藥最好用大黃有它症者例如咳喘亦須兼顧內裏一清表熱自退切記切記但熱未結實瀉藥亦有流弊故用瀉劑宜慎重也脈沉實數乃可瀉之半表半裏發熱此時脈多弦或稍數胸脅滿寒熱往來口苦耳聾心煩喜嘔口乾而不欲飲水舌苔多滑白或無苔此由表證將轉入裏證之階段中醫率用和解的方法例如小柴胡湯等然此種病象為時甚暫且不易分晰學者宜加以注意也內外兩感發熱此種熱候溫病居多率皆由於內有蘊熱又值天氣變動太驟例如春末秋深忽然寒冷病者早有內熱又受外面寒氣束縛其見症多有頭痛頭或脹或覺沉微惡寒身痛口氣多重濁或咳喘舌多白苔或微黃或無苔胸悶嘔惡二便恆覺不利脈或洪或緊而細或有汗或無汗此是內外皆有實邪治法宜於清熱例如連翹雙花竹葉桑葉等之中務必加入發散解肌之品例如防風薄荷豆豉荊芥之類但不宜用麻黃桂枝之類耳或稍加瀉藥此溫病與傷寒治法不同之點也內熱症甚者例如大渴等必重用甘寒例如菊花知母花粉石膏之類或苦寒例如黃芩梔子黃連龍膽草之類之品外症重者可再稍加辛散之品例如於防風薄荷之外加薑少許之類必得微汗方解先注重表證然後再注重清裏可也或用熟軍無妨餘邪不盡復出於表發熱此即西醫所謂回歸熱之類中醫書又名差後勞復俗名重勞乃於大病治愈之後忽然又覺不適遂即皮膚發熱脈多虛浮似數按之無力並有倦怠頭痛咳嗽嘔惡煩躁口乾等症不必皆備然病者常現十分衰弱之象此症西醫最確之檢查血液中必有螺旋菌以余經驗上言之西藥中之清涼及退熱藥例如稀鹽酸及規尼涅鹽酸金雞納霜為本病最和乎有效之藥品實有輔助中藥之奇能醫者對於此症須注意其屢發自汗遂即平復熱退隔數日反覆發熱下午尤甚自汗或有盜汗又復常態此時必須注意餘熱未盡四字但為日已久不可再用汗下清解順氣和胃等法如此治法屢試不效必誤人命以汗下等法皆不對症也若以中藥之滋陰等品補助西醫退熱之劑率多奏效蓋此症體雖虛弱病乃實邪第一要認明此乃大病後元氣已虛復感時邪正氣雖虛邪熱亦盛與中醫所謂陰虛發熱陽虛發熱迥乎不同所以此時若用攻伐之藥例如汗清下法既所不勝元氣已虛不勝藥力不但不能退熱且易發生險象若用補藥則胃氣壅塞實邪更易熾盛必不能適合症象屢經試驗實不如中西並用西藥如稀鹽酸苦丁枸椽酸規尼涅等中藥如生地黃芩丹皮寸冬等之靈效也余非偏信西藥此實經驗談願學者深信之老年人及平素衰弱者屢感時邪治法與此略同醫者細心體認可也茲録最近治驗二則於下本編醫案所載之西藥中藥互用法均經多年試驗用之毫無危險不起化學反對作用故敢筆之於書以告學者但中西藥並用非常危險凡非本編所載一定之用法萬不可任意濫將中西藥品互用是為至要孟宅幼科四歲住西城警爾胡同二號病已六月餘據稱初病似瘧屢愈屢發最近因服中醫發汗藥病更重來診時脈微細頭髮稀落下午潮熱喘促頻呼腹痛夜不安眠而昏迷特甚小便黃少大便溏且極臭好飲水精神癡呆有時嘔吐吞酸檢查前服藥方率用清解消導表散經過多醫已成重病余診斷為陰虛仍有實邪乃先與清瀉劑所下大便黏稠惡臭此孩久食羊乳病勢稍減繼以中藥滋陰重用生地令其早晚服二次每日上午十點鐘及下午三點鐘服西藥優規寧各一包三日完全退熱中間曾服重曹小蘇打三次吞酸亦止此症中間停藥五六日又反覆嗣即仍照原方繼續又服中西藥二星期完全治愈此症以余之經驗純用中藥滋陰不能退熱純用優規寧只能退熱亦不能根本補養其已耗之津液完全收功若以西藥補助中藥則收效極速本症治法最確實且中西藥用法均安全無危險余敢斷言也諸夫人二十餘歲住西城武功衛二號初病係感時邪數月後屢治未愈漸漸午後潮熱咳嗽不思飲食脈象細數漸成虛勞經診斷為陰虛有熱乃令每日早跟規那丸二粒兼服重曹稀鹽酸苦丁等西藥約十餘日痊愈此症經過數中醫治療均未收效特詰之邪退正虛發熱此與上條病後復感實邪之發熱迥乎不同乃大病之後例如大吐瀉症大瘟疫傷寒等症汗下攻伐太甚或飢饉勞役又近女色或病勢太過消耗氣血太多自然而然必致變成虛怯之症原病實邪早已絲毫不存在矣此症現象多有午後發熱自汗盜汗精神恍惚不寐或睡夢紛紜或似睡非睡恍見鬼物此余臨症實驗參看後列徐君醫案驚悸虛煩脈虛小微細最要注意或有微瀉小便清白口渴皮枯色奪睡時二目不能緊閉且微有譫語此症若與汗下涼解宣伐之劑絶無生望且最忌西藥退熱例如阿斯比林安基比林別拉密童等一服再服暫覺退熱殊不知此藥多有發汗之副作用均能令心臟驟然停止而死可不慎歟此症之皮膚發熱並不拘拘於日晡或亦有一日之中綿綿延延恍如細雨濛濛其熱不斷類似西醫所稱之消耗熱愈服清涼和解之藥其熱愈甚醫者如遇此等症候切須拋開病者之原始病名例如斑疹霍亂傷寒瘟疫種種大病皆是已往之病一眼看定此是虛熱此症之脈極可憑信即一虛字用中藥補養大劑起死回生必能大效絶不可存餘邪未盡之心大凡陰虛者注意前列各症則於發熱之外必有口渴枯燥之現象以大劑六味地黃湯加減或加重滋陰之品治之陽虛者注意前列各症不必全具則於發熱之外必有驚悸眩暈下利之現象此現象要記清此症之外尚有前列各症也以大劑六君子湯加減或稍加補陽之品例如桂附不可太多治之參耆必重用其效如神至若陽虛之證稍兼陰虧陰虛之證稍兼氣虛亦可斟酌滋陰補陽之品略與輔佐方為圓到不可不知醫者臨是症以己之靈明運用方劑消息陰陽隨機應變自能得心應手起死回生此中醫之特長故特表而出之於此有一極應注意之事即大病之後津液消耗陰虧者多故雖見陽虛證亦不可不加入護陰之品例如白芍地黃等又有一種久病單純陽虛之證除有全身衰弱各症外微覺惡寒並不發熱者脈反洪大而虛治亦同前此所謂陽虛生外寒也參看桂蘭坊張君醫案茲録治驗三則於下徐君住德縣二郎廟街歲於南方從役積日勞苦太甚行役中感受時邪軍旅之內醫藥不便勉強治愈又復跋涉長途飢餓勞苦元氣未復返家後復近女色遂致病倒初病之時日晡發熱不思飲食氣喘神衰手足逆冷漸漸自汗失眠精神恍惚每一欲睡如見鬼物諸醫均以清熱之劑中西並進迄未收效月餘病漸垂危延余診治見其脈象虛數無力斷為原病時邪早已不存純係陽虛生熱亟以大劑參耆白朮白芍甘草等治之約十餘劑諸症皆退而愈秦夫人住德縣南關柴市街秦煥德君之家族初病霍亂治療不得法經過四十餘日時有吐瀉等症漸即病重延余診治通身均涼脈細微已極似有似無口開氣促自汗神昏而瀉仍然不能言語斷為霍亂本病已成過去目下只有陽虛欲脫危險昧甚急以大劑西洋參肉桂附子炙耆白芍甘草等與之一劑陽回漸省人事約十餘日痊愈此症治療頗復雜用藥凡三變係在光緒二十三年因此症特危險故至今仍能記憶因撮其大要附記於此以告學者張君住北京鼓樓東街桂蘭坊經理五十歲於民國二十七年三月來診自述病已經年自覺精神衰敗手指尖感覺過敏例如洗手水微熱則覺熱不可耐且無論如何從來不見些微之汗每日覺冷形寒體衰不思飲食時欲睡眠氣短視物不明漸即病倒不能支持診脈洪大特甚症脈相反最為不利斷為陽虛脾弱所謂陽虛生外寒也急以參耆桂附炮薑白朮等大劑與服病有轉機後覺全身脫皮有如蟻行諸症均去亦能自然汗出而愈此症大劑補陽約服藥百劑調理年餘始愈大熱似寒此是得病稍久實邪入裏失於攻下十餘日當下不下熱毒鬱結內外閉塞遏其陽氣反將表面一切熱象漸漸隱去始則四肢厥逆手足涼也漸涼漸往上過肘膝皆涼所謂熱深厥亦深也病者反覺惡寒而不發熱庸醫見此症候以為表證投以發散之藥殺之易於反掌漸次全身皆涼如冰脈亦停閉六脈皆無至此已成危候庸醫見此以為大寒又投以補陽大熱之藥火上加油其死更速此時診察最要之點即在或嘔吐或目赤神識不清此象多有極應注意鼻乾唇燥舌黃黑甚則舌短不能出耳聾或大渴飲水即吐小便短赤或溺後有白粉極應注意沉澱或小便不通大便燥結或瀉惡臭稀糞或下血如有以上等症不必全有急下之大承氣湯之類無遲疑此必審知腸熱已極方可下之若係溫病逆傳邪在膻中仍以芳香開竅為準參看袁柳莊張姓醫驗自明下後內外陽氣二透立時大熱真象例如煩渴發熱次第發現再以熱病治法萬無一失所可慮者一見惡寒即用發散藥桂枝麻黃等一見厥逆又用回陽藥肉桂附子等更有依違兩可者或利小便或止嘔吐木通半夏厚朴等病已危殆再加以藥劑之錯誤殺人即在頃刻間也慎之慎之此症死後全身移時必大熱可以證明熱邪內鬱此余所親見也大寒似熱此症係元陽將散必在久病之後俗名假熱內係虛寒之極外則皮膚發熱若服清涼藥愈治愈危法宜大補元陽參看第陽虛發熱條自明此處特標明大寒似熱病狀者所以與上條大熱似寒相對比使學者易於明瞭也參看徐君醫驗陰虛發熱中醫書所稱陰虛發熱率皆虛勞之症亦係皮膚發熱此症多半指癆瘵而言例如西醫所稱之肺結核是也肺癆誘因最多凡大病之後多能誘起肺癆例如溫病故此處陰虛二宇不可作僅指肺結核而言也此種發熱又與上條大病之後陰虛發熱之治法不同其症狀率多咳嗽或吐血自汗盜汗咽乾舌或無苔或薄苔兩頰潮紅余對肺癆發熱另有實驗主張並非臆斷參看病症編肺癆症自明甚則泄瀉皮膚感覺日晡潮熱亦有稍覺惡寒者骨瘦如柴脈則細數全身衰弱此種熱象關係本病之進退熱退則病減熱盛則病加且其熱綿綿極難減退消耗熱中醫治此率用滋陰或補腎健脾補肺等藥比較有效但能根本治愈亦屬不易間有治愈者西醫治此症更無根治療法然退熱之藥則一時多有著效例如別拉密童退熱藥對於此症雖服極小之量往往誘起自汗不可不慎用時以樟腦酸配合於別拉密童中似較穩妥也愛兒幫等此藥效緩繼續常服一月至數月間能徐徐退熱有效余對此症退熱藥試驗極多以此藥比較的滿意可以試用但能收較大之效者則仍宜以中藥為主也此症發熱有用滋陰藥例如地黃白芍鱉甲牡蠣等得效者有用健脾藥得大效者例如山藥蓮子苡仁扁豆茯苓等有用甘寒清涼藥例如金銀花菊花桑葉竹葉生地露等甘寒之藥得效者然較少也此症至今尚無特效療法但細心體認病機以中藥緩緩消息之余多用膏劑不用丸藥且喜輔以西藥實較只用西藥治法活動可喜收效較多所最要者不可拘泥於虛勞二字只要見有微似實熱即可試與甘寒但謹防泄瀉可也此中運用全在醫者心靈手敏不可泥古不通亦不可先有中西偏見治之得法並非必死之症也茲將曩著之肺癆病自療法列下此係余自患肺病之實驗無一字虛偽願學者參考也參看後列肺癆醫案肺癆病自療法肺癆病西醫名肺結核中醫則名肺癆或癆瘵病為一種慢性傳染不易根治之險症其症狀則四肢無力食思缺乏咳嗽痰血盜汗日晡潮熱泄瀉怔忡等以至全身衰弱而死倘醫治稍有錯誤危險立至勢必喪其生命此就一般之肺癆病而言然一考其病歷治療得法亦非絶對必死之症常年纍月僅有療養挽救之餘地又似一極平常而有希望治愈之疾病所可懼者病人習聞此症中外皆無根本治法之論道聽塗説不求甚解張慌憂懼醫藥率投今日入一著名之醫院明日請一著名之醫生紛紜舛錯卒致不救者纍纍皆是此非病殺之自殺之也而經濟寬裕之家及知識份子又失之於偏重科學過信西醫之新奇醫術人云亦云毫無判斷自覺之能力一惟最新學理之是從殊不知現在東西洋對於是病尚在極力研究試驗時期仍無一定特效之療法入此途者金錢耗費猶其餘事所得結果並不能十分完善而無絲毫流弊且有誤於此種情形之下甘心犧牲性命而不自知者詎不大可悲耶貧困患者更覺十分可憐既無常識只求串愈偏方成藥紛然雜進環境困難已覺不適療養庸醫偽藥更足誤其病機輾轉纏綿斷送生命者不知凡幾言念及此惕然心傷余體素弱自光緒二十四年已罹是病咳嗽吐血身熱痰喘常年醫治屢瀕於危幸喜家傳醫學頗有淵源合力醫治得以帶病延年亙十五年之久幸未發生不測中西醫藥反覆應用不知幾費試驗幾經失敗掙扎多年最後始能認識此症之真正治法及有效藥品並已實驗中西醫關於是症之種種理論何者可從何者錯誤認識既真標準斯定從此一本經驗之所得從事治療此可畏之肺病毒菌始於民國二年舍我以去迄今二十餘年已屆花甲不但日漸強壯體貌豐腴而且精神暢適回憶過去病程實有虎口餘生不寒而栗之感天下同病恆河沙數余實不忍偏信西醫者枉死於不完全之科學而尤不忍只知中醫者枉死於無辦法之欺騙更不忍我可憐之同病迷途倣徨呼救無門以坐待肺癆病菌之屠殺愛將余親身實驗所得以及歷年治療此種病人之有效辦法坦白記述竭誠奉告竊願病家潛心試驗勿以余言為平淡無奇不足治病則化險為夷同登彼岸生死關頭間不容髮願明眼人審思之治療肺病之條件精神愈快此可為治療肺病之先決條件無論病勢如何環境如何當此治療期間萬不可惶恐憂慮最妙將肺病二字置之度外一切煩惱思慮一概解除而後內心怡悅氣血調和自易療養否則無論如何不易見效飲食滋養治療肺病唯一方法即係飲食滋養身體強壯使其自能抵抗病菌不令繁殖此為一般醫學家所公認是以病者對於本身滋養之飲食不得不充分注意參看後條戶外運動長時間戶外運動或山坡水濱為治療肺病之天然藥品但運動云者非劇烈操作之謂不過略略活動身體藉以吸收新鮮空氣及充分日光除大風雨或大吐血之時不宜運動外最好終日起居於戶外清潔之地早起早睡萬不可謬於舊説深居避風致肺中污濁促其生命藥物治療本病發現種種徵象當然對症用藥以冀補救然此症用藥得法亦必須長年纍月方能痊愈病家必須精選真正有經驗有學術之醫生極端信任請其治療萬不可盲從庸醫寒熱濫投必不得已寧以暫不服藥為愈治療肺癆之宜忌宜食諸品菠菜此菜最宜常食白菜豆芽豆腐豆類薊菜此菜有二種一名薊菜一名曲麻菜最有止血之效宜常食之黃瓜茄子及青菜等肉汁雞湯牛乳雞蛋魚肝油忌食諸物煙酒濃茶及一切辛辣之品油炸火烤之品乾燥之品不喜食之物雖係應食之品倘病人不喜食之不可強與例如牛乳魚肝油等應忌事項大熱大寒天氣尤以大熱為最甚大聲喊叫猛烈震動忿怒色欲過勞悲慘執拗不合理之長時間仰臥應忌醫藥麻醉藥峻補藥按摩針治此指中醫而言及一切偏方一切中西補藥患者不得醫生許可萬不可自購市上所售之補藥濫服陽虛發熱此種發熱率皆由於大汗大下及大吐瀉之後日久天長全身之陽氣消耗殆盡在小兒則於吐瀉症痘後疹後或因秉賦素弱飲食積聚過用攻伐或過服涼藥皆可演成此症在中醫於小兒科即名慢驚風其症狀最易見者即為全身瘦弱頭頸極細發細而脫皮膚甲錯甚則神昏氣喘二目無神熱不退或乍寒乍熱面色青黃口唇雖燥裂出血但不喜歡冷水而出氣極涼瀉利冷汗完穀不化或四肢冰冷角弓反張寐不合眼日久泄瀉頻頻或乾嗽以上諸症均屬危候凡日久熱不退及由吐瀉而成者此即屬孤陽外越陰虛陽越必用薑桂附子參耆朮芍熟地等培補根本庶可挽回一線元陽莊夔氏所著之福幼編以溫補見長余治陽虛發熱症不論大人小兒試驗四十餘年無不神效可取法也此症若純以西藥治之絶對無效醫者必識其言又有小兒時常發熱解表暫愈又發熱攻裏暫愈又發熱養陰滋陰發熱仍然此亦陽氣浮遊無所歸著之象以四君子湯加山藥扁豆治之多效不必用附子肉桂凡口起白疳及身腫者則更危矣以上病者皮膚發熱約分十種病原不同治法亦不同差之毫釐謬之千里醫者無不知之惟發熱之症與汗衄大小便舌苔尤有重要關係茲再分別説明於下不厭求詳也汗大略分發汗自汗盜汗戰汗四種發汗即用發散藥蒸發津液開發表陽使在表之寒邪注意寒字得汗而解凡初得之傷寒病有頭痛身痛惡寒者皆宜發散又有一種溫病自汗惡寒發熱者亦宜做解其表例如荊芥防風之類不可用止汗藥表解之後汗自止也此症有主用桂枝者大誤以桂枝性太燥用之必衄血以荊芥防風葛根薄荷藿香等解表最為相宜但須兼清內熱之藥例如連翹銀花等若係嚴冬傷寒病用麻黃羌活等藥發汗自是正理若溫病盛行之際內有鬱熱外為寒束天氣驟冷驟暖變動劇烈之時此症最多例如春末秋深之溫病是自汗盜汗俗名虛汗此二種汗症雖有自汗係陽虛盜汗係陰虛之説然在久病注意久病二字若在初得傷寒溫病之自汗不在此例之人如此現象總以斟酌補陽參耆之類補陰生地熟地白芍之類以期挽回衰弱之頽勢為宜又有所謂大汗亡陽孤陽外越者則係元氣將散陽脫症西醫稱之為死汗此與下列之過服發汗藥致大汗淋漓者不同一則非大劑人參附子肉桂白芍熟地大補陰陽補陽斂汗必兼用補陰之品否則陽無附麗也加以介類潛陽之法例如牡蠣鱉甲龜板之類不足挽回生命於萬一也又有一種過用發汗藥以致大汗淋漓不止者頃刻之間可以心臟停止致人於死凡中藥之麻黃羌活西醫之退熱藥例如安基比林等用之過量往往發生此種危險但西藥退熱劑與中醫發汗藥不同其汗出乃該藥之副作用醫者不可認安基比林等為發汗藥自不待言倘遇此種危險汗出之場合西藥中之強心注射在所必施不可不知也又中醫介類潛陽之類以治虛汗尤為奇效歷試不爽附識於此學者應注意也戰汗此是所受之邪欲借汗解故此種汗解之前病者必有一番極劇烈之不安如瘋如狂喊叫哭笑手舞足蹈一如邪魔恐怖狀態不一而足或則周身戰栗顫動不寧脈停氣促汗後脈自出因而繼續汗出或則大汗淋漓立時表裏透徹脈靜身涼此種戰汗蓋即內外邪正相爭既得汗出即是邪有出路為溫病及傷寒症固閉實邪解散之佳兆實為病勢一大轉機亦有戰汗之後邪尚未淨再作戰汗而解者更有戰而不汗邪盛正衰必待鼻衄凡疹一現即隱身熱氣喘實為危症不易再出若得鼻衄者尚可救亦同此理或屢用清下之藥而解者最危險者為一戰之後正氣不敵邪氣不退不能再作戰汗遂即精神散亂尋衣摸床昏迷愈甚而死此種危象多由於病者素衰弱或大病日久元氣消耗太甚而然此戰汗之大略也以上戰汗多因得病過程中失於汗下邪正交持日久自然分解之現象其戰汗乘機而作不拘一格有因服下藥後得瀉而作戰汗者有因大渴恣飲涼水余親見之或有飽啖西瓜及飲冰激淩而作戰汗者而作戰汗者有服清涼活血生津之品而得戰汗者蓋邪方欲解稍得助力以啓其機自然戰汗此種汗解不可強求然實為表裏透徹之好現象自無疑也病家遇此戰汗不知吉凶往往惶恐無措醫者可詳告之當戰汗之時萬不可服補藥亦不可用汗下和解清涼等藥只宜穩靜看護稍與溫水飲之以助其津液可矣至若正氣太虛大汗不已診斷確實有虛脫之慮時始可與獨參湯或注射強心西藥以防汗脫而死然萬不可誤斷也衄鼻內出血除女人逆經俗名倒經及習慣性鼻衄均不在本題範圍姑從略茲所申明者為熱性病之鼻衄蓋凡衄血現象率皆由於血熱上行關係肺熱尤顯此種衄血凡溫病過服發散藥太大或誤服病已不在表發汗藥及熱藥逼熱上行往往如此尤以桂枝最甚余曾見有溫病因誤服桂枝死後口鼻出血者慎之若於最險之斑疹一現即隱身大熱神昏氣促險象環生之頃服清熱解毒藥後一得鼻衄自是佳兆蓋疹方外透驟遭寒涼例如外受風寒或內受寒冷例如飲冷水頃刻毒氣收聚入內立呈險象此時若欲疹再透出百不獲一惟有急服連翹雙花犀角等以圖挽回此時若有衄血是邪有出路尚有生望再照清熱宣透之藥治之可以望生否則不易求生矣又有溫病日久邪已入內失於清下若有鼻衄亦係佳兆與戰汗皆是邪有出路不可不知大小便此種診斷必分虛實二種言之先説明實證之大小便凡實證發熱參看論熱諸條例如傷寒溫病等本病認定之後其大便之多少或有或無及其顏色均宜注意大凡熱在表時尚未入裏大小便均無影響一如平人清利如常逮至胃腸漸起變化中醫謂之傳經或名傳變診斷上最重要者即為二便凡大便極乾燥或數日不解大便或腹痛或瀉極惡臭之稀糞或一日數次瀉下中醫謂之熱結旁流或大便黑色如油此血便最危險或大便如膿血痢疾如有此象後重異常或大便白色缺乏膽汁凡膽石疝痛多有之中醫謂之脅痛緑色小兒多有此症亦膽熱也皆為實證多有潮熱非表證也均宜用下劑中藥則有大黃芒硝等西藥則有甘汞氯化亞汞硫苦硫酸鎂等藥均可酌用但此種瀉藥作用不同不可盲用若遲延不下反誤病機或致神經受其侵害精神昏迷譫語發狂或至炎症延及腹膜當下不下腸管破裂西醫謂之穿孔出血潰爛誘起腹膜炎全腹皆腫不可救藥矣立致危險故一見腸胃燥結總宜速下不可拘泥於保存津液下不厭遲之説也但溫病逆傳邪入心包瀉藥不可妄用此條應參看溫病説明不再重敘至於實證之小便或黃或赤或少或頻數不禁此句必切記熱性病三字或溺極混濁沉澱白粉樣物甚則點滴不通精神錯亂尿中毒皆為實熱必與大便及全身症狀對勘清利小便之藥固所應用但重要關鍵仍宜注重清除大腸實熱瀉下法腸熱既去小便自利不可不知但熱尚未在腸例如熱閉膻中則不可瀉其大便所謂誅伐無過也盲腸炎腎臟炎尿石等症均有時必須用外科手術者不在此例再説明虛證之大小便凡虛證之大便多稀薄或一日數次亦有由實證之痢疾日久轉成虛證者一日數次所下仍有膿樣物腹亦微疼然不可認為實證必大補元陽乃可望愈或完穀不化下利清水若係腸結核之症往往由肺病而來不易治療小便均清白順利或不禁又有一種虛證小便亦有極短極赤而臊者此陽虛不化不可疑為實熱例如水腫症虛弱已極非用大補元陽之藥不能得其小便通利此症參看雜症編腫脹病趙氏醫案自明此症並無其他熱象而小便短赤如此非由經驗得來不易知也此種病狀多半皆係久病中醫謂之脾虛或名腎瀉且多無表熱亦有發虛熱者脈多無力精神多清醒身體多瘦弱醫者不難診斷不致認症錯誤惟有一種久瀉陽虛小兒尤多此症俗名慢驚風信孤陽外越西醫書殊無此症狀俟考之症狀內裏愈是虛寒表皮愈發乾熱甚至日久發熱皮膚甲錯漸漸角弓反張二目天吊口噤氣散而死其脈細微小便自利雖易診斷然此病症絶非只用普通健脾中藥白朮山藥等止瀉例如粟殼等藥所能奏功必須以大劑參耆白芍熟地甚則加附子肉桂乾薑佐以大補脾腎之藥始能有效醫者稍存觀望模稜之念必致誤事庸工見其表熱多不敢用補陽之品何能有濟故余詳細説明之至若小便亦是虛證多清白或遺溺或癃閉氣虛水腫小便極少均宜尋其病源施用補劑未可概用利尿藥也子宮瘤之重者血崩壓迫尿道亦多小便不利不在此例關於止瀉之藥中醫書率列入收澀門除罌粟殼即鴉片花果之外皮有收澀之效外餘如赤石脂禹餘糧訶子肉之類其效均不及西藥之次硝酸蒼鉛次硝酸鉍日譯鉍為蒼鉛單那爾並鞣酸蛋白單寧酸阿片末鴉片等阿片末小兒不可用易中毒也之確實而有特效對久瀉之病尤效然若遇本節所述之陽虛久瀉中醫俗名五更瀉腎瀉雞鳴瀉稀屎癆小兒慢脾風慢驚風均屬此症用西藥止瀉劑不過一時有效且無退熱之功根本治療必以中藥之人參炙黃耆附子肉崔乾薑補骨脂桑螵蛸白朮白芍熟地山藥粟殼粟殼原始亦為外國産以後本草綱目始收入中藥類等方能退熱止瀉挽回生命最妙者即以此等熱藥而能退其頑固虛勞之表熱而止瀉結果熱退瀉止日臻於強壯而復其健康余試驗四十年百不爽一不得不驚為神工試以西藥之補劑及強壯劑治此重症必不能得如此之效果余敢下此斷語但余之學問淺陋願讀者於此場合追究其科學之原理也更願西醫注意及之以補其不足之點自此以後對此種慢性之虛瀉得一完全根治之法豈不善哉中西藥互用其效更速舌苔熱病舌苔最關重要故簡單説明之大凡初起之傷寒邪在表者舌多無苔熱瀉及溫病初起則多白滑薄苔或無苔總之舌無苔或僅白滑之薄苔即是邪熱之初起不可即用瀉藥舌苔漸黃膩而厚則邪熱漸入裏若乾黃醬黃或黑苔燥裂則裏熱極盛再證以其他現象例如便燥則瀉藥應用之時也此説不過言舌苔之最普見者若虛證發熱參看論熱諸節舌上雖有苔亦必須照虛熱治醫者不可僅據舌苔而忘卻病之虛實也此段應列入診斷學與脈症合參方為準確二痛此病者感覺身體某部分有疼痛之謂也此疼痛之病理即應簡單説明之中醫論疼痛有極概括之定義及治法曰痛則不通通則不痛是也此二語雖極簡單然其理想則甚圓到此病徵與西醫所稱之炎症相關聯故不得不連類説明之西醫論炎症有五徵即局部發赤腫脹此腫脹指實症言灼熱疼痛官能障礙由以上二説觀之即可瞭解有病時疼痛之病理蓋吾人身體無論何處疼痛必該處之血行有障礙血管運動神經受刺激此為一定不易之理此病理非此數字所能説明故病痛名目雖多總以此説為最可信且中西醫兩説亦相吻合故余采此理論惟中醫治疼痛大綱細分為寒熱虛實又細別為氣血風濕積聚內癰外科從略癥瘕蛔蟯疝痹痧脹中惡等類其治法串分溫補瀉下宣通順氣消導祛風祛濕殺蟲破瘀諸法與西藥之消炎瀉藥麻醉等法除外科手術相比較似覺靈活茲將疼痛證治舉其概要如下實痛此種疼痛新得之病居多例如傷寒初起之頭痛腰痛骨節痛此必惡寒宜用發汗藥散其表邪溫病初起之頭痛骨節痛宜於清解藥中兼輕散藥熱性病之腸炎大便不通或瀉極臭稀糞之類或蟲積食積血瘀氣滯之胃痛腹痛脅痛宜瀉下或殺蟲或舒氣或破瘀消導等藥腰腿肩臂諸痛此指痛痹而言宜驅除風濕活血皆屬實證實痛之中又分寒熱不可不知虛痛此種疼痛久病居多例如心痛痙攣且其痛多不甚劇烈而隱隱常痛亦有劇烈者例如心痛用手按之則減或痛或止西醫所謂神經性疼痛且痛多無一定之點除偏頭痛心痛皆屬虛證此種疼痛以西藥之麻醉劑為有速效然中藥之效力則以持續常久勝也虛寒虛熱均有疼痛是宜詳審三血此血字在中醫多連氣血言之以氣血二字原不能分立也此血字似不宜列於病理余欲學者特別注意且余對血證實驗亦特別有心得故録於此西醫言病理對於血之變態則專注重於有形其説之大概約分四種動脈性充血即由於身體內一部分血管運動神經作用障礙或由於血管壁之弛緩而起之充血此種充血多為一時性與原因共消長例如因長途步行致令腿腫因忿怒憂愁致誘起腦充血是也靜脈性充血即瘀血一由於心臟衰弱二由於靜脈管閉塞狹窄或壓迫例如經閉肝鬱等症均屬之貧血即中醫所稱之血虛血虧之類是也出血此則大分之為二種一外出血一內出血例如咯血吐血衄血尿血便血外出血及腦膜腔等出血內出血均屬之吾人治療血病非常困難中醫方法治血藥中必兼順氣或補氣之品此理非簡單數語可以説明茲故從略今將余所經驗極有效之方論列下以供參考吐血及咯血此症分為胃及肺二經之病診斷時必須詳審大凡胃吐血以前必有胃病徵象例如胃脘痛背痛吞酸嘔吐等其誘因則多在食後或食辛熱之物或常大便黑色或大便乾燥所吐之血多混有食物而無泡沫且係多量血液凡此種種皆胃吐血也肺病咯血更易診斷大率肺病患者不可一診即疑為肺結核在中醫既無細菌學更不可冒襲新説妄加推斷故遇肺病咯血必細心查其病因病狀脈象然後隨症用藥較西醫治法尚覺活動於是肺咯血一症不難治愈此種論旨余實確切實驗不知凡幾也蓋肺咯血及吐血之症必有肺疾患之特徵例如咳嗽胸痛或痰喘或覺胸內溫暖上湧或先有甜味其所吐之血多含泡沫凡此種種皆肺出血也中醫治法凡胃病多用通利的是正規然當大吐血時往往以中藥和平緩不濟急此時自以西藥止血為宜例如麥角劑類若係胃潰瘍之吐血此症以前胃部必有大痛中藥治療實不如西藥可以根本治愈如次硝酸養鉛硝酸氧鉛重曹人工鹽等可參閲醫驗至若肺病之咯血余曾歷試西藥止血劑非無大效然實不如中藥之白芍為效驗確實而永久參看醫驗若再佐以理肺滋陰健脾之中藥治療肺結核實有驚人之效驗此非臆斷實有確驗也參看醫驗於此而有極應注意之一點即凡遇咯血萬不可一律認為肺癆病以余之經驗實有內有鬱熱而致咯血者大劑涼藥例如黃芩梔子天花粉白茅根等竟能治愈之此雖例外録此亦足以知此症之變化不可不慎也其次則為中醫之治女子之經閉及血崩二症根據余之經驗簡單説明於下大率經閉一症十之八九治法之有效階段分為第一養血第二行血第三大攻大破而最有效者厥為第三之攻下治血閉唯一有效之法也血崩一症西醫名子宮瘤僅用西藥止血多無效余下病症編説明之可參閲也以上血證寥寥數語頗嫌簡略然皆確實記録幸勿忽視四嘔吐此症病理姑以虛實二字總括説明之實證嘔吐凡熱性病例如傷寒溫病胃癰食滯等之嘔吐皆屬實證此類多新病不久然亦有稍久者其症狀率皆參有其他病狀嘔吐之物或胃脘痛或吐酸水胃覺糟雜飽悶脹滿胃潰瘍之胃痛每於食物吐出即減輕此必聯合其他症狀診斷之例如由惡寒之表證漸漸嶇吐則知其邪漸入內面為小陷胸症也不難認定其治法大率多宜通降或苦寒之品所謂胃以通為補也以此種實證嘔吐淺言之即胃內容物腐敗或因腸之消化不良或因腸熱有宿糞致胃內容物不能以次下降因而上越此種現象以西藥之重曹瀉鹽硫酸鎂等從事中和胃酸清理腸炎更為釜底抽薪之計普通嘔吐中毒除外服此種西藥率可停止余固粗工原卑之勿甚高論也胃之炎症率分加答兒性鼻黏膜炎化膿性義膜性偽膜性蜂窩織性腐蝕性結核性黴毒性等症中醫則謂為胃熱停滯唯有一種溫邪逆傳之嘔吐非常難治亦非常危險此必參看後列溫病醫驗以芳香逐穢開竅苦降等法治之方能起死回生萬不可以小陷胸湯及承氣湯等所謂攻伐無過誤人性命也虛證嘔吐中醫之説多謂之肝氣上衝或謂之胃陽不足或連合肝脾二經並説其理似頗玄虛然根據此理用中藥治療亦實有特效西醫稱此症為神經性嘔吐其症狀率多無故嘔吐或只吐清水或偶吐偶止以上等症均無其他原因可尋常年纍月愈吐愈弱甚或滴水不入而吐仍不止至此地步往往西醫之麻醉洗胃止嘔等方法不能根治中藥之補陽順氣健中平肝揚清抑濁等法反覺妙不可言能收奇效此或由於是類之中藥頗能安定嘔吐神經歟胃癌一症中醫名噎隔反胃以早用西醫之外科手術為佳內服藥品及注射均無效也五譫語中醫論心神與西醫論腦神經息息相通故熱必譫語中醫謂之邪入心包絡西醫則謂為熱度太高侵害腦神經其現象則言語顛倒精神錯亂其治法中藥則以牛黃犀角紫雪丹至寶丹及承氣湯之類為有效西醫則以退熱安基比林等藥瀉下藥或注射藥為有效更有一種神經衰弱至於極點之病人亦有譫語例如將死之時中醫則必大補元氣又有破傷風腦膜炎急驚風産褥熱産後風及瘡症血已中毒亦有譫語則必急速注射西藥各種血清方能有效中藥不必與也神經病此類疾患分末梢神經病最常見者例如顏面神經麻痹口眼歪斜肋間神經痛脅痛坐骨神經痛腰痛振顫麻痹痿症神經官能病神經衰弱症虛弱癲癇羊角瘋偏頭痛狂病風痰神經性嘔吐已詳前歇斯的裏臟躁症眩暈頭暈神經性心悸亢進怔忡麻痹痹症等皆屬之此類疾患率無一定實質而且發作無常時愈時病因其不能有固定之情狀故其治法西醫率用麻醉鎮靜等藥確實有效嗅素劑之類然此類藥品不可常服吾人為病家健康計不得不格外慎審防其中毒依余之經驗當病狀劇烈時不妨暫以西藥不可用大量治其現狀或注射病勢稍減則停止西藥仍以用中藥較為和平蓋中藥對於以上各症雖不盡有效然於偏頭痛嘔吐腰疼虛弱眩暈怔忡等症有時西藥絶不能治者中藥則能大建奇功其餘各症中藥可謂多無靈效不可不知六瀉在腸之病理上瀉之一字實為常見之病態此瀉症姑以中醫之虛實二字説明之凡實證之瀉大約多在熱性病之過程中此在西醫多包括於腸炎類其危及生命則多由於腸穿孔因而誘起腹膜炎滿腹皆腫所致其症之來源或由於熱及飲食物之積聚不下因而誘起腹瀉西醫病菌説屬之腹痛或脹或後重下墜為一定現象所瀉之物或極臭之稀屎或水或紅白膿樣物痢疾重則盡瀉似膿血或血水之物已近穿孔期則危險至矣凡瀉症皮膚發熱者均較重之症小便短赤亦必然此症治法必須參合該症之原病例如傷寒溫病痢疾等皆有瀉症而施以治療大法不外用瀉藥忽速刷清其腸胃之積垢使其通利消炎中醫治此症則於瀉下藥中往往加以甘寒苦寒清熱利小便之品頗為靈妙然其瀉藥中只有大黃芒硝瓜蔞等數味不如西藥之種種瀉藥各有作用例如甘汞乃有殺菌性之瀉藥對於赤痢甚為相宜此只論藥性不可誤解依余之經驗對於熱性病之瀉症雖係同一治療目的瀉下然用瀉劑之時期及種類則頗有分別大率瀉症未作之前限於傷寒溫病於相當時期例如應下之象俱備例用瀉藥以資通利西醫慣用甘汞然此時甘汞效力實不如大黃芒硝再佐以苦清熱例如黃芩等護陰例如生地等等藥面面周到收效亦速若既經中藥汗下之後內熱仍盛仍瀉極臭之稀糞若再服大黃芒硝反致傷胃不但病者服藥困難而且效驗不能如預期之圓滿在此時期硫苦一味竟有不可思議之妙用甘汞絶無大效此藥若在便結之前絶無大效而此時用之則恰當其可不可輕視赤痢一症以用甘汞為最相宜然當大熱潮熱之計屢服甘汞則非所宜謹防其速發作用誘起口炎硫苦人工鹽等更無濟於事而中藥中之白頭翁湯應作重劑稍加熟軍製大黃大黃又名將軍丹皮等藥重則用大黃芒硝不必遲疑其效如神不出三五劑必獲大效實超過於各種西藥之上也此皆歷經比較之所得願學者遇此場合一斌之此段專論瀉症若便祕之症用瀉藥必須掉換試服不可拘泥於一種瀉劑大率西藥優於中藥不可不知又大黃對於胃潰瘍絶不可用以此藥刺激性太大反致誘其速潰此雖不在於瀉症範圍以內茲因論瀉劑故連類及之俗稱心口疼多係胃痛但此症應與絞心症心痛鑑別凡無胃病各症狀者例如吞酸等即應注意診斷蓋心痛忌瀉劑也凡虛證之瀉診斷上不難認定中醫因無細菌學姑不論其病原菌為若何例如腸結核桿菌等茲但就其瀉症之病象加以説明大凡虛瀉多係衰弱久病之人然以實證日久屢服苦寒及瀉藥漸漸轉變為虛瀉者亦有之例如傷寒溫症疹痢之後日漸衰弱消化不良往往演成虛瀉粗工臨症拘於既往各症多係實熱往往以餘熱未盡病後勞復之理想模稜立方或則顧慮與個人以前立論處方前後矛盾明知一誤再誤不肯改弦易轍此輩論症用藥看似不離本題實則已與奉病奉字疑誤大相徑庭此等見解萬不可存須知病現虛象即宜補養症現極虛即宜峻補已往之病盡可拋開隨機應變聲為能手以上數語係指自始認症抑無錯誤者而言非學問經驗兼富者不能若診斷不確用藥忽瀉忽補忽涼忽熱則是毫無知識何足云醫四十年前余曾治一秦嫗初病本係霍亂係另醫診治數十日後已成虛證余臨診時已通體皆涼脈停汗出急以大劑參耆桂附大補元陽竟得回生繼續服藥至十餘日又現虛熱象結果又以生地寸冬等滋陰藥而治愈設當危急之時仍用治霍亂之方而不用大熱之藥則無以回將散之元陽其後若見陰虛仍再繼續用溫補必致津液日涸仍不免於死亡此症演進凡三變而症狀各相反醫者若存顧全自己論症始終丫致不相矛盾之私見表面上用藥及治法一貫無誤然此症必無生理書云醫者意也其是之謂乎此秦姓住德州柴市街略南為秦德純君之家族記得介紹余者友張松泉徐仲甫兩先生也凡虛瀉之症大率身體瘦弱皮膚蒼白腹部凹陷不腹痛或有隱微之痛脈多細弱無力或小數舌多無苔小便清利普通多無高熱與後有熱者參看斯瀉之糞多稀溏或稍有白油樣之物不可誤認為痢疾或完穀不化一日三五次至七八次者居多尤以下半夜或晨間必瀉一二次有五更瀉雞鳴瀉等俗名信愈瀉愈弱則虛證畢現例如盜汗喘息身腫以致於死此種泄瀉中醫多責之脾虛相火衰弱故多以健脾白朮山藥茯苓等補氣參耆等補相火補骨脂肉蓯蓉等補陽南子肉桂等收澀桑螵蛸粟殼等以上等藥皆歷經試驗有效者等藥治療之強半有效藥力持續甚久因而根本治愈者頗多西藥中之硝酸蒼鉛硝酸鉍單那爾並阿片末等對此症更易見效但比較效力持續之時間略短且長時間服用西藥之阿片等又恐慢性中毒成癮故余每遇此症必連用數日西藥後即漸漸改用中藥收效之佳不可思議西藥則漸減中藥必用大量方可然此皆指普通之虛瀉者而言若係肺結核末期之瀉腸結核中藥內之桂附參耆萬不可用西藥收斂劑用之亦只生效一時此時只有用西藥之一法無濟於事也更有陽虛發熱之虛瀉及小兒慢驚風此症多由疹後痢疾或吐瀉症轉來之虛瀉皆有發熱則中藥補劑有唯一之特效西藥不能望其項背也阿片不可用於小兒注意切記以上陽虛之瀉參看前論陽虛發熱茲不復述又有胎前患瀉症者治最棘手應參看後列王姓醫驗七腫脹此二症不必相兼更有虛實之分不可混同且腫之原因極多例如充血性水腫瘀血牲水腫之類西醫病理學言之甚詳必須參考茲所欲言者僅為習見之虛腫俗有水臌氣臌之名或稱浮腫及腹脹之二者以本編敘述皆歷經實驗之症故不欲多所鋪張故示淵博然僅此二者之實驗學者苟能深信不疑則於此極難診治之臌症已不啻得一指南針矣大凡腫脹二症在中醫大約以腫屬水病脹屬氣病水病之中又分陽水和陰水推其意義凡實證皆因風因熱因濕因氣以成邪自外來皆有餘之象初得之病偶爾浮腫皆屬此類偶爾之浮腫率多暴得之症小便短赤大便不爽或熱瀉或有寒熱嘔吐骨節疼痛舌苔黃絳或白厚或皮膚起有紅點虛腫二便亦有不利不可相混脈象實而有力此種症象率宜發散宣通利水順氣清熱甚則宜於攻下注意以上之腫係屬暴得例如溫病多有之中藥內之麻黃防風生薑桂枝防己柴胡半夏杏仁陳皮厚朴茯苓豬苓澤瀉黃芩梔子大黃芒硝瓜蔞仁等均為有效之品西藥內之硫苦醋剝亦極有效但若係久病之虛腫則萬不可用也以上係治暴得之水腫皆有效余曾見一醫為人治一久病之水腫始用麻黃等發汗繼用硫苦等瀉之一誤再誤因而病死以此藥西醫書中有治腳氣水腫特效之語故誤用之可不慎歟虛證之腫率多久病其症象皆係漸漸而來與實證暴然而腫者正相反其原因中醫書謂為脾肺腎三經虛弱不能氣化其症候率溺少食少無汗無津液漸漸四肢浮腫日久延及全身盡腫此症大便或溏或燥絶不可誤用行氣瀉下之藥若係男子則腎囊亦腫症自內發皆不足之象中醫謂之陰水脈象多細弱然亦有反見洪大無力之脈者吐者瀉者亦有之皮膚腫處以手按之多不能復起如按濕麵皮膚蒼白發熱者甚少中醫有效治人參黃耆之類補陽附子肉桂乾薑等補腎補骨脂等等法為最確實西藥中之巴拉奴妥林亦有效單用西藥則不效對於虛腫之症尤宜於相當方劑之中加以淡滲利尿之品茯苓皮必重用或酌加其他利水之藥且宜兼顧胃氣稍加砂仁實證浮腫原因一去其腫立消例如溫病關節腫不必治腫溫毒既散腫必自愈不必深談茲所欲述者為治久病虛證之腫之要訣此症認定後即以大劑之補品放膽與服不可因有乾嘔或自覺有熱氣沖咽胸滿等現象而不敢用補品藥味愈簡愈好藥量愈大愈好補劑之中加以滲利加以和胃之品重者數十劑輕者十餘劑無不收功參看醫驗余往往接治他醫不治之虛腫仍就原方只減去其雜濫不關重要之品例如補心補肺補血等藥而加重其適合本症之藥例如參耆桂附往往加至八錢至一兩簡單數味藥力專而效反大數劑後無不見效者藥雖平常效已實驗此即余治本症最得意之處願以告同好也虛腫單用西藥多無效外科手術亦不能適用於全身皆腫之後即放水法亦非根本治法願醫者唯一適用中藥也參看醫驗脹之一症較腫為輕西醫謂脹是腸腹內有蓄積之瓦斯氣體中醫則分虛脹與實脹二種經云諸脹腹大皆屬於熱此語頗有精義故歷來治虛腫者可以純用補藥治虛脹者虛腫至胸腹此時內臟亦腫往往病人自訴苦悶填脹醫者若誤認此是真脹加入順氣消導之藥則大謬矣須知濁陰上干必元陽大虛乃如此也則純用補藥之時甚少即或確係虛證亦宜於補藥中稍加疏利之品為妥例如蔻仁等萬勿一味蠻補也至於實證之脹率多以順氣緩下之劑為宜原因一去例如停水停食作脹脹滿即除不難療治勿庸贅述八汗已詳前發熱論可參照九頭痛頭痛眩暈神昏譫語此種病象更須分別虛證實證論治不可含混大凡實證多新得輕則眩暈溫病多有重則頭痛溫病傷寒凡熱性病初作多有此症所謂表證宜用發散藥然溫病逆傳已危絶無表邪而頭奇痛者更多此時萬不可誤認仍有表證在也再重邪已入內則神昏譫語發狂此蓋由於腦神經受侵襲腦膜炎腦充血均有頭痛在中醫則責之心包絡受邪不屬於表證矣熱邪膠滯膻中邪入心包血分亦有似表證之極重頭痛頭昏但不惡寒而嘔吐極甚醫者應參看其他症象認定之此症在溫熱病中最易誤治率因醫者僅知內熱二字雖此不能謂之誤認然一味清解或攻下大便愈下上熱愈結津液因熱耗與攻下而益傷陡變驚厥角弓反張鼻乾目吊上竄無淚或四肢厥逆狂躁煩悶胸高氣促嘔逆精神昏迷粗工見此症狀認為結胸與以小陷胸湯是謂無的放矢更或大加攻下與以承氣湯是謂攻伐無過蓋邪不在腸胃愈瀉愈危下愈虛上愈實醫藥殺人即在於此余對此症不厭反覆叮嚀必使學者深識此症為內閉邪熱在上邪入膻中邪在血分如非大便燥或熱結旁流此症不但不可僅僅調胃更不可魯莽攻下致誤人命戒之戒之而不能分清熱在何處用藥初則清涼繼則甘寒繼則苦降此三法非無效者但至內閉之候無濟於事矣三法既施束手無策矣西藥對於內閉險症絶對無效不必試用茲將余治溫病試驗所得有效方法詳列於下以備參考此由論頭痛眩暈神昏譫語等病理連類而及閲者勿以為不倫也初得溫病咳嗽頭痛嘔吐身酸或痛舌白苔或無苔脈或浮洪身熱或微惡寒治宜注重上焦肺經類以輕清之品開發肺氣例如連翹雙花菊花桑葉緑豆皮竹葉貝母荊芥防風薄荷蘇葉等此後四味初得有外寒束縛頭痛身痛或惡寒者方可加入溫病忌汗四字須活看不必拘泥治之為宜溫病稍久邪不得解口渴煩悶嘔吐舌苔黃絳小便赤短大便或燥或瀉極臭之稀糞身熱頭暈頭痛此時頭痛萬不可認為表證脈沉數洪實甚則或反沉小四肢厥逆脈多沉小治宜注重胃中實熱酌加苦寒方可若仍盡用輕清之品病重藥輕無濟於事必兼用川連石菖蒲桑皮瓜蔞或石膏黃芩梔子鬱金等西醫謂石膏毫無效用盲從者即置之弗用可再細心試驗即知余列此味非率而操觚者橘紅陳皮大黃余於此症喜熟軍以溫病病在上焦不宜大下故稍用熟軍亦有大效過下之弊往往演成內閉外脫之險症又不可不慎也等藥此外再以病之情狀加入清輕芳香清熱解毒之品率多奇效參看醫驗溫病七八日後失治熱邪逆傳入膻中實為危候溫病初起不難治愈入此階段殺人極速中醫奧妙即在此處起死回生其效如神惜學者臨症茫然不易臻此境也此時病者並不能指定何處痛苦所最著者精神昏迷嘔逆更甚頭痛頭暈無汗絶非表證或自汗四肢厥逆若係多日不大便小便赤短潮熱亦可稍用瀉藥大便不結不腹痛者勿用目瞑鼻乾無涕淚身體發痙狂躁胸高氣促小兒誤服瀉藥尤多此現象非陷胸症也甚則角弓反張若用瀉藥太過下愈通上愈實諸竅將閉醫者須認定此症即係邪閉膻中無形無質膠滯鬱結既不在胃腑亦不在腸屢用攻下是速其死也此時惟一治法即在以芳香上宣諸竅石菖蒲鬱金金銀花連翹石斛等類再佐以其他清熱解毒之藥此時犀角一味為必不可少之品此藥最昂貴必要時勿惜也至寶丹紫雪丹更為有效此藥開竅最速神昏發痙之候速以此類藥救之再參以滋陰藥例如生地元參麥冬及以上芳香諸品大劑若嘔逆太甚可分數次服緩緩與服能一次服更佳可一日兩劑強半有生望也此症稍延時日多致不救久病亦有實證例如胃潰瘍症率多經年纍月吾人讀書要靈活不可拘泥胃脘痛一症最要與心痛詳辨凡心口痛而無吞酸便祕食後脹悶嘔吐嘈雜等等胃病現症者多係心痛絞心症心炎等宜以西藥中藥無效治療凡心口絞痛氣短一經勞動涼風立時痛起喘促不能起立痛時上連胸背間有吐白沫一二次者者皆心痛危症死期近矣不可認為胃痛也心痛一症中醫往往不易認識故附識於此以上因論神昏譫語連類及於溫病又特舉出溫病內閉之危症以告學者此段文字應與前論大熱似寒一節對照自不致有誤認蓋大熱似寒之危症是上關下格即腸胃熱滯上下不通氣因而內外不通氣是有形之熱滯所以非急開下竅不可用重瀉藥溫病熱入膻中之危象是內閉外脫係熱痰膠滯膻中因而肺脹血滯心包內外不通氣並非腸胃不通氣與腸尤無涉是無形之熱滯所以越用瀉藥病越加重非急開諸竅不可此數語最為緊要臨症時要認清也至若虛證之頭痛眩暈率多久病不難辨認大凡頭痛時發時愈或偏頭痛或眩暈最為常見中醫論此症此症亦有因實證頭痛日久失治轉變為虛證頭痛者不可不知率謂清陽不升風火乘虛上攻肝風巔頂及濁陰阻滯氣血瘀痹而然此説驟觀之似近玄虛然細參此理實與西醫神經性頭痛眩暈之説吻合蓋中醫無神經二字凡所謂絡及孫絡等名詞多指神經系而言故有久病入絡之説其法之最有效者例如熄內風平肝滋陰之藥滋腎液及鎮攝潛陰宣和清陽等藥屢試屢驗絶非玄虛參看醫驗西藥中治頭痛眩暈等藥亦非常靈驗然藥力持續時間甚短且不宜於虛證屢試皆然故附録於此久服西藥止頭痛眩暈恐有侵害心臟之弊且易嘔吐不可不慎於必不得已時偶一用之略以緩和病勢則可慎勿常久服用也近人對於西藥一知半解輒好濫用最為危驗治此症之藥例如安基比林咖啡涅等均屬劇藥如無真正西醫學識萬不可任意用之而咖啡涅一藥尤屬劇烈用不得當危險立至不可不知此症脈弦細者易治洪大有力或無力老年入及陽虛者多有此脈此即西醫説血壓高之現脈神昏譫語亦有虛證無熱至久病將死多有此現象不易挽救矣眼病及牙病均能牽及頭痛神經影響應先治療眼病或摘去病齒頭痛自愈此非西醫不能勝任服中藥及西藥絶對無效凡有長久之頭痛屢治不愈必請牙科或眼科專門西醫檢查確實後治其本病原因既去例如牙齦有膿頭痛自然根治十咳嗽此徵象係由於氣管內發生變化例如發炎所致但中醫書論此症亦有虛實之分凡實證之咳嗽傷寒溫病感冒肺熱炎等初得之時多咳嗽總不離乎肺受實邪例如風寒暑溫濕及污穢時氣肺氣不宣而生咳嗽初起多於咳繼則有痰重則肺氣壅閉愈甚而生胸脅痛喘脹氣促胸脹不得臥或吐膿吐血皆一時忽得之實證治法必須先顧原病例如嚴冬傷寒初得兼有咳喘必有表證則於發汗藥中加入理肺藥一二味自然痊愈例如加入杏仁蘇子等藥於麻黃湯中溫熱病初得兼有咳喘傷寒邪自皮毛感受溫病邪自口鼻而入皆肺先受邪故多有咳嗽則於清解藥中加入理肺藥一二味自然痊愈例如加入杏仁貝母於銀翹散桑菊飲諸湯劑中若忽略原病一見咳嗽便治肺病斯為下工不足言醫治咳嗽之藥甚多中藥內之有效者不外杏仁蘇子貝母桑皮枇杷葉等嗽稍久者紫菀百合亦有效若日久咳嗽不止漸有虛象者白芍一味實有特效加入治嗽藥中百不失一此藥不但止嗽而止血之力更勝於西藥中之麥角等且又能止汗故對於肺癆吐血而有虛汗自汗盜汗者實為無上妙品查本草所載此藥並非專治以上各症惟余經過歷年試驗及多次之比較始確定為止癆嗽吐血咯血自汗盜汗之特效藥用量必須五六錢以上其因咳嗽有痰者中醫以橘紅半夏等為有效之品余則本其經驗所得確定茯苓一味對於一切痰及痰飲凡一切加答爾性之症候例如多稀痰之肺水腫加答爾性肋膜炎水瀉腹水等皆有奇效與普通治痰藥合用應認明寒熱之分佐以它藥方可有特效分量約五六錢以上此藥本草所載亦非如余之所云吾人治病用藥但求實效不必拘泥於古書也凡口乾液短及有高熱者不可用滋陰補腎例如蒺藜枸杞子等亦能止嗽不可不知西藥中止咳之藥率多麻醉品雖有特效不可常用恐成習慣余常用小量之托氏散合以重曹治咳嗽之稍久者平穩有效但此藥內亦有阿片仍不脫麻醉範圍不過較歇魯因可待因鹽莫等略覺和平耳肆間治肺病之成藥甚多危險太大萬不可盲從試服自貽伊戚也凡咳喘不能臥下者皆屬重症肺炎初得即如此故凡不能言語之小兒咳嗽氣促胸挺有熱者先防肺炎加重應豎抱之不可強令臥下十一喘喘喘喘之一症更有虛實之分中醫論喘最詳大凡參一脈象以定虛實實證之喘不外宣通肺氣有寒則用麻黃杏仁等必參照其他症象有熱則用桑葉葦根金銀花瓜蔞仁皆和平有效之治法余不取葶藶瀉肺法虛陰陽證之喘則不外於補腎及固攝各藥例如六味地黃丸腎氣丸補骨脂等甚或用黃耆人參均為治喘妙品葉天士先生論喘極精其在肺為實在腎為虛二語真得治喘妙諦其治法中之祕訣在上者實證則以清肅上中二焦宣通肺氣為主治在下者虛證則以填補溫補鎮攝為主治可謂得治喘要義學者宗之自是正軌臨症時再參合其他各症細審脈象然後論治方為圓到若第見喘治喘斯為庸工矣記得數年前余友諸友鶴君延余診一唐姓住北鑼鼓巷喘症極危查閲前醫務方因病者患喘多日中醫認為肺實均用瀉肺藥不效西醫注射止喘藥喘止然病者更痛苦氣將不屬痛苦難堪余詢知病者多日未大便只與以人工鹽十五格拉模克一劑而愈此事不足言治病直治藥耳醫者為世診病大率如此何分中西思之真可笑也十二厥逆中醫講四肢厥逆是指手足而言凡熱病多有此現象率在病勢進行時期熱度愈高手足漸漸轉涼脈亦不數而變成沉細之狀再重則六脈皆閉厥逆更深漸漸至於通體皆涼所謂熱深厥亦深真名言也病勢至此已陷於危篤醫者須參合其他症狀以定治法例如傷寒溫熱等症數日後注意此三字遇此現象強半仍有頭痛此時絶不可認為表證口乾神昏目赤腹痛舌苔黃絳或黑嘔逆大便燥結或熱結旁流小便短赤或混濁有白粉沉澱喘促等症狀併發不必皆具醫者不難斷定其為實熱於此時必斟酌病者以前所服之藥如何認定此症之或在上中二焦或在下焦皆指實證如係屢經汗下之後而有此病狀必其病在上中二焦應於芳香開竅清肺滋陰藥中加入紫雪丹至寶丹牛黃清心丸及犀角鬱金之類以冀開宣上竅若未經過攻下必須注意是否腸胃鬱熱所致認定後即用芒硝大黃下之必見功效此時病已垂危萬不可因其通身皆涼脈停氣厥誤認為寒證若於此時誤投溫熱表散之藥殺人極速慎之慎之虛證亦有四肢發涼者此必久病參以其他症狀例如久瀉不難認定勿庸贅述法宜溫補不待言矣十三心悸此症在熱性病中最多病人自訴心慌即是此症西醫所謂心悸亢進是也此時心力抵抗病邪有不足之勢醫者用藥應格外注意若係發汗藥必先用小量以防危險中藥之發汗藥於此時防有危險西藥之退熱劑更甚能使發汗過多心臟驟然停止而致命二十年前余曾診一直隸左翼統領黃華軒君之感冒症脈現結代而心悸因惡寒頭痛身痛完全表證余用表散藥分量極輕囑取微汗第二日病稍減武人性急嫌藥量太輕乃改延某醫竟用大劑麻黃羌活發汗服藥後翌晨未起差辨呼之不應啓衾視之已死去多時矣特記於此用為垂戒西醫遇心臟衰弱之熱性病往往於退熱或清涼藥中佐以強心之品例如別拉密童加入樟腦酸稀鹽酸加入赤酒等類用意頗為周到但中藥發汗劑則無此法若於發汗藥中加入兼顧心氣或兼顧嘔吐等藥反致藥力不專不易發汗更致誤事不可不知余又親見常服西藥金雞納霜丸及少量之別拉密童安基比林等驟然死去者記得有一人患癆熱醫者教以服小量之別拉密童藥片亦有效乃連日服之一日正食橘方送入口忽死去記此以為垂戒此人曾經余診治見其脈弱不能服退熱劑只與滋陰中藥無效乃竟如此死去此非西藥之過也若係久病虛證之心悸怔忡自以重用大補氣血及補心氣藥為正軌余治此症由經驗上得來一祕訣即藥量要大藥味要簡是也參看醫驗蓋怔忡病患者至極重時此症輕時往往人不介意比較上西藥強心劑不如中藥效力之持久且實芰答力斯毛地黃等西藥有蓄積作用即連服此藥易於中毒之謂之不便故特附記於此急性心臟衰弱例如大吐血後或摔傷等必注射西藥強心劑此時中藥太緩無用武之地不可不知十四厄逆厄逆俗稱打嗝此現象係胃氣不降實證熱性病居多有此率用瀉藥有效此根據余之經驗屢試不爽大凡治厄逆應於治主症藥中例如肺熱腸熱等症加入一二緩下之品厄逆立去此指厄逆甚者而言若較輕之症無其他熱證者以二陳湯等治之亦有效但歷試古方例如旋覆花代赭石湯等多不效不得不鄭重聲明之若久病虛證之厄逆上氣自宜以暖胃溫中論治亦多有效西醫治此症率用麻醉藥以鎮其痙攣固有特效但非根本治法耳西醫治此症亦注重主症主症一去厄逆亦愈與中醫殊途同歸不可妄有軒輊十五口乾口乾口渴實證之口乾口渴必由於肺胃熱蒸津液消耗治宜參照主症例如肺炎加以清涼或瀉下藥品西藥中之清涼劑甚有效若係虛證肺癆尤甚則以生津養陰之法治之但宜注重主症中藥對虛證之口乾口渴效多緩不如西藥之稀鹽酸等肺癆尤甚不易速效余曾治一虛瀉之久病患者自覺咽喉內如煙火上衝然不渴又有乾嘔舌紅有泡小便短赤口唇皆腫前醫誤認為實證幾殆此症脈極細微後服用桂附參耆等藥竟爾收效口有津液逆氣亦止小便亦漸多當此場合始見吾輩醫者關係民命也中醫遇此疑難症候虛實之辨不差纍黍此中醫所以能存在於今日也十六二便不禁二便不禁此亦應分虛實證治之凡熱性病例如傷寒多有大小便不能自主者大便或溏或稀水小便點滴頻數率應治其主症主症一去此症不治自愈若係虛證此必參照其他各症例如暴厥及虛勞人驚恐疲勞及大病之後皆屬之則宜分別其何處衰弱治其主症再加以收澀之品此病理是神經衰弱及麻痹膀胱中醫統名為虛弱多有能治愈者余治愈一因變亂長途逃難勞苦驚恐太甚因而患小便不禁之青年以白朮等治之而愈十七炎症此病理余純采西醫之説似不宜於此書中論及之然此病象甚關緊要且有助於中醫之診斷故加以詳細説明於下願學者注意及之不可存門戶之見也炎症之定義吾人身體上組織之一部受炎性刺激後其反應起充血滲出俗云發紅營養障礙細胞增殖俗云腫者名曰炎症即因外來刺激例如受了大寒大熱火燒木刺等組織之生活機亢進且起變化之反應狀態也亢進就是發旺的意思例如喝了酒心臟的生活機加快是也起變化就是受刺激之部分變了原樣例如吃了麻醉藥腦神經就變化成遲鈍的樣子反應二字反奴是對答應就是應付的意思炎字之意義原基於臨床上實驗之名稱從一部發赤灼熱定出炎字之名西醫以局部發赤腫脹灼熱疼痛及官能障礙官能障礙就是不靈的意思例如腸胃受熱就能消化不良是也為炎症的五個最著徵象此五徵不是每個炎性病均要全備往往缺其二三例如有疼痛之骨節炎亦有不腫者而不發赤不腫痛者例如神經炎等多有之蓋隨其原因之強弱例如不甚劇烈藥之刺激局部即不能五徵皆有發生之部位經過之急慢病勢之輕重自有差異也嘗見有中醫隨便斷定病名曰某某炎例如腎臟炎殊屬可笑余以為中醫不可不知西醫之醫理文字上萬不可冒襲西醫之名稱以中西診斷術不同何以能知其為某某炎耶例如腎臟炎與腎盂炎關於炎症及病變之學説甚多茲擇其有價值可供參考者述之於下充血説往時論炎症率以充血為理由洛開坦司開氏謂發生主要機轉由於毛細血管之擴張血行之緩慢靜止致血液之成分滲出血液濃厚與各赤血球黏著而發生至血管擴張血行緩慢之原因歸於血管運動神經之障礙然此説已經近世醫者認為不確以血管擴張充血為炎症前驅雖屬事實若以此即為炎症本體之主徵則不可蓋血管之擴張充血時未必盡有炎性變化例如充血有炎症時亦非必皆伴血管之擴張充血例如骨膜炎以故單純之充血論不足以概括炎症之意義吸引説此學説由維爾霍氏代表主張炎症本性為組織細胞之變化而血管擴張即寬緩放大之意與滲出即浸潤之意不過一種續發現象其説蓋以炎性刺激能亢進細胞之榮養機細胞之生活力之意自周圍吸引多量榮養物發起混濁腫脹脂肪變性例如油類崩壞或促進細胞之分裂增殖發現新細胞至炎症部群集之細胞亦係因刺激而增殖此亢進細胞之榮養機使發起之混濁腫脹脂肪變性之刺激曰榮養刺激若此刺激唯惹起細胞變性周圍血管不生滲出即不發浸潤之意此種炎症曰實質性炎症又亢進細胞之榮養機繁殖機促進其分裂增殖之刺激曰繁殖刺激此刺激常自周圍血管滲出血液成分因此所起之炎症曰滲出性炎症或名間質性炎蓋氏以受刺激之組織細胞之榮養繁殖兩機能亢進而説明炎症本性其滲出作用亦即主張係由組織細胞之吸引作用而成此吸引説也白血球遊出説此説與吸引説正相反係唐海遺謨氏由動物試驗發現炎症時有白血球通過血管壁遊走於組織間以為解釋炎症之基礎惟二氏互相辨論各有真實之試驗近世從細胞核注意此核字之分裂研究進步以來細胞之新生增殖機轉漸次明瞭知炎症亦有組織細胞之分裂新生維氏之説自係確實然血管壁起變化而白血球滲出亦係事實康氏之説亦有見地因此吾人可認為炎症之本性不但因組織細胞之榮養繁殖兩機能亢盛實亦由於血管壁變性之回圈障礙即不通之意兩氏之説可謂相得益彰也吉來爾氏之説即折衷康維兩氏説謂炎性刺激乃先起血管壁及組織之變性因血管壁變性而後血行障礙白血球遊出因組織變性缺損而後細胞分裂增殖以再生修復斷無自初即新生增殖者云云解釋炎症以此説為最真切確實矣此外諸説紛紜亦猶中醫之論病甲是乙非茲皆從略炎症之原因炎症之原因一言以蔽之即由於一定之刺激而起外面例如水燒火燙內面例如寒熱之氣飲食之物皆可刺激不過刺激有強弱之分例如吃一杯酒與吃十杯酒及組織之抵抗力如何例如有酒量者十杯亦不醉無酒量者一杯亦抵抗不住炎症遂有強弱之分矣瘟疫盛行之時有或一人竟不傳染即此義凡能誘起炎症之刺激大概分之為六類化學之刺激例如常服甘汞就有迅發作用引起口內炎器械之刺激例如常用加的兒放尿則尿道易起炎症溫熱之刺激例如受劇烈之日光則易起腦膜炎毒物之刺激例如常服實芰答利斯則易中毒寄生動植物之刺激例如腸內寄生蟲及各種病菌之繁殖則該部發炎電氣之刺激等是也而刺激之來源亦有兩種自體外通皮膚例例如動植物類之刺傷比方蟲咬木刺呼吸器例如含病菌之空氣塵氛由呼吸而入咽喉氣管之類消化管例如飲酒或有刺激性之食物由口入胃至腸之類泌尿生殖器例如淋病菌之傳染等侵入於局部直接起作用以上皆受刺激之部分由於該部組織起變化血行障礙直接發炎例如赤痢病菌至腸內腸管立時起炎症是也自身體既存之炎性病灶病灶就是人身內部生病的小孔小疙瘩的相似地方這地方有時遇到機會它就生出催炎體其催炎體比方這種病水浸潤出來到無病的地方它就能催該部也發生新炎症由血管或淋巴管輸送於遠隔部以催起新炎症此炎症之原因也炎症之病變概括為血管變化與組織變化之二種血管變化於炎症初期多現動脈性充血血管運動神經失其固有之調節作用於是小動脈及毛細管擴大灌注多量之血液此際在黏膜例如口內皮或外面皮膚可目見潮紅現象即由於該部之充血使然然炎症充血與單純性充血例如腦充血有異因其持續之時間甚長所以續發血管壁之變化而白血球自此遊出聚集於血管周圍之組織中浸潤此滲出之白血球常包圍於組織中害物存在之地方例如竹木刺此現象名為化學牽引作用若病變進行赤血球及血小板亦滲出於血管壁之外此時炎症則更覺顯明此種滲出液若瀦留於漿液膜腔或浸潤於組織中則成炎症性浮腫結果則現紅腫之象例如溫熱病之關節腫組織變化於炎症中又分退行性變化此種變化該部多現壞死在慢性炎症中該部多陷於乾酪變性俗云白乾在外皮則云陰疽之類及進行性變化在輕炎症滲出液不久被吸收治愈若進行至一定程度則炎灶之白血球由貪食作用而搬出局部之細菌及廢頽物且從炎灶之周圍組織新生血管淋巴管以吸收液性及可溶性之廢頽物同時又增殖結締織細胞形成肉芽組織而成瘢痕俗云疤以治愈此炎症病變之大概也炎症分類及名稱此種分類及名稱歸納起來定為四種變性炎係指臟器實質起混濁腫脹脂肪變性者而言此即實質炎余曾見一患腎臟炎者割除之腎臟一具由肉眼視之已成腐敗樣即此類滲出性炎以現滲出性作用為特徵例如漿液性纖維素性化膿性喀答兒性流出之義出血性壞死性腐敗性等炎症均屬此類但數種合併移行變化者亦常事中醫不必細分例如肋膜只要診得有水便可推定為滲出性炎症施以滲利治法中醫無放水法不必談中藥內之茯苓對於滲出性炎症有特效則歷經試驗均不爽但須大量耳增殖性炎以結締組織之增生為其特徵此為以上二種炎症之補正作用肉芽性炎此種由於特種傳染性原因而起例如梅毒雖為肉芽組織然能久保其狀態不易結成瘢痕且多有陷於壞死之趨向者炎症之經過有遲速二者之不同大凡一時性炎症之經過僅數時間即可恢復常態若在急性炎則須亙三四周或數日以上而後治愈在慢性炎則更須延長而後有治愈之可能大約炎症經過之遲速多關係於刺激方法之強弱例如以稀薄之巴豆油注入皮下則起漿液性炎其經過較短若以濃厚之巴豆油注入皮下則起化膿性炎其經過亦長刺激時間之長短例如同受溫度之刺激時間短者可起單純性充血時間過久則發重劇之壞疽性炎及組織之狀態而異其趨向例如在榮養不良貧血之組織雖受刺激時間短作用輕亦發較著之炎性變化其他如慢性瘀血榮養障礙之組織雖受僅微刺激亦能起高度炎症此炎症經過之大略也凡炎症血管壁之變化及血液成分之滲出復其原來狀態即為治愈此理極淺勿庸贅述也炎症之轉歸轉歸就是説炎症病的結果如何大凡炎症之原因持續動作或感染第二原因時則炎症自取慢性經過或局所病灶不易治原因自家或其代謝産物代謝産物就是由炎症生出來的廢物例如患皮膚炎症生出來的乾痂及膿傳播於體內諸部例如瘡之膿毒由血管傳播可使全身中毒之類則誘起新炎灶例如肺結核患者之痰由食道入腸內則生腸結核或發生固有之全身症例如産褥熱可使全身血液中毒之類以危害患者之生命至局所炎灶之轉歸雖亦隨原因及組織之素因而異然組織反應不充分或原因為害性劇且持續時則局所炎灶之組織概續當初之損傷漸次陷於壞死變性其原發病灶周圍所生組織終亦不免陷於同樣變性在實質性炎由實質細胞脂肪變性軟化吸收之結果臟器組織尤多呈變性萎縮又在間質性炎則臟器硬變於表面生瘢痕性凹陷反之若組織反應強盛原因作用不持續且其危害性少時則炎症周圍之組織新生肉芽組織漸入於炎症內以吸收或排除炎症中之頽敗物及變性物等新生結締組織終至占炎症之地位結瘢痕而治愈若係表面瘡症肉眼可以見之若炎症內之物吸收不完全其殘留者尚多石灰質沉著於其間周圍發生組織堤新生結締組織被膜以包擁刺激物而杜絶向周圍組織之作用則亦可比較治愈最完善之治愈往往不貽痕迹此種病理姑從略以上論炎症概略均係西醫病理似不應附録於此致本編主旨或有不牛不馬之嫌然余以為西醫論炎症絶非中醫論發熱醫者往往混為一談殊為可笑往時醫者多自命中西兼通必俗將西醫之説強合於中醫之説不但誤人抑其誤病余不敢云知醫但四十年來反覆試驗長期研究認為中西絶對不能相合之理萬不可勉強拉扯但亦不妨分別討論務期學術日新認識日真最終目的即以減輕病者之痛苦為歸宿醫云醫云中西云乎哉
