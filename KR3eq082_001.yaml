body:
  text: 生理學合參卷一我們這個人是怎麼樣能活著呢他全身的器官是怎麼個樣子呢講這個道理的書西醫學叫做生理中醫叫做內經難經可是中醫缺乏解剖學所以它那書上說的話多有不對的然經過數千年的研究和理想它那一種微妙不可思議的理論也真能發明了人類的生活原理我們研討醫理如能切實的把中西醫的生理學平心靜氣地參照一下子取其可取而棄其可棄那自然是醫學的一個大進步了現在我把中西醫的生理學簡單說一說這是為初學醫的立論所以非常淺顯欲求深造當然以此為初步了一西醫生理學腦腦子分大腦小腦二部大腦主知覺比如痛啦癢啦一有刺激它就能知道小腦主運動比如手足的運動身體的運轉全是小腦的機能大腦的位置在頭前小腦的位置在頭後小腦之下緊接著就是延髓在人之脖項後面主管著呼吸及腦與脊髓之傳達作用這是很重要的地方延髓之下就接著脊髓係在人之脊骨內包藏著它能受腦的命令運動全身並能傳達全身的知覺到了腦子裏叫它知曉所謂反射作用是也人身上無有一處無神經系的好比電線一樣它的總機關就是腦子延髓脊髓所以這三種東西是全身神經系的根本血液血液是養人的要素好比人是一個花草血液就是它的汁水若是有一枝一葉汁水瘀了這一枝一葉馬上就要出毛病若是全身的汁水乾了這花草就會死的人也是如此所以血脈一不流通馬上就不行阿血之來源是從吾人所飲食的東西造成的因此欲講血之來源不得不連同腸胃的生理大概說一說凡吾人當食物之時必與口內之唾液混合此液為亞爾加里性作用可變化澱粉質而為糖分到了胃內復有胃液作用胃液的成份為鹽酸與配普新其中的鹽酸能溶解蛋白質變為配普新小腸之經過頗長是為吸收之主部且腸壁具有絨毛及皺壁故收縮時能將乳糜等管壓迫使乳糜向乳糜管內輸送大腸亦有吸收機能凡食由胃入十二指腸此時即有腸液膵液膽汁為消化作用因唾液胃液之作用只能化澱粉質及蛋白質而不能化脂肪及其它物質腸之黏膜及膵胰腺的舊稱分泌汁液能破碎脂肪球為小分子膽汁可化胃不能消化之物且能使消化之物變為透明體至腸內由黏膜之毛細血管吸收漸漸匯集於門靜脈入肝臟造成血液肝臟能分泌膽汁製造肝糖又能提淨血液中之毒質使已成乳糜樣之血液化為赤色而入於心臟肝為人身造血機關凡食物由乳糜管集合入門脈再由門脈入肝臟再由肝臟毛細管通過之際受肝細胞作用肝臟含有多量之鐵即變為紅色血液從肝靜脈至下大靜脈放流而至心臟肝臟能將食物化為潔淨之血液故食物若含毒質到此則能濾清將毒汁送回膽囊由腸壁吸收之營養質其輸送之道路有二一由門脈經肝臟入大靜脈中以達於心臟一經腸淋巴管匯集於胸管混入血液中以達於心臟水鹽類糖分及蛋白質由門脈輸送之脂肪類則由腸淋巴管輸送之血之周流全身係由心臟左邊左心室發出來先入大動脈動脈血是鮮紅的等著周遍全身血的功用就乏了好象已經燒殘的煤炭火力是不中用了此時的血已經到了極細的動脈毛細血管手足指尖的尖端由此尖端就過入靜脈毛細血管中漸漸往回流又總匯到大靜脈血管所以靜脈血管又叫做回血管此時的血全成了暗紫色即由此靜脈而回到心臟的右半邊內右心房之內這就叫做大循環血既回到了心的右邊右心房再由右邊出來流到肺動脈血管裏頭去此時血皆廢料色皆暗紫血既到了肺中就利用肺的呼吸呼出碳氣吸入氧氣自然把廢料排出去又添上新料氧氣又成了鮮紅的有用之血了於是乎再由肺靜脈管回到了心臟的左心房再至左心室而後再周流全身這就叫做肺循環中醫書說營衛交會於手太陰肺即是說的血由心臟至肺臟回圈的道理此種研究中西競能相合互證自明心臟的機能係左右收縮和開張它能叫血液從一邊收進來一邊噴出去好象人握拳一樣一緊一鬆好象一個吸水筒一邊吸一邊噴人之一生一時也不能停止若是心臟一停止血就不流動人也就死了所以心臟是人全身的主宰腦子神經雖靈若是離了血之榮養也是不中用的血的用處最大可以滋養全身可以發熱力溫暖身體可以抵抗病毒凡人之一切生活現象全仗著它的作用血有赤血球白血球混合在一起可是白血球可以自由出入於血管壁所以身體無論何部有了異狀例如病菌侵入白血球就去包圍它與它抵抗非把它排除去了不可若是抵抗不了白血球受了傷那麼人也就覺著受不了病之纏繞了中醫說血為營氣為衛營行脈中衛行脈外正是這個道理可以細參血為營不是說營就是血的代名詞氣為衛也不是說衛就是氣的代名詞此二字乃指氣血以外之脂肪而言因為此物在脈中脈外與氣血同行有微妙的關係故也皮膚人身上第一層皮名表皮這個表皮無神經刺之也不痛俗稱油皮第二層名真皮這個皮內有神經有血管所以刺之覺疼破了就出血又有汗腺所以身上熱度太高了它就出汗排出廢物可以放散體溫又有皮脂腺可以時常出油保護皮膚又有毛囊消化器消化器可分為五部口腔咽喉食道胃腸茲將胃和腸的生理大概說一說胃之上口名賁門下口名幽門幽門緊接著十二指腸胃裏頭有一種液體所以消化食物用的叫做胃液是合百弗聖游離鹽酸及水所成的腸之構造和胃是一樣的由三膜而成其外層為漿液膜中層為筋織膜內層為黏膜黏膜又有很多的絨毛和小腺所以能吸收食物之精華血液來源之第一步也腸的上部名十二脂腸近接胃之下口再下則名小腸再下則名大腸大腸和小腸接連的地方有一小突起名曰盲腸它的位置正當著吾人之右少腹下部即右腸窩所以盲腸痛最易診斷又回腸盲腸瓣所以防食物逆流於小腸者再下則名直腸再下則名肛門我們吃的東西無論軟硬皆在口內先嚼碎和唾涎混合咽下到了胃裏胃液就分泌出來胃筋也蠕動起來兩三點鐘的工夫就把食物消化成糜粥的樣子然後由幽門送入十二指腸再由十二脂腸到小腸經過膵液膽汁腸液的化合把糜粥樣的東西化成乳糜然後由腸內之黏膜吸收分別運入乳糜管及淋巴管內食物在小腸內吸收最多這時候消化不了的東西就由小腸再下經過盲腸辦借著腸蠕動的力量而入於大腸食物在大腸內尚有一部分能吸收此後再殘留下的渣滓就完全成了廢料水分也少了漸漸的成為固質由肛門排瀉出去所謂糞便是也回圈器回圈器即前講之血液參看自明呼吸器呼吸器人何以能呼吸固然是呼吸神經的作用然呼吸的器官可不是只依賴呼吸神經這一樣所以肺及肋間筋橫膈膜必須略講一講肺臟在人之胸間由左右二部而成包被於心臟由大氣管而至氣管枝愈分管愈細到盡頭為盲管不透氣凡人之呼吸即借著胸廓的一張一弛而肺就活動起來了吐故納新與心臟的活動相輔而行西醫說成人一分鐘凡呼吸十九次中醫說一呼一吸謂之一息是相合的肋間筋分內外兩層它的生理是彼此反對的它的外層能將肋骨俗名肋條骨舉上使胸廓擴大內層能將肋骨牽下使胸廓縮小所以這樣一上一下才能讓肺臟容易活動而營呼吸的工作橫膈膜橫亙於肺之下方平時穹窿凸於上若收縮時則凹下而增加胸廓之深橫膈膜與肋間筋之一張一弛是呼吸運動的一定之動作它與肺之活動有密切的關係肺呼吸也叫外呼吸因身體內不斷的攝取空氣中之酸素又不斷的將體內由酸化分解所生之碳酸及水蒸氣向空氣中排出此機能叫做外呼吸組織呼吸也叫內呼吸與外呼吸之氣體交換作用正相反何以呢因為人身上諸組織由血液中赤血球取出酸素因此而起燃燒作用消費酸素發生碳酸再送回於血液這就叫內呼吸因此而動脈血變為靜脈血成了暗紫色皮膚呼吸也叫作不感性呼吸是由人周身上之皮膚毛孔排瀉少量之碳酸且能攝取少量之酸素但於發汗時則其排瀉與攝取之量增加光緒三十三年余應陸軍部檢閲軍醫考試論病者發熱惡寒之原理余曾以中醫肺主皮毛之說與此理互相闡明是時中醫之有西醫知識者尚少故得上考與五鎮正醫官陸叔丞君同列九十五分前茅雖淺陋答案不足以質高明然回憶當年彌覺趣味橫生也人體溫度平均為攝氏表檢溫器三十六度半脈搏一分間成年人約七八十動小孩較快若按中醫說脈是一息四五至的為無病若是太快就是熱太慢就是寒若太無力就是虛有力就是實此應參看脈學排瀉器排瀉器將體內之廢物放送於體外就叫作排瀉這一類器官就叫作排瀉器這一類的器官約分三種即肺臟皮膚泌尿器一二兩項前已說明茲再略談談泌尿器因為泌尿器是專營此排瀉的阿消化器參照泌尿器分為腎臟輸尿管膀胱及尿道四部腎臟俗稱腰子腎臟係兩個蠶豆狀相對位於上部腰椎之左右兩側它的凹部叫作腎盂腎內通過動脈和靜脈好比一個濾斗一樣腎內有很多的細尿管總歸二個大輸尿管它能把人身上無用的水及血中的廢物由此處濾出送於輸尿管而達於膀胱再由尿道排瀉於體外所謂尿是也膀胱膀胱有三口其二口通左右二輸尿管其一口通尿道膀胱接尿道處有括約肌環繞之以資啓閉而司排瀉尿液中醫書謂膀胱有下口無上口一由於缺乏解剖二由於專講無形的氣化雖然是錯誤可是它那消息陰陽的道理是極其微妙不可不知神經系神經系已詳前論腦五官器五官器分五種略述於下觸覺器皮膚內有神經所以一觸外物它就能報告給腦子而能知其何如嗅覺器鼻內黏膜有多數之嗅神經所以外界香臭一入鼻內既能知之味覺器舌內含有多數之舌咽神經故食物入口而能辨別其何味也視覺器眼球內含視神經故一遇外界之物映入既能知之眼球又有虹彩能令瞳孔散大或縮小聽覺器耳之極深處有聽神經故外音送入鼓膜就可以次傳到聽神經而知之也生殖器西醫講的生理非常詳細除以上諸器官外尚有細胞組織骨骼筋肉腺辦膜體溫等重要生理必須詳參本篇限於篇幅只講大概簡略太甚不足以言醫學也二中醫生理學中醫講的生理是以五臟六腑相分配的講中醫的醫理總離不了陰陽二字這兩個字含有微妙的至理萬不可加以懷疑它說五臟者所以存精神氣血魂魄者也六腑者所以化水穀而行津液者也大意是說人之生理有臟以為體就有腑以為用臟之氣行於腑腑之精輸於臟二者相合而後成功臟之性宜藏腑之性宜通又以五臟主藏為陰六腑主瀉為陽而一臟一腑之中又各有其陰陽臟腑陰陽相互相生之理分晰至微我覺著它與科學的說法相輔而行而且有其不可思議的真理或者現在科學尚未到了這個地步也未可知這是我四十多年反覆試驗的所得不過不可因著陰陽二字越弄越玄虛罷了看中醫書要有精鋭鑑別的眼光抉擇出它那道理的奧妙拋棄它那說法的錯誤把歷代醫籍的精華從實驗運用到西醫的科學說法之內那是再好不過的千萬不可胡扯亂拉妄說中醫的這個就是西醫的那個那就糟了尤其不可先入為主自諱其短必須實實在在的體驗出來中醫的那一種說法實在超過於科學的西醫並且可以把西醫的說法來證明中醫那一點的錯誤這才可以於醫學上有了進一步的貢獻不但不可盡信中醫書也不可盡信西醫書蓋是醫之一道到現在並未到了很完全的地步所以世界上有好多因病身死的人這就是一個中西醫均未完善的大鐵證可是這種中西合參的辦法談何容易我從十七八歲就喜歡研究中醫學到了二十歲就學了西醫到現在已經六十多歲了我在這四十餘年之間經過種種的試驗和比較到現在似乎對中西醫有了一點真認識然而絶不是自以為到此境地這就是完善不過略略開出一些門徑現在仍是努力往前改進更希望與余同好者共同努力往前進大家把這一種學問共同發明到毫無缺陷的那一個境地成為世界上的一個獨立的醫學永遠革除中西醫的名稱那就好了現在我再把中醫說的五臟六腑的概要講一講中醫以心肝脾肺腎為五臟茲分述如下五臟一心心包絡附經云心者君主之官神明出焉又謂之君火屬陽又云心外有赤黃裹脂是為心包絡心下有膈膜與脊脅周回相著遮蔽濁氣使不將上熏心肺又云其中心有竅以導引天真主氣又云心主血脈又云其液為汗中醫說心臟主血是對的可是若說它是君主是能出神明說它是君火又能導引天真且是為汗的來源這些說法猛一看似乎太玄虛其實呢是與西醫的說法息息相通且覺著有些很圓通的道理我先把這道理說一說心臟若一停止周身的血脈就立時全停了人就死了這是何等的一個主要機關呢若說神明這兩個字簡直的就是腦子和神經的代名詞你想一想若是心血發生了毛病比方熱度太高了或是血內有了毒馬上它那腦子的作用就會出了變象輕則覺著頭暈心跳重了就可以神昏譫語尋衣摸床也許瘋瘋顛顛精神失常若是心臟弱了馬上人就缺乏精神或者成天家頭暈眼黑神識不清驚悸善忘嗜睡或失眠起了種種神經衰弱的狀態這就是君主失其權能天真神明受其影響的一個證明總而言之腦子神經全賴血來養著它它若是不受心血的影響絶對不會單獨有作用的至於說汗為心液是君火更是有著它的微妙道理何以呢人全知道出汗是有汗腺的可是汗腺何以能發汗由於周邊之溫度亢進血液中水分增多心臟及血管機能旺盛服發汗藥血管收縮神經興奮汗腺神經亦得逞其作用例如虛汗這樣看來若把心離開了這汗是不能出來的所以西藥裏頭的退熱藥例如阿斯匹林等其副作用為發汗過多往往驟然能叫心臟停止害了人的性命而中藥裏的發汗藥例如麻黃也往往鬧得人大汗不止汗脫也就是心臟受了汗的大瀉漏而無力供給的道理所以說汗為心液是一點也不錯的至於君火二字本是對相火說的簡單說一句就是人身上的熱力張力全憑著心血來醞釀的若離開了心血熱力和張力也就完了人身上也就不溫暖了所以君火這二字並無不合簡直的就可作為溫源二字講那有什麼玄虛呢二肝經云悲怒氣鬱則傷肝又曰諸風掉眩皆屬於肝又曰肝者相火內寄得真水以涵濡真氣以遂生生之氣滑氏曰肝之為臟其治在左中醫說肝主血是對的血若不經肝臟的濾清如何能有血的功用呢此臟既為造血之總樞那麼人身上已經造成血之原料乳糜歸總全集合到門脈裏門脈即食物精華入肝之總管血之前身即是乳糜若是一經悲怒氣鬱一定影響到神經它那一切無數的毛細乳糜管馬上就要失其平衡那一邊由肝臟送入心臟的血液也就不甚順序肝臟裏此時停留了好多的血它那濾血的機能也就疲乏了神經受了這種影響所謂疲極之本所以人就覺著不舒服容易不喜歡越鬱越厲害就要發生疼痛脅疼脹最多頭暈目眩甚則全身抽搐於是有肝風肝氣肝火等等的病名若再加重積久不流通它那停滯的血液越聚越多越多越濃全身血管停滯神經失其滋養所謂真水不能涵濡真氣不能遂其生生之氣於是乎乾燥結果陰氣吸收不住陽氣所謂龍雷之火炎炎上升就有暴厥不省人事卒中內風眩動角弓反張中風半身不遂等等的現象腦充血腦出血那就更厲害了中醫說肝在左邊那是不對的可是滑氏說其治在左是一點也不錯因為肝氣病十之八九總是左脅下先不舒服經過多年的醫生們當然不能否認此說的總而言之肝臟因為是造血的總樞鈕它的構造曲折太多不比心臟直出直入的血流容易所以最忌不流通所以說肝臟易鬱不宜遏抑中醫說情志不舒則生鬱言語不投則生嗔謀慮過度則自竭斯疲極之木中醫以肝屬木從中變火即血變濃升之不熄為風陽抑而不透為鬱氣又說是木宜條達肝主疏泄皆得治肝之妙諦這全是我由實驗而後敢信的話一點也不錯的三脾中醫書說脾與胃同膜動則磨胃而主運化又謂脾主肌肉又謂脾主消化又謂脾為濕土又謂穀在胃中賴脾土之濕蒸布津液以濡之然後腐變故胃者脾之腑也又曰脾統血又曰飲食勞倦則傷脾又曰諸濕腫滿皆屬於脾總而言之中醫是說脾是助胃之消化的它得了相火的熱氣人身上的溫熱全賴此物與心之君火同參才能蒸發消化好比一個做飯的鍋底一樣若是相火不足或是受了濕氣脾惡濕它就脾陽下陷就是脾無熱力扶助因而衰弱了無熱力助消化了所以就有完穀不化不思飲食泄瀉衰弱四肢浮腫等等的病象但是中醫論脾是包括著膵臟說的它那說法雖然不能與西醫吻合可是它那脾胃相連的道理確乎是說的膵液入十二指腸來營消化的道理比方膵液不充足一定消化發生了障礙那就叫作脾虛中醫說胃宜降脾宜升的道理大約是指膵液輸入而言至於脾臟有生白血球的機能白血球亦在脾中崩壞中醫書是未說過的可是白血球過多症它那症候之最著者即為腫脹其他的現象就是脾臟腫大就是中醫所謂脾積瘧母之類其餘的現象也離不了腹水浮腫小便短少等等的病症所以中醫治脾虛以李東垣補中益氣的說法最為可取實驗有效可見中醫的論脾是連膵合在一起說它那脾陽不升胃失運化及飲食勞倦則傷脾等說就是膵液缺乏的道理它那脾統血脾惡濕腫滿屬脾的說法恐怕就是白血球過多的道理它說的脾與胃同膜這個膜字恐怕就是說的膵臟而其治脾治腫脹的理論與藥品更是的確有效的四肺華元化曰肺者生氣之原乃五臟之華蓋下無透竅吸之則滿呼之則虛司清濁之運化為人身之橐籥又云肺與大腸相表裏又云五臟惟肺居上破碎尚能生活其他各臟破則人死不能修補又云諸氣膹鬱皆屬於肺又云肺主皮毛總而言之中醫說肺主人身之氣一呼一吸吐故納新與西醫呼出碳氣吸入氧氣的說法完全相合並且說肺主人身之氣上下升降無處不到它能把清氣升上來把濁氣降下去這就是呼出碳氣吸入氧氣的道理所以人能得到太太平平的清醒若是肺出了毛病盡不到它的責任那麼人身上的氣就清濁不分了此說乍一看好象與西醫說不同其實中醫說的肺主皮毛當時已經參透了西醫皮膚呼吸的道理所以說全身的氣與外間周圍的氣只是一個內外流通毫無間斷並不是肺氣只由口鼻呼吸它那周身的呼吸完全依賴著肺之活動而營其工作比方身子一著涼馬上全身毛孔一收縮內外就不能透氣了這個時候肺就受了影響就要咳喘鼻子就要不通氣渾身就要覺著害冷惡寒內裏的熱氣體溫透不出來越積越熱所以越覺害冷身上的熱度是越積越高這個熱太多了就把血管和神經蒸的不好過所以攻的頭脹頭痛項強身疼這就叫作外感這就叫表證實證若是用藥把毛孔治開發散好比就象開了好多的小門一樣一霎時內外空氣一透徹肺得其所如同解了束縛以上諸症馬上就好了可見中醫這肺主皮毛之說是微妙之至了還有清濁升降的道理中醫是說人受穀氣清者為營濁者為衛營血生於心衛氣統於肺又說是心者血肺者氣血為營氣為衛相隨上下謂之營衛看這幾句話就知道中醫說肺能將清氣升上來將濁氣降下去所謂清肅之令使人身上得到很順序的生機以養其生命這個道理無疑的就是以清濁二宇吻合於碳氣氧氣之說它這種理想完全與西醫的組織呼吸內呼吸之說相合不過科學的說法較為確實罷了西醫說內呼吸是與外呼吸之氣體交換作用正相反外呼吸是吐故納新內呼吸是將毛細管血中之酸素即氧氣搬出來賦豫各組織因此而生燃燒體溫組織就是中醫說的三焦一類的網膜又將組織中燃燒後無用的碳酸即碳氣復送於血中由內呼吸使動脈血變為靜脈血簡言之就是把血管裏頭的清氣弄出來接濟組織的消耗又把組織內由消耗剩下的渣滓即濁氣送回血管中叫它入於靜脈還流於心臟再由肺循環排出於體外這是什麼道理呢蓋是人之一身全體內外無一處不抑仗著血來滋養它而血之所以能源源接濟絶不虧乏的原因除了食物的精華直接化成血液外其唯一的原料就是仗著吸入的氧氣清氣若是氧氣吸的不充分碳氣濁氣排泄的不乾淨那麼全體上下內外馬上就要發生象的它那體溫過剩了也不好中醫所謂熱不足了也不好中醫所謂寒所以中醫說肺司清濁之運化為人身之橐籥這句話就是說的肺之動作關係全身的呼吸並非玄虛空洞的揣擬若是肺臟動作出了毛病那麼內呼吸及皮膚呼吸全要受了影響豈不是清濁升降失了軌道的一個鐵證嗎它那肺與大腸相表裏的說法更覺圓通微妙若不多讀書不求甚解的一定覺著如此來講肺的作用未免離奇我在三十年前亦曾反對此說認為毫無道理有一年我治了一個喘症才恍然這個說法是真有道理的此症係喘滿的很厲害經過若干醫生中醫最有見地的是斷為肺實作喘用藥均是瀉肺氣然無效西醫是注射的止喘藥然止住喘以後更覺痛苦病者已經危殆余用的藥並未治肺只用人工鹽瀉之大便通利後喘驟止一劑而愈並未棘手此症病者係唐姓住北鑼鼓巷由余友諸有鶴君介紹以後凡關肺之疾患例如肺炎我多注意於腸獲放良多這蓋是肺之血管回圈隱然與乳糜管淋巴管有直接的關係比方治流水大河一通暢一切距離極遠的小水溝也就同時暢流了而腸內容物即是血液和淋巴液的前提所以肺裏有病尤其是實證而在腸之生理上著想真是釜底抽薪根本治療的好法子因此我才明白經旨所謂肺合大腸大腸者傳導之腑的精義蓋中醫主張臟腑互相為用實有至理所以一治大腸而肺病立愈這個道理是值得研究的五腎經云腎者作強之官技巧出焉又云腎有兩枚形如豇豆又云腎合膀胱膀胱者津液之府也又云腎為水臟按腎臟有排泄血液中不用物之機能並有排泄尿素及尿酸水等之機能所以此臟若是失其作用則血之通過不能濾淨周身必受其影響而尿中毒症亦由此臟有病或膀胱之失運而起全身日見衰弱又何技巧之有而腎臟炎腎盂炎尿毒症血尿糖尿等疾患即由此而起它那現象就是中醫說的水腫小便短赤小便混濁及一切尿之變象身體衰弱精神不安或則發熱面目黧黑枯槁這全是中醫所謂腎經病的樣子與西醫說法大致相合可是中醫只說腎合膀胱而未說腎之輸尿有兩管未免忽略了以上是中醫書上說的五臟本編所引用的中醫說法不及十分之一大略尚能與西醫之說相合這種合攏起來講中西醫的生理學似乎尚非胡扯亂拉恐怕內中真有抉出這兩種學問的精義的地方也未可知現在我再把中醫講的六腑說一說六腑六腑中醫以一胃二大小腸三膽四膀胱五三焦命門附六心包絡膻中附為六腑茲分述於下一胃經云脾胃者倉廩之官五味出焉又云胃者水穀氣血之海又云水穀入口則胃實而腸虛食下則腸實而胃虛又云胃者水穀之海六腑之大源也又云五味入口藏於胃以養五臟又云脾合胃胃者五穀之府以上諸說總不外乎胃主腐熟五穀的道理與西醫之說吻合不過中醫無胃液之說其論胃之妙用多連脾中醫言脾包括胰臟在內而言所以二者總以連帶講述為宜蓋胃主納食脾主運化脾氣宜升所謂健脾胃氣宜降所謂胃以通為補也張仲景治傷寒的三承氣湯就是瀉藥叫作急下存津就是知道胃中不宜存留著好多腐敗東西免去它在腸胃內作祟所以把它瀉下來再輕一點的胃病也是注意這種見解所以又有胃柔潤以通為補的說法就是緩緩的叫它往下運動不願大瀉的說法這與西醫的清涼藥緩瀉藥用意相同這全是偏於實證的治法若是李東垣的補中益氣調中益氣升陽益胃等湯全然用著大補的藥品來治脾胃這就是治的脾胃的虛證較之西醫的治法圓妙的多中醫是主張脾臟之陽就是熱氣若是不能上升蒸動胃氣那是不行的所以這些補藥往往有起死回生的妙用總一句來說就是胃宜下降脾宜上升這就是最可信的經旨二大小腸經云小腸者受盛音成之官化物出焉大腸者傳導之官變化出焉按中醫書小腸上口即胃之下口名曰幽門而無十二指腸之名小腸下口即大腸上口名曰闌門亦無盲腸之名此是中醫的解剖未精的緣故無庸諱言然中醫對於大小腸之生理則言之甚詳其言小腸為心之腑一語即是說的小腸對於食物吸收後由乳糜淋巴而造成血液以入於心臟參看前章肺之生理之理中醫說小腸所受盛者只是食物飲主化氣食主化血食物在小腸內皆化為液以出於油膜此指中焦說此油膜二字即一西醫書之乳糜淋巴等組織不過中醫書分不清楚這種東西的構造可是早巳參透了食物變成血液的道路由腸壁吸收之營養質其輸送之道路有二一由門脈經肝臟以達於心臟一經腸淋巴管及胸管混入血液中以達於心臟所以血液中仍有脂肪即中醫所稱之營是也所以它說小腸能化物化物就是指著氣血這兩種東西說至於氣的化出中醫是離不了三焦的說法而腸子周圍的東西統統名為三焦這個道理我在後邊三焦節下敘述之食物在小腸吸收去的成分極多到了大腸吸收力就少了可是大腸能特別吸收水分使糞便濃厚所以中醫書說大腸是傳導之官變化出焉變化出這三個字就是說由小腸送來的東西到了大腸精汁大部分早已化去了到了此處就變為糟粕而出其言大腸為肺之腑一語就是說的大腸何以能傳導必賴肺氣下達它才能致其功用若是肺氣閉塞住不甚活潑例如表實及裏熱等那麼它那傳導道與導同的力量也就小了這個說法也與血之運行有極微妙的關係參看上節肺之生理就明白了所以心合小腸肺合大腸這兩句的經旨乍一看好象荒謬之至我經過若干年的實驗才知道此中真有至理而且與西醫的說法不謀而合三膽經云膽者中正之官決斷出焉又云肝合膽膽者中精之腑又云膽氣鬱為怒可見中醫論膽已知其與肝有連帶關係但不知膽汁入十二指腸以助消化之理然其推闡肝鬱則膽氣抑遏令人暴怒之理頗覺圓通蓋肝之血行若有障礙勢必肝汁存留輸送停頓不但消化受其影響即神經亦必不能安靜所以鬱怒的現象中西醫是公認的在西醫書所稱加答兒性黃疸症皆有神經抑鬱食欲不振及肝臟膽囊之腫大若在膽石症膽部更有劇烈的疼痛惡寒等糞便之失色多為白色等等主要的症侯可是中醫說膽病亦有黃疽忿怒脅疼脅脹等等之重要主症至於膽主決斷一語似係從經驗中得來的證以科學的注重實際自然不能強合然而中醫之治驚懼和忿怒大半離不了肝膽二經它那理論總是說膽氣太過則暴橫專斷膽氣不足則驚懼無決斷本此立論而處方治病是確實有效的這大約與神經上有微妙的關係只以此係偏於精神方面立論無有真憑實據的東西所以我不能下斷語可是中醫論膽證以它的治法有效就不能把它的理論一筆抹煞這是我的主張說不定若干年後就可以研究出它這一點的道理來阿四膀胱經云膀胱者州都之官津液藏焉氣化則能出矣又云腎合膀胱膀胱者津液之府也中醫解剖未精看不清膀胱與腎臟聯絡的東西輸尿管卻是知道尿是存注於膀胱惟對於尿之來路則說不明白於是有氣化的說法這不能不說是中醫的疏漏可是關於氣化這種理想上的創造證以中醫治水病的靈驗真是有它獨立的價值不可不加以闡明中醫說入氣不化則水歸大腸而為泄瀉出氣不化則閉塞下竅而為癃腫這兩句話隱然與經旨論腎氣化能出的道理相合它那理論是把膀胱的上口下口撂開不講它的精義就是不論膀胱口是何如若是氣不能化簡直的喝下水去一到不了膀胱就得出來泄瀉或者全聚到膀胱小便不容易出來尿閉或者全留到體內浮腫水是一點也化不了氣或是一點也排泄不出來此可證明膀胱並非無口何以水的道路忽然發生了變化呢在這種現象之下是用著氣化二字來神其功用的西醫是除了利尿藥之外就是抽水或用器械的排尿在當時未嘗不立見效驗可是根本上今天放了腹水明天就須再腫起來今天用加的兒排了尿明天仍然又不通除了尿石的外科手術那是對尿石症再好不過的法子以外我認為中醫治水症它那氣化二字的神妙可以補西醫治水病的缺點這是我經驗了若干年才敢下這幾句斷語現在我舉一個例子於下我的老友李勳卿的太太和張松泉的太太年齡全在五十以上他那病象全是水腫先是四肢腫後來腹腫而且腫的極厲害肚臍全腫的很高而且往外出水兩腿腫的發亮主要的症候是這樣我的用藥是黨參黃耆山藥白芍白朮茯苓皮薑皮補骨脂熟附子這是主要的藥分量每味五六錢附子二三錢大約二三十劑此二症就痊愈了刻下均健在此症已經多醫診治他那以前的藥方我已記不清大約是藥味太多分量太少的毛病所以未能收效記得張松泉的太太還有出虛汗的毛病所以重用白芍後來我不在家了他還寫信來問我說是汗早已不出了吃藥未斷因而汗出不來又難過以後減去白芍就痊愈了由此例看來可以證明水腫的全身水分因為用了中藥的補氣補陽的藥品它才能把人身的陽氣鼓蕩起來把存留在皮裏肉外的死水氣全都蒸化去了於是乎氣旺陽復便利水消好比嬌陽當空一切霧霾陰濕之氣渙然消散那麼這就是中醫氣化的道理之一了以上係就虛證講氣化二字關於氣化的道理還有一個極顯明的比喻以下就實證講氣化二字比方天氣當大熱將雨悶閉不通的時候一點風也沒有只是鬱蒸的悶熱天昏地暗可以使人喘不出氣來這個時候就是天地之氣不能流通雨也下不來雷也發不出這就好比人身上的陰陽關格堪堪要命的險象若是一下子霹靂一聲地氣上升天氣下降頃刻之間二氣交通大雨淋漓雨也下來啦氣也平和啦這就是天地之氣已通馬上就可以把閉塞懊儂的景象一掃而光人身上氣和水也是如此若是受了穢濁之氣的侵襲實證肺氣因熱而壅閉呼吸的總樞鈕先失了功用全體的呼吸一定要受影響所謂清肅之令不能下行那麼各臟濁陰之氣單獨上承那就糟了這就和悶熱的天氣一個樣此時人的五臟六腑簡直的和鐘錶停了擺一個樣所以上下內外全不通氣啦他那病象是內裏頭熱的了不得外皮子上是越來越發涼以至於涼的了不得中醫所謂熱深厥亦深又叫做大熱似寒又叫做上關下格外邊的汗是一點也沒有內裏的大小二便也是一點也沒有尤其是小便簡直的顯然不通之至兩手的脈也漸漸的一點摸不著了昏迷不醒或嘔危險極了此種病象若以西醫的生理病理來講解是極不相合的我不敢強為解說但中醫的治法就是本著肺與大腸相表裏的說法注重氣化確實能起死回生此由實驗得來非偏見也可是一劑大瀉藥吃下去馬上就有雲飛霧散的奇效此與後論溫病逆傳不可妄用瀉藥並不相背臨症細參可也這個道理就是腸子一鬆動肺氣得以下行若只知肺主呼吸不知道肺氣下行不但不足與言西醫亦不足與言中醫五臟六腑全身的氣一通暢水一蒸發那就叫濁陰下降內外上下全通徹就叫作陰陽調和身子也溫暖了大便一通小便自然也通了汗也出來了熱證因下而得戰汗者不少這就是中醫氣化的精義它對於膀胱一腑雖然未說出輸尿管的名稱可是它那治療上的神驗或因補而水去或因瀉而小便利理想上的通徹簡直好的了不得我在三十年前也曾極力反對中醫氣化之說以後經過治療的實驗把中西藥反覆比較了多次我才知道我以前反對的錯誤關於氣化這一點我不敢強與西醫的說法拉扯可是遇到以上的病症你可以比較比較試驗試驗就知道我這一篇敘述並無一些偏見一句虛僞了發深願以後就以此種說法來補西醫的缺點這是我希望與我同好的人共同來實驗的尿石等症均不適用氣化之說不可誤會凡汗出多了小便就少此理即是氣之蒸發的實驗西醫亦有此說一查生理學便知五三焦經云上焦如霧中焦如漚下焦如瀆又云三焦者決瀆之官水道出焉又云三焦出氣以溫肌肉充皮膚蓋中醫謂上焦出於胃口上並咽以上貫膈而布胸中中焦亦並胃中出上焦之後滲糟粕蒸津液化精微而為血此指淋巴而言下焦別回腸此指盲腸言注於膀胱而滲入焉此種見解不能說毫無錯誤尤其是不能指出三焦是什麼物件更覺太嫌籠統可是中醫的理想對於三焦的作用誠然也有一部分精義中醫所稱三焦就是西醫講的一切結締組織細胞脂肪細胞神經細胞以及淋巴細胞乳糜管等等中醫解剖不精分不大清楚而又知道這些東西徹內徹外籠及全身實在是有用的東西故定其名曰三焦三焦者蓋包括人體之上中下而言故又特別聲明曰三焦者人之三元之氣也總領五臟六腑營衛經絡內外左右上下之氣三焦通則七下左右內外皆通等語此可見中醫能悟出這個道理就是指不出那一種東西有那一種的作用例如結締組織等名目它說的三焦出氣溫肌肉一語就隱然與西醫的酸素在體內燃燒作用之說相合它說的蒸津液化精微而為血亦與西醫講的食物化血說相合它那如霧如漚如瀆的比喻對於人身上的水分的化合更有微妙的理解這其中包含著營衛腠理陰陽開闔的玄理凡一遇到某一種病症例如寒水就要運用這一種的理想來治療才能知道這種說法實實在在靈妙貫徹的可喜若把這種道理融洽到科學裏頭說不定它是更上一層的科學哩中醫講生理還有一個特別名詞叫作命門這種東西本來無形中醫說是兩腎之當中有一個地方叫作丹田臍下是人之賴以生活的總發源它是相火所在的地方又叫做真火真火包於真水中醫稱腎水為真水之中水火平均不多不少這就是陰陽二氣維繫團結的精義這種真火它是人身的生活元素它能維持人的生命發生人身的溫暖而不致於乾燥所以說一點元陽性命之根涵育光明這個相火若是沒有真水來吸住它它便獨旺了不平均了這個火焰它就漸漸的往上浮動人就覺著精神不清楚興奮過當發現出種種的狂態它若是衰弱了不大熱了人就覺著格外疲乏精神短頭暈眼黑食少形寒陽萎皮膚枯燥若是它越來越不能與腎水抱合真水一點也吸不住真火有機會它便轟的一下子飛上來水火分離人就成了兩半截的現象陰氣越往下沉腎水下涸陽氣越往上浮虛火上炎那就陰陽團結不到一處各不相顧一霎那的工夫陽氣也散了陰氣也乾了這人也就失掉了它的性命這就叫作陰竭陽絶中風腦充血俗稱的緊痰厥暴厥就是這種現象再輕一點就叫作孤陽外越重一點就叫作亡陽還有陽脫皆是危症總歸一句話這全是命門真火無所附麗先天之水失其涵照所謂孤陽不生孤陰不長那麼人的生活元素不就完了嗎我常說西醫的科學是再好不過的中醫的玄虛是無從證明的可是中醫對於命門的理論我是根據著治好了這種病的經驗才深信它這種說法我以為這種說法大約與西醫所謂熱力活力張力的道理相近似可是西醫的說法似乎尚不及中醫的水火既濟的玄理來得圓通而且從治法上比較也不如中藥確實有效大補元陽確能挽回生命於無何有之鄉請於呼吸存亡之時以中醫大劑峻補與西藥強心劑比較自知余此種論調絶非臆斷說不定這種道理與靈魂學也有關係此非本書範圍故不深論六心包絡心包絡這個名詞也是中醫生理上很要緊的一個東西中醫說它是在心下橫膜之上與橫膜相黏之黃脂裹於心臟與心肺相聯又說這個地方叫作膻中此處正當胸之中隔之上既不是肺又不是胃乃一有脂油而空鬆的所在俗名腔子所以熱入心包邪傳膻中的治法參看溫症逆傳是極有價值的理論不可不格外注意以上中醫所講的五臟六腑大略已經說明此外尚有營衛腠理筋骨腦髓經絡皮毛關節氣海血海性命精神魄門以及眼耳咽喉舌齒口唇鼻會厭等等均應擇要說明於下此外一營衛中醫講營衛似即指氣血而言然其參悟活動又非拘於氣和血的實質它那講營衛貫通的道理頗覺可喜所以它說營居脈中衛行脈外是相輔而行營與衛雖是二物可是營之中亦有衛衛之中亦有營二者並不可分此理雖不及西醫血壓說之確實然其推測氣血之相互關係實有其微妙之理試將調和營衛的方法加以實驗自知此說不謬此二字最好與西醫生理分析脂肪及淋巴液的說法參看自明二腠理此二字包括西醫所講之皮下一切組織而言中醫言表證離不了此二字三筋骨筋系包括腱及韌帶而言骨之生成中醫謂是骨髓所生四腦髓中醫講腦雖無知覺運動神經諸名詞然謂頭為諸陽之會又謂腦為髓海下通脊髓是知腦之靈明且知腦與脊髓聯貫之理不過中醫謂脊髓系由腎生出腦髓又由脊髓生出實與西醫說法不同然治腎之藥即所以治腦中藥則有極大的效驗這是無可厚非的五經絡中醫言經脈者所以行血氣而榮陰陽濡筋骨利關節者也此經脈並非專指血管而言故有十二經又有奇經八脈諸說玩其文意即是西醫所講的一切神經及淋巴管血管乳糜管等均包括在內又謂橫行者為絡細者曰孫絡又云久病傷絡則似指一切之毛細管而言其說頗復雜六皮毛此指表皮及毛而言七關節即骨節八丹田在臍下女子名胞宮又名血海又名血室此在中醫視為很重要之一部九津液中醫謂心藏神肝藏魂肺藏魄脾藏意腎藏志此說似覺支離學者即以此為神經之代名詞觀可也津液二字係指人身之水分而言並包括淋巴液乳糜精液尿及各種分泌液在內十膻中已詳前以上十項因限於篇幅太嫌簡略不過略記其名稱而已此外關於中醫學之生理尚有種種名目學者應取內經難經各經參考之取其可信者切實試驗之其荒唐不經者勿取也
